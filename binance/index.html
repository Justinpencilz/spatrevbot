<script>
// ======== PAIRS ========
const PAIRS=['BTCUSDT','ETHUSDT','BNBUSDT','SOLUSDT','XRPUSDT','DOGEUSDT','TRXUSDT','ADAUSDT','AVAXUSDT','DOTUSDT','LINKUSDT','MATICUSDT','UNIUSDT','SHIBUSDT','LTCUSDT','BCHUSDT','ATOMUSDT','ETCUSDT','XLMUSDT','XMRUSDT','NEARUSDT','FILUSDT','APTUSDT','ARBUSDT','OPUSDT','SUIUSDT','PEPEUSDT','INJUSDT','TIAUSDT','SEIUSDT','FETUSDT','RUNEUSDT','AAVEUSDT','ALGOUSDT','MANAUSDT','SANDUSDT','AXSUSDT','EGLDUSDT','FLOWUSDT','GALAUSDT','HBARUSDT','ICPUSDT','KAVAUSDT','KSMUSDT','MKRUSDT','QNTUSDT','SNXUSDT','STXUSDT','THETAUSDT','VETUSDT','WAVESUSDT','ZECUSDT','ZILUSDT','ZRXUSDT','WLDUSDT','ONDOUSDT','TONUSDT','MEMEUSDT','PORTALUSDT','ALLOUSDT','GENIUSUSDT','HEIUSDT','NFPUSDT','ASTERUSDT'];

const sel=document.getElementById('pairSel');
PAIRS.forEach(p=>{const o=document.createElement('option');o.value=p;o.textContent=p.replace('USDT','')+'/USDT';sel.appendChild(o)});
sel.value='BTCUSDT';

// ======== STATE ========
let chart=null, chartData=[], pollTimer=null, activeSig=null;
let series={candle:null,fastMA:null,slowMA:null,en:null,sl:null,t1:null,t2:null};
let indOn={veltrix:true,spatrev:false};
let S={fast:9,slow:21,htf:4,swing:10,pivot:5,rr1:1,rr2:2,line:30};
let curPair='BTCUSDT', curTF='1h';
let vState={wins:0,losses:0,dw:0,dl:0,ww:0,wl:0,mw:0,ml:0};

// ======== HELPERS ========
function fp(n){const p=+n;if(p>=1e3)return p.toLocaleString('en',{minFrac:2,maxFrac:2});if(p>=1)return p.toFixed(4);if(p>=.01)return p.toFixed(6);return p.toFixed(8)}

// ======== INDICATORS ========
function sma(d,p){const r=[];for(let i=0;i<d.length;i++){if(i<p-1){r.push(null);continue}let s=0;for(let j=i-p+1;j<=i;j++)s+=d[j];r.push(s/p)}return r}
function ema(d,p){const k=2/(p+1),e=[d[0]];for(let i=1;i<d.length;i++)e.push(d[i]*k+e[i-1]*(1-k));return e}
function rsi(d,p){const g=[],l=[];for(let i=1;i<d.length;i++){const x=d[i]-d[i-1];g.push(x>0?x:0);l.push(x<0?-x:0)}const r=[50];let ag=g.slice(0,p).reduce((a,b)=>a+b,0)/p,al=l.slice(0,p).reduce((a,b)=>a+b,0)/p;r.push(al===0?100:100-100/(1+ag/al));for(let i=p;i<g.length;i++){ag=(ag*(p-1)+g[i])/p;al=(al*(p-1)+l[i])/p;r.push(al===0?100:100-100/(1+ag/al))}return r}
function adx(h,l,c,p){const t=[],pD=[],mD=[];for(let i=1;i<c.length;i++){t.push(Math.max(h[i]-l[i],Math.abs(h[i]-c[i-1]),Math.abs(l[i]-c[i-1])));const u=h[i]-h[i-1],d=l[i-1]-l[i];pD.push(u>d&&u>0?u:0);mD.push(d>u&&d>0?d:0)}let at=t.slice(0,p).reduce((a,b)=>a+b,0)/p,pd=pD.slice(0,p).reduce((a,b)=>a+b,0)/p,md=mD.slice(0,p).reduce((a,b)=>a+b,0)/p,pdi=pd/at*100,mdi=md/at*100,dx=Math.abs(pdi-mdi)/(pdi+mdi)*100,adx=dx,av=[adx];for(let i=p;i<t.length;i++){at=(at*(p-1)+t[i])/p;pd=(pd*(p-1)+pD[i])/p;md=(md*(p-1)+mD[i])/p;pdi=pd/at*100;mdi=md/at*100;dx=Math.abs(pdi-mdi)/(pdi+mdi)*100;adx=(adx*(p-1)+dx)/p;av.push(adx)}return av}
function atr(c,p){const t=[];for(let i=1;i<c.length;i++)t.push(Math.max(c[i].high-c[i].low,Math.abs(c[i].high-c[i-1].close),Math.abs(c[i].low-c[i-1].close)));if(t.length<p)return.001;let a=t.slice(0,p).reduce((x,y)=>x+y,0)/p;for(let i=p;i<t.length;i++)a=(a*(p-1)+t[i])/p;return a}

// Veltrix AI
function veltrixSig(candles,set){
  const c=candles.map(x=>x.close),h=candles.map(x=>x.high),l=candles.map(x=>x.low);
  const li=candles.length-1; if(li<30)return{};
  const fa=sma(c,set.fast),sa=sma(c,set.slow);
  // HTF SMA
  const htfBars=Math.max(1,Math.round(set.htf||4));
  let htfF=fa[li]||0, htfS=sa[li]||0;
  if(li>set.slow*htfBars){const ac=[];for(let i=li;i>li-set.slow*htfBars;i-=htfBars){const s=Math.max(0,i-htfBars+1),sl=candles.slice(s,i+1);ac.push(sl.reduce((x,y)=>x+y.close,0)/sl.length)}ac.reverse();const hf=sma(ac,set.fast),hs=sma(ac,set.slow);htfF=hf.length?hf[hf.length-1]:fa[li];htfS=hs.length?hs[hs.length-1]:sa[li]}
  // Pivot swing
  let sh=0,sl=0;const cs=Math.max(set.pivot,li-set.swing);
  for(let i=cs;i<li-set.pivot;i++){const pi1=h[i]>h[i-1]&&h[i]>h[i+1]&&h[i]>h[i-2]&&h[i]>h[i+2];if(pi1&&h[i]>sh)sh=h[i];const pi2=l[i]<l[i-1]&&l[i]<l[i+1]&&l[i]<l[i-2]&&l[i]<l[i+2];if(pi2&&(sl===0||l[i]<sl))sl=l[i]}
  if(!sh)sh=Math.max(...h.slice(li-set.swing,li));if(!sl)sl=Math.min(...l.slice(li-set.swing,li));
  const crossover=fa[li]!==null&&fa[li-1]!==null&&fa[li-1]<=sa[li-1]&&fa[li]>sa[li];
  const crossunder=fa[li]!==null&&fa[li-1]!==null&&fa[li-1]>=sa[li-1]&&fa[li]<sa[li];
  const entry=candles[li].close;let sig=null;
  if(crossover&&htfF>htfS&&sl>0){const risk=entry-sl;if(risk>0&&risk<entry*.1)sig={type:'BUY',entry,sl,tp1:entry+risk*set.rr1,tp2:entry+risk*set.rr2}}
  if(crossunder&&htfF<htfS&&sh>0){const risk=sh-entry;if(risk>0&&risk<entry*.1)sig={type:'SELL',entry,sl:sh,tp1:entry-risk*set.rr1,tp2:entry-risk*set.rr2}}
  return{fast:fa[li],slow:sa[li],swing:sl,sig,fa,sa};
}

// Spatrev AI
function spatrevSig(candles){
  const c=candles.map(x=>x.close),h=candles.map(x=>x.high),l=candles.map(x=>x.low);
  const li=candles.length-1;if(li<55)return{};
  const e20=ema(c,20),e50=ema(c,50),rs=rsi(c,14),ad=adx(h,l,c,14),at=atr(c,14);
  const ri=li-13,rn=(ri>=0&&ri<rs.length)?rs[ri]:rs[rs.length-1],an=ad.length>0?ad[ad.length-1]:0;
  // Check buy
  let sig=null;
  const nb=Math.abs(c[li]-e20[li])<=at*.1,cb=c[li-1]<e20[li-1]&&c[li]>e20[li];
  if(e20[li]>e50[li]&&rn>=38&&rn<=50&&an>25&&cb&&nb){
    const sl=Math.min(...l.slice(-5))-at*1.5,tp1=c[li]+(c[li]-sl)*1,tp2=c[li]+(c[li]-sl)*2.5;
    sig={type:'BUY',entry:c[li],sl,tp1,tp2};
  }
  const ca=c[li-1]>e20[li-1]&&c[li]<e20[li];
  if(e20[li]<e50[li]&&rn>=50&&rn<=62&&an>25&&ca&&nb){
    const sl=Math.max(...h.slice(-5))+at*1.5,tp1=c[li]-(sl-c[li])*1,tp2=c[li]-(sl-c[li])*2.5;
    sig={type:'SELL',entry:c[li],sl,tp1,tp2};
  }
  return{rsi:rn,adx:an,sig};
}

// ======== CHART ========
async function loadChart(pair,tf){
  const loadEl=document.getElementById('chartLoad'),box=document.getElementById('chartBox');
  // Cleanup
  if(pollTimer){clearInterval(pollTimer);pollTimer=null}
  clearSigLines();
  if(chart){try{chart.remove()}catch(e){}chart=null}
  chartData=[];activeSig=null;
  Object.keys(series).forEach(k=>series[k]=null);
  
  loadEl.style.display='flex';loadEl.innerHTML='<span class="sp"></span><span>Loading '+pair.replace('USDT','')+' '+tf+'...</span>';
  
  try{
    if(typeof LightweightCharts==='undefined')throw Error('Library not loaded');
    const limit=tf==='1m'?500:200;
    const res=await fetch(`https://api.binance.com/api/v3/klines?symbol=${pair}&interval=${tf}&limit=${limit}`);
    if(!res.ok)throw Error('API error');
    const raw=await res.json();
    chartData=raw.map(k=>({time:Math.floor(k[0]/1000),open:+k[1],high:+k[2],low:+k[3],close:+k[4],volume:+k[5]}));
    if(chartData.length<30)throw Error('Not enough data');
    
    loadEl.style.display='none';
    
    chart=LightweightCharts.createChart(box,{
      layout:{background:{color:'#0b0e11'},textColor:'#848e9c'},
      grid:{vertLines:{color:'#1e2329'},horzLines:{color:'#1e2329'}},
      timeScale:{timeVisible:true,secondsVisible:tf==='1m',borderColor:'#2b3139'},
      rightPriceScale:{borderColor:'#2b3139'},
      crosshair:{mode:LightweightCharts.CrosshairMode.Normal},
    });
    
    series.candle=chart.addCandlestickSeries({upColor:'#0ecb81',downColor:'#f6465d',borderUpColor:'#0ecb81',borderDownColor:'#f6465d',wickUpColor:'#0ecb81',wickDownColor:'#f6465d'});
    series.candle.setData(chartData);
    
    // Run indicators
    updateIndicators();
    chart.timeScale().fitContent();
    
    // Poll
    pollTimer=setInterval(()=>pollChart(pair,tf),6000);
  }catch(e){
    loadEl.innerHTML='<span style="color:var(--red)">⚠️ '+e.message+'</span>';
    setTimeout(()=>{loadEl.style.display='none'},5000);
  }
}

function updateIndicators(){
  if(!chart||!chartData.length)return;
  
  const c=chartData,r=indOn.veltrix?veltrixSig(c,S):{};
  const r2=indOn.spatrev?spatrevSig(c):{};
  
  // Remove old MA lines
  if(series.fastMA){try{chart.removeSeries(series.fastMA)}catch(e){}series.fastMA=null}
  if(series.slowMA){try{chart.removeSeries(series.slowMA)}catch(e){}series.slowMA=null}
  
  // Draw MA lines for active indicators
  if(indOn.veltrix&&r.fa&&r.sa){
    series.fastMA=chart.addLineSeries({color:'#0066ff',lineWidth:2,lastValueVisible:false,priceLineVisible:false});
    series.fastMA.setData(r.fa.map((v,i)=>v!==null?{time:chartData[i].time,value:v}:null).filter(x=>x));
    series.slowMA=chart.addLineSeries({color:'#FF6D00',lineWidth:2,lastValueVisible:false,priceLineVisible:false});
    series.slowMA.setData(r.sa.map((v,i)=>v!==null?{time:chartData[i].time,value:v}:null).filter(x=>x));
  }
  if(indOn.spatrev){
    const cl=chartData.map(x=>x.close),e20=ema(cl,20),e50=ema(cl,50);
    if(!series.fastMA){series.fastMA=chart.addLineSeries({color:'#2962FF',lineWidth:2,lastValueVisible:false,priceLineVisible:false});series.slowMA=chart.addLineSeries({color:'#FF6D00',lineWidth:2,lastValueVisible:false,priceLineVisible:false})}
    series.fastMA.setData(e20.map((v,i)=>({time:chartData[i].time,value:v})));
    series.slowMA.setData(e50.map((v,i)=>({time:chartData[i].time,value:v})));
  }
  
  // Check signal (prefer active indicator)
  const sig=r.sig||r2.sig;
  const li=chartData.length-1;
  
  // Update status bar
  if(indOn.veltrix){
    document.getElementById('sma9').textContent=r.fast?r.fast.toFixed(2):'—';
    document.getElementById('sma21').textContent=r.slow?r.slow.toFixed(2):'—';
    document.getElementById('swingVal').textContent=r.swing?r.swing.toFixed(2):'—';
  }else if(indOn.spatrev){
    document.getElementById('sma9').textContent=r2.rsi?r2.rsi.toFixed(1):'—';
    document.getElementById('sma21').textContent=r2.adx?r2.adx.toFixed(1):'—';
    document.getElementById('swingVal').textContent='—';
  }
  
  const tg=document.getElementById('sigTag'),sv=document.getElementById('sigVal');
  if(sig){
    tg.className='tag '+(sig.type==='BUY'?'buy':'sell');tg.textContent='Signal: '+sig.type;
    sv.textContent=sig.type+' @ $'+fp(sig.entry);
    if(!activeSig||activeSig.time!==chartData[li].time){
      clearSigLines();activeSig={...sig,time:chartData[li].time};drawSigLines();
    }
    series.candle.setMarkers([{time:chartData[li].time,position:sig.type==='BUY'?'belowBar':'aboveBar',color:sig.type==='BUY'?'#0ecb81':'#f6465d',shape:sig.type==='BUY'?'arrowUp':'arrowDown',text:sig.type}]);
  }else{
    tg.className='tag';tg.textContent='Ready';sv.textContent='—';
    if(activeSig&&li-chartData.findIndex(d=>d.time===activeSig.time)>3){clearSigLines();activeSig=null}
  }
  // Historical markers
  addMarkers();
  renderDash(sig);
}

function addMarkers(){
  if(!chart||!series.candle||!chartData.length)return;
  const markers=[];
  for(let i=55;i<chartData.length-1;i++){
    const sub=chartData.slice(0,i+1);
    const r=indOn.veltrix?veltrixSig(sub,S):{},r2=indOn.spatrev?spatrevSig(sub):{},sig=r.sig||r2.sig;
    if(sig)markers.push({time:chartData[i].time,position:sig.type==='BUY'?'belowBar':'aboveBar',color:sig.type==='BUY'?'#0ecb81':'#f6465d',shape:sig.type==='BUY'?'arrowUp':'arrowDown',text:sig.type})
  }
  series.candle.setMarkers(markers.slice(-50));
}

async function pollChart(pair,tf){
  if(!chart||!series.candle||!chartData.length)return;
  try{
    const res=await fetch(`https://api.binance.com/api/v3/klines?symbol=${pair}&interval=${tf}&limit=3`);
    if(!res.ok)return;const raw=await res.json();
    const nd=raw.map(k=>({time:Math.floor(k[0]/1000),open:+k[1],high:+k[2],low:+k[3],close:+k[4],volume:+k[5]}));
    if(!nd.length)return;
    const lt=chartData[chartData.length-1].time,nt=nd[nd.length-1].time;
    if(nt===lt){const u=nd[nd.length-1];chartData[chartData.length-1]=u;series.candle.update(u)}
    else{for(const d of nd){if(d.time>lt){chartData.push(d);series.candle.update(d)}}}
    updateIndicators();
  }catch(e){}
}

function drawSigLines(){
  if(!activeSig||!chart)return;
  const s=activeSig,si=chartData.findIndex(d=>d.time===s.time);if(si<0)return;
  const ei=Math.min(si+4,chartData.length-1),et=chartData[ei].time,sc=s.type==='BUY'?'#0ecb81':'#f6465d';
  series.en=chart.addLineSeries({color:'#eaecef',lineWidth:1,lineStyle:3,lastValueVisible:true,priceLineVisible:false});
  series.en.setData([{time:s.time,value:s.entry},{time:et,value:s.entry}]);
  series.sl=chart.addLineSeries({color:'#f6465d',lineWidth:2,lineStyle:2,lastValueVisible:true,priceLineVisible:false});
  series.sl.setData([{time:s.time,value:s.sl},{time:et,value:s.sl}]);
  series.t1=chart.addLineSeries({color:sc,lineWidth:1,lineStyle:3,lastValueVisible:true,priceLineVisible:false});
  series.t1.setData([{time:s.time,value:s.tp1},{time:et,value:s.tp1}]);
  series.t2=chart.addLineSeries({color:sc,lineWidth:2,lineStyle:0,lastValueVisible:true,priceLineVisible:false});
  series.t2.setData([{time:s.time,value:s.tp2},{time:et,value:s.tp2}]);
}

function clearSigLines(){
  if(!chart)return;
  ['en','sl','t1','t2'].forEach(k=>{if(series[k]){try{chart.removeSeries(series[k])}catch(e){}series[k]=null}})
}

// ======== DASHBOARD ========
function renderDash(sig){
  const box=document.getElementById('dashBox'),grid=document.getElementById('dashGrid');
  const {wins:W,losses:L,dw:DW,dl:DL,ww:WW,wl:WL,mw:MW,ml:ML}=vState;
  const total=W+L;if(!total){box.style.display='none';return}
  box.style.display='block';
  const wr=total>0?(W/total*100).toFixed(1):'N/A',dw=DW+DL>0?(DW/(DW+DL)*100).toFixed(1):'N/A',ww=WW+WL>0?(WW/(WW+WL)*100).toFixed(1):'N/A',mw=MW+ML>0?(MW/(MW+ML)*100).toFixed(1):'N/A';
  const status=sig?sig.type==='BUY'?'🟢 LONG':'🔴 SHORT':'⚪ NO TRADE';
  grid.innerHTML=
    `<div class="dc h" style="background:#0066ff">⚡ VELTRIX AI</div><div class="dc h" style="background:#0044cc">SCANNER 2.0</div><div class="dc h" style="background:#0044cc"></div><div class="dc h" style="background:#0044cc"></div>`+
    `<div class="dc sh">📊 TOTAL</div><div class="dc sh"></div><div class="dc sh"></div><div class="dc sh"></div>`+
    `<div class="dc l">Wins</div><div class="dc v w">${W}</div><div class="dc l">Losses</div><div class="dc v l">${L}</div>`+
    `<div class="dc l">Win %</div><div class="dc v" style="color:${total>0?W/total>=.7?'#00ff88':W/total>=.5?'#ffaa00':'#ff4444':'#666'}">${wr}%</div><div class="dc l"></div><div class="dc v"></div>`+
    `<div class="dc sh">📅 TODAY</div><div class="dc sh"></div><div class="dc sh"></div><div class="dc sh"></div>`+
    `<div class="dc l">Wins</div><div class="dc v w">${DW}</div><div class="dc l">Losses</div><div class="dc v l">${DL}</div>`+
    `<div class="dc l">Win %</div><div class="dc v" style="color:${dw!=='N/A'?+dw>=70?'#00ff88':+dw>=50?'#ffaa00':'#ff4444':'#666'}">${dw}%</div><div class="dc l"></div><div class="dc v"></div>`+
    `<div class="dc sh">📆 WEEK</div><div class="dc v">${WW}W/${WL}L</div><div class="dc sh">🗓 MONTH</div><div class="dc v">${MW}W/${ML}L</div>`+
    `<div class="dc sh">STATUS</div><div class="dc v" style="color:${sig?sig.type==='BUY'?'var(--green)':'var(--red)':'var(--text2)'}">${status}</div><div class="dc sh">SIGNAL</div><div class="dc v" style="color:#00ddff">${sig?sig.type:'None'}</div>`;
}

// ======== EVENTS ========
sel.addEventListener('change',()=>{curPair=sel.value;loadChart(curPair,curTF)});
document.querySelectorAll('#tfGroup button').forEach(b=>{b.addEventListener('click',()=>{document.querySelectorAll('#tfGroup button').forEach(x=>x.classList.remove('on'));b.classList.add('on');curTF=b.dataset.tf;loadChart(curPair,curTF)})});

// Indicator toggles
document.querySelectorAll('.ind-switch').forEach(b=>{b.addEventListener('click',()=>{
  const ind=b.dataset.ind;
  // Toggle on/off
  if(indOn[ind]){indOn[ind]=false;b.classList.remove('on')}
  else{indOn[ind]=true;b.classList.add('on')}
  // If both off, turn this one on
  if(!indOn.veltrix&&!indOn.spatrev){indOn[ind]=true;b.classList.add('on')}
  if(chartData.length)updateIndicators();
})});

// Settings toggle
document.getElementById('settingsToggle').addEventListener('click',function(){
  document.getElementById('settingsPanel').classList.toggle('show');this.classList.toggle('on')
});
document.getElementById('applySettings').addEventListener('click',()=>{
  S.fast=parseInt(document.getElementById('sFast').value)||9;
  S.slow=parseInt(document.getElementById('sSlow').value)||21;
  S.htf=parseInt(document.getElementById('sHtf').value)||4;
  S.swing=parseInt(document.getElementById('sSwing').value)||10;
  S.pivot=parseInt(document.getElementById('sPivot').value)||5;
  S.rr1=parseFloat(document.getElementById('sRr1').value)||1;
  S.rr2=parseFloat(document.getElementById('sRr2').value)||2;
  S.line=parseInt(document.getElementById('sLine').value)||30;
  if(chartData.length)updateIndicators();
});

// ======== SCANNER ========
const SCAN_PAIRS=['BTCUSDT','BNBUSDT','ETHUSDT','SOLUSDT','XRPUSDT','DOGEUSDT','TRXUSDT','XLMUSDT','ZECUSDT','WLDUSDT','ASTERUSDT','NEARUSDT','FETUSDT','MEMEUSDT','PORTALUSDT','ALLOUSDT','GENIUSUSDT','HBARUSDT','ONDOUSDT','TONUSDT','SUIUSDT','INJUSDT','HEIUSDT','NFPUSDT'];
const SCAN_TFS=['1m','3m','5m','15m','1h'];
let scanning=false;
document.getElementById('scanBtn').addEventListener('click',async function(){
  if(scanning)return;scanning=true;
  const btn=this;btn.textContent='⏳ Scanning...';btn.disabled=true;
  document.getElementById('scanStatus').textContent='Scanning...';
  document.getElementById('noSig').style.display='none';
  const all=[];let sc=0;
  for(const sym of SCAN_PAIRS){
    const rs=await Promise.all(SCAN_TFS.map(async tf=>{try{const r=await fetch(`https://api.binance.com/api/v3/klines?symbol=${sym}&interval=${tf}&limit=100`);if(!r.ok)throw Error();const d=await r.json();return{tf,data:d.map(k=>({time:k[0],open:+k[1],high:+k[2],low:+k[3],close:+k[4],volume:+k[5]}))}}catch(e){return{tf,data:null}}}));
    const kd={};for(const r of rs)kd[r.tf]=r.data;
    for(const tf of SCAN_TFS){const c=kd[tf];if(!c||c.length<55)continue;
      const r=indOn.veltrix?veltrixSig(c,S):{},r2=indOn.spatrev?spatrevSig(c):{},sig=r.sig||r2.sig;
      if(sig){const base=sym.replace('USDT','');all.push({type:sig.type,sym,base,tf,entry:sig.entry,sl:sig.sl,tp1:sig.tp1,tp2:sig.tp2})}}
    sc++;btn.textContent=`⏳ ${sc}/${SCAN_PAIRS.length}`;
  }
  const grid=document.getElementById('sigGrid'),ns=document.getElementById('noSig');
  if(!all.length){ns.style.display='block';ns.innerHTML=`<p style="font-size:24px;margin-bottom:4px">📡</p><p style="font-size:13px">No signals</p>`}
  else{ns.style.display='none';const frag=document.createDocumentFragment();
    for(const s of all){const card=document.createElement('div');card.className=`sig-card ${s.type==='BUY'?'buy':'sell'}`;
      card.addEventListener('click',()=>{sel.value=s.sym;curPair=s.sym;loadChart(s.sym,curTF)});
      card.innerHTML=`<div style="display:flex;justify-content:space-between;margin-bottom:4px"><span style="font-weight:700;font-size:12px">${s.type}</span><span style="font-size:10px;color:var(--text2)">${s.tf}</span></div><div style="font-size:15px;font-weight:700">${s.base}<span style="font-weight:400;font-size:12px">/USDT</span></div><div style="font-size:11px;color:var(--text2);margin:4px 0">Entry: <b>$${fp(s.entry)}</b></div><div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:4px"><div style="background:var(--bg);border-radius:4px;padding:4px;text-align:center"><div style="font-size:8px;color:var(--text2)">SL</div><div style="font-weight:700;font-size:11px;color:var(--red)">$${fp(s.sl)}</div></div><div style="background:var(--bg);border-radius:4px;padding:4px;text-align:center"><div style="font-size:8px;color:var(--text2)">TP1</div><div style="font-weight:700;font-size:11px;color:var(--green)">$${fp(s.tp1)}</div></div><div style="background:var(--bg);border-radius:4px;padding:4px;text-align:center"><div style="font-size:8px;color:var(--text2)">TP2</div><div style="font-weight:700;font-size:11px;color:var(--green)">$${fp(s.tp2)}</div></div></div>`;
      frag.appendChild(card)}
    grid.innerHTML='';grid.appendChild(frag);}
  btn.textContent='🔄 Scan Again';btn.disabled=false;
  document.getElementById('scanStatus').textContent=`${all.length} signals`;
  scanning=false;
});

loadChart('BTCUSDT','1h');
