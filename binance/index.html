<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Veltrix AI — Live Charts</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{width:100%;height:100%;overflow:hidden;background:#0b0e11;color:#eaecef;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;font-size:14px}
  :root{--go:#f0b90b;--s1:#1e2329;--s2:#2b3139;--b:#2b3139;--t2:#848e9c}
  
  .hdr{display:flex;align-items:center;padding:0 12px;height:40px;background:#161b22;border-bottom:1px solid #30363d}
  .hdr .l{font-weight:700;font-size:13px;display:flex;align-items:center;gap:4px;color:#eaecef}
  .hdr .l span{color:var(--go)}
  .hdr .l small{font-size:10px;color:var(--t2);font-weight:400}
  .hdr .n{margin-left:auto;display:flex;gap:12px}
  .hdr .n a{color:var(--t2);text-decoration:none;font-size:11px}
  .hdr .n a:hover{color:#eaecef}
  .hdr .n a.act{color:var(--go)}
  
  .bar{display:flex;align-items:center;gap:4px;padding:4px 8px;background:var(--s1);border-bottom:1px solid var(--b);flex-wrap:wrap;min-height:34px}
  
  .ib{padding:3px 10px;font-size:11px;background:var(--s2);border:1px solid var(--b);border-radius:4px;color:var(--t2);cursor:pointer;font-weight:500;white-space:nowrap}
  .ib:hover{border-color:var(--t2)}
  .ib.on{background:#1a2332;border-color:var(--go);color:var(--go)}
  
  .sep{width:1px;height:16px;background:var(--b);margin:0 4px;flex-shrink:0}
  
  .tb{padding:3px 8px;font-size:10px;background:transparent;border:1px solid transparent;border-radius:4px;color:var(--t2);cursor:pointer;font-weight:500;white-space:nowrap}
  .tb:hover{color:#eaecef;background:var(--s2)}
  .tb.act{background:var(--go);color:#0b0e11}
  
  .hint{font-size:9px;color:var(--t2);margin-left:auto;white-space:nowrap;opacity:0.6}
  @media(max-width:600px){.hint{display:none}}
  
  .w{flex:1;position:relative;min-height:0}
  #tv{position:absolute;inset:0;width:100%;height:100%}
  
  .ld{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:#131722;z-index:10;flex-direction:column;gap:8px;transition:opacity .4s}
  .ld.h{opacity:0;pointer-events:none}
  .sp{width:22px;height:22px;border:2px solid #30363d;border-top-color:var(--go);border-radius:50%;animation:s .7s linear infinite}
  @keyframes s{to{transform:rotate(360deg)}}
  .lt{font-size:11px;color:var(--t2)}
  
  .app{display:flex;flex-direction:column;height:100vh;width:100vw}
</style>
</head>
<body>
<div class="app">

  <div class="hdr">
    <div class="l"><span>◆</span> Veltrix AI <small>/ Charts</small></div>
    <div class="n">
      <a href="/">Home</a>
      <a href="/vip/">VIP</a>
      <a href="/binance/" class="act">Charts</a>
    </div>
  </div>

  <div class="bar">
    <button class="ib on" id="iv" onclick="tog('iv')">Veltrix AI</button>
    <button class="ib" id="is" onclick="tog('is')">Spatrev AI</button>
    <span class="sep"></span>
    <button class="tb act" onclick="chTF('15',this)">15m</button>
    <button class="tb" onclick="chTF('60',this)">1h</button>
    <button class="tb" onclick="chTF('240',this)">4h</button>
    <button class="tb" onclick="chTF('1D',this)">1D</button>
    <span class="hint">TV toolbar: indicators · drawings · more</span>
  </div>

  <div class="w">
    <div class="ld" id="ld">
      <div class="sp"></div>
      <div class="lt">Loading TradingView chart...</div>
    </div>
    <div id="tv"></div>
  </div>

</div>

<script src="https://s3.tradingview.com/tv.js"></script>
<script>
let w = null, curTF = '15', curSym = 'BINANCE:BTCUSDT';

// Get which studies are active
function getStudies() {
  var s = [];
  if (document.getElementById('iv').classList.contains('on')) {
    s.push({ id: 'MA@tv-basicstudies', inputs: { length: 9 } });
    s.push({ id: 'MA@tv-basicstudies', inputs: { length: 21 } });
  }
  if (document.getElementById('is').classList.contains('on')) {
    s.push({ id: 'MASimple@tv-basicstudies', inputs: { length: 20 } });
    s.push({ id: 'MASimple@tv-basicstudies', inputs: { length: 50 } });
  }
  return s;
}

function buildTV() {
  if (typeof TradingView === 'undefined') { setTimeout(buildTV, 400); return; }
  
  // Clear container
  document.getElementById('tv').innerHTML = '';
  
  // Remove old widget
  if (w) { try { w.remove(); } catch(e) {} w = null; }
  
  w = new TradingView.widget({
    container_id: 'tv',
    symbol: curSym,
    interval: curTF,
    theme: 'dark',
    style: '1',
    locale: 'en',
    toolbar_bg: '#0b0e11',
    enable_publishing: false,
    allow_symbol_change: true,
    hide_top_toolbar: false,
    hide_legend: false,
    save_image: false,
    autosize: true,
    studies: getStudies(),
    disabled_features: [],
    enabled_features: [
      'show_hide_button_on_legend',
      'move_logo_to_main_pane',
      'study_templates',
      'use_localstorage_for_settings',
    ],
    overrides: {
      'paneProperties.background': '#131722',
      'paneProperties.vertGridProperties.color': '#1e222d',
      'paneProperties.horzGridProperties.color': '#1e222d',
      'scalesProperties.textColor': '#848e9c',
    },
    loading_screen: { backgroundColor: '#131722' },
  });
  
  setTimeout(() => document.getElementById('ld').classList.add('h'), 6000);
}

// Toggle indicator - rebuild widget with new studies
function tog(id) {
  document.getElementById(id).classList.toggle('on');
  buildTV();
}

// Change timeframe - rebuild widget with new interval
function chTF(tf, btn) {
  curTF = tf;
  document.querySelectorAll('.tb').forEach(function(b) { b.classList.remove('act'); });
  if (btn) btn.classList.add('act');
  
  if (w) {
    // Try rebuilding (reload)
    buildTV();
  }
}

// Resize
var rt;
window.addEventListener('resize', function() {
  clearTimeout(rt);
  rt = setTimeout(function() { if (w) try { w.resize(); } catch(e) {} }, 200);
});

// Start
buildTV();
</script>
</body>
</html>
