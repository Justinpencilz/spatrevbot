<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spatrev Binance - Live Market Data</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0d1117;color:#c9d1d9;min-height:100vh}
  .header{background:#161b22;border-bottom:1px solid #30363d;padding:12px 20px;display:flex;align-items:center;justify-content:space-between}
  .header h1{font-size:20px;color:#f0f6fc;display:flex;align-items:center;gap:8px}
  .header h1 span{color:#f0b90b}
  .header .last-update{font-size:12px;color:#8b949e}
  .layout{display:flex;height:calc(100vh - 52px)}
  .sidebar{width:300px;min-width:300px;background:#0d1117;border-right:1px solid #30363d;overflow-y:auto;display:flex;flex-direction:column}
  .sidebar .search-box{padding:10px;border-bottom:1px solid #30363d}
  .sidebar .search-box input{width:100%;padding:8px 12px;background:#21262d;border:1px solid #30363d;border-radius:6px;color:#c9d1d9;font-size:13px;outline:none}
  .sidebar .search-box input:focus{border-color:#f0b90b}
  .sidebar .ticker-header{display:flex;padding:8px 12px;font-size:11px;color:#8b949e;text-transform:uppercase;border-bottom:1px solid #21262d;font-weight:600}
  .sidebar .ticker-header .col-pair{flex:1}
  .sidebar .ticker-header .col-price{width:80px;text-align:right}
  .sidebar .ticker-header .col-change{width:70px;text-align:right}
  .ticker-list{flex:1;overflow-y:auto}
  .ticker-item{display:flex;align-items:center;padding:6px 12px;cursor:pointer;border-bottom:1px solid #161b22;transition:background 0.15s}
  .ticker-item:hover{background:#161b22}
  .ticker-item.active{background:#1a2332;border-left:3px solid #f0b90b}
  .ticker-item .pair{flex:1;font-size:13px;font-weight:500}
  .ticker-item .pair .base{color:#f0f6fc}
  .ticker-item .pair .quote{color:#8b949e;font-size:11px}
  .ticker-item .price{width:80px;text-align:right;font-size:13px;font-family:'SF Mono','Consolas',monospace}
  .ticker-item .change{width:70px;text-align:right;font-size:12px;font-weight:500}
  .ticker-item .change.up{color:#3fb950}
  .ticker-item .change.down{color:#f85149}
  .ticker-item .change.flat{color:#8b949e}
  .main{flex:1;display:flex;flex-direction:column;background:#131722}
  .chart-toolbar{display:flex;align-items:center;gap:8px;padding:8px 16px;background:#131722;border-bottom:1px solid #2a2e39}
  .chart-toolbar .symbol-name{font-size:18px;font-weight:600;color:#f0f6fc;margin-right:8px}
  .chart-toolbar .symbol-price{font-size:16px;font-weight:600;margin-right:12px}
  .chart-toolbar .symbol-price.up{color:#3fb950}
  .chart-toolbar .symbol-price.down{color:#f85149}
  .chart-container{flex:1;position:relative;min-height:0}
  #tv-chart{width:100%;height:100%;position:absolute;inset:0}
  .status-bar{display:flex;justify-content:space-between;padding:4px 16px;background:#131722;border-top:1px solid #2a2e39;font-size:11px;color:#8b949e}
  .loading-overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:#131722;z-index:10;transition:opacity 0.5s}
  .loading-overlay.hidden{opacity:0;pointer-events:none}
  .spinner{width:32px;height:32px;border:3px solid #30363d;border-top-color:#f0b90b;border-radius:50%;animation:spin 0.8s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .status-dot{display:inline-block;width:6px;height:6px;border-radius:50%;margin-right:4px}
  .status-dot.green{background:#3fb950}
  .sidebar::-webkit-scrollbar,.ticker-list::-webkit-scrollbar{width:4px}
  .sidebar::-webkit-scrollbar-track,.ticker-list::-webkit-scrollbar-track{background:transparent}
  .sidebar::-webkit-scrollbar-thumb,.ticker-list::-webkit-scrollbar-thumb{background:#30363d;border-radius:2px}
  .chart-error{display:none;position:absolute;inset:0;background:#131722;flex-direction:column;align-items:center;justify-content:center;z-index:5;text-align:center;padding:20px;gap:12px}
  .chart-error.visible{display:flex}
  .chart-error h3{color:#f0b90b;font-size:16px}
  .chart-error p{color:#8b949e;font-size:13px;max-width:400px}
  .chart-error .retry-btn{padding:8px 20px;background:#f0b90b;color:#0d1117;border:none;border-radius:6px;font-weight:600;cursor:pointer}
</style>
</head>
<body>

<div class="header">
  <h1><span>◆</span> Spatrev Binance <span style="font-size:12px;color:#8b949e;font-weight:400">Live Market Data</span></h1>
  <div class="last-update" id="updateStatus">Connecting...</div>
</div>

<div class="layout">
  <div class="sidebar">
    <div class="search-box">
      <input type="text" id="searchInput" placeholder="Search pairs..." oninput="filterPairs()">
    </div>
    <div class="ticker-header">
      <span class="col-pair">Pair</span>
      <span class="col-price">Price</span>
      <span class="col-change">24h%</span>
    </div>
    <div class="ticker-list" id="tickerList"></div>
  </div>

  <div class="main">
    <div class="chart-toolbar">
      <span class="symbol-name" id="symbolName">BTCUSDT</span>
      <span class="symbol-price up" id="symbolPrice">—</span>
      <span style="flex:1"></span>
      <span style="font-size:11px;color:#8b949e">TradingView Chart</span>
    </div>

    <div class="chart-container">
      <div class="loading-overlay" id="loadingOverlay">
        <div class="spinner"></div>
        <div style="margin-top:12px;font-size:12px;color:#8b949e" id="loadMsg">Loading TradingView chart...</div>
      </div>
      <div class="chart-error" id="chartError">
        <h3>⚠️ Chart Not Loading</h3>
        <p id="errorMsg">TradingView widget could not load. Try refreshing or check your ad blocker.</p>
        <button class="retry-btn" onclick="location.reload()">Retry</button>
      </div>
      <div id="tv-chart"></div>
    </div>

    <div class="status-bar">
      <span><span class="status-dot green"></span>Binance Live</span>
      <span id="pairsCount">0 pairs</span>
      <span id="statusTime"></span>
    </div>
  </div>
</div>

<script src="https://s3.tradingview.com/tv.js"></script>
<script>
const state = {
  allTickers: [],
  tickersMap: {},
  currentSymbol: 'BTCUSDT',
  chartWidget: null,
  initAttempts: 0
};

// ======== BINANCE TICKERS ========
async function fetchTickers() {
  try {
    const [tickerRes, statsRes] = await Promise.all([
      fetch('https://api.binance.com/api/v3/ticker/price'),
      fetch('https://api.binance.com/api/v3/ticker/24hr')
    ]);
    if (!tickerRes.ok || !statsRes.ok) throw new Error('API error');
    const prices = await tickerRes.json();
    const stats = await statsRes.json();
    const statsMap = {};
    stats.forEach(s => { statsMap[s.symbol] = s });

    state.allTickers = prices
      .filter(p => p.symbol.endsWith('USDT'))
      .map(p => {
        const stat = statsMap[p.symbol];
        return {
          symbol: p.symbol,
          base: p.symbol.replace('USDT', ''),
          price: parseFloat(p.price),
          priceChangePercent: stat ? parseFloat(stat.priceChangePercent) : 0,
          quoteVolume: stat ? parseFloat(stat.quoteVolume) : 0
        };
      })
      .sort((a, b) => b.quoteVolume - a.quoteVolume);

    state.allTickers.forEach(t => { state.tickersMap[t.symbol] = t });
    renderTickers();
    updateStatus();
    document.getElementById('loadMsg').textContent = `Loaded ${state.allTickers.length} pairs. Loading chart...`;
  } catch (err) {
    console.error('Ticker fetch failed:', err);
    document.getElementById('loadMsg').textContent = 'Fetching market data...';
  }
}

function renderTickers(filter) {
  const list = document.getElementById('tickerList');
  let items = state.allTickers;
  if (filter) {
    const f = filter.toLowerCase();
    items = items.filter(t => t.base.toLowerCase().includes(f));
  }
  list.innerHTML = items.map(t => {
    const change = t.priceChangePercent;
    const changeClass = change > 0 ? 'up' : change < 0 ? 'down' : 'flat';
    const changeSign = change > 0 ? '+' : '';
    const active = t.symbol === state.currentSymbol ? 'active' : '';
    return `<div class="ticker-item ${active}" data-symbol="${t.symbol}" onclick="selectPair('${t.symbol}')">
      <div class="pair"><span class="base">${t.base}</span><span class="quote">/USDT</span></div>
      <div class="price">${fmtPrice(t.price)}</div>
      <div class="change ${changeClass}">${changeSign}${change.toFixed(2)}%</div>
    </div>`;
  }).join('');
  document.getElementById('pairsCount').textContent = `${items.length} pairs`;
}

function filterPairs() { renderTickers(document.getElementById('searchInput').value); }

function fmtPrice(p) {
  if (p >= 1000) return p.toLocaleString(undefined, {minimumFractionDigits:2,maximumFractionDigits:2});
  if (p >= 1) return p.toFixed(4);
  if (p >= 0.01) return p.toFixed(6);
  return p.toFixed(8);
}

function fmtPriceShort(p) {
  if (p >= 1000) return p.toLocaleString(undefined, {maximumFractionDigits:2});
  if (p >= 1) return p.toFixed(2);
  if (p >= 0.01) return p.toFixed(4);
  return p.toFixed(6);
}

function selectPair(symbol) {
  state.currentSymbol = symbol;
  document.querySelectorAll('.ticker-item').forEach(el => {
    el.classList.toggle('active', el.dataset.symbol === symbol);
  });
  const t = state.tickersMap[symbol];
  if (t) {
    document.getElementById('symbolName').textContent = symbol;
    const el = document.getElementById('symbolPrice');
    el.textContent = '$' + fmtPriceShort(t.price);
    el.className = 'symbol-price ' + (t.priceChangePercent >= 0 ? 'up' : 'down');
  }
  updateChart(symbol);
}

// ======== TRADINGVIEW CHART ========
function initTV() {
  state.initAttempts++;
  
  if (typeof TradingView === 'undefined') {
    if (state.initAttempts < 50) {
      document.getElementById('loadMsg').textContent = 'Loading TradingView engine...';
      setTimeout(initTV, 500);
      return;
    }
    showError('TradingView library failed to load. Check your internet connection or ad blocker.');
    return;
  }
  
  document.getElementById('loadMsg').textContent = 'Rendering chart...';
  createWidget(state.currentSymbol);
  
  // Always hide loading after a delay
  setTimeout(hideLoading, 5000);
}

function createWidget(symbol) {
  const container = document.getElementById('tv-chart');
  
  if (state.chartWidget) {
    try { state.chartWidget.remove(); } catch(e) {}
    container.innerHTML = '';
  }
  
  // Hide error if visible
  document.getElementById('chartError').classList.remove('visible');
  
  try {
    state.chartWidget = new TradingView.widget({
      container_id: "tv-chart",
      symbol: `BINANCE:${symbol}`,
      interval: "15",
      theme: "dark",
      style: "1",
      locale: "en",
      toolbar_bg: "#131722",
      enable_publishing: false,
      allow_symbol_change: false,
      hide_top_toolbar: false,
      hide_legend: false,
      save_image: false,
      studies: [],
      autosize: true,
      time_frames: [
        { text: "1m", resolution: "1" },
        { text: "3m", resolution: "3" },
        { text: "5m", resolution: "5" },
        { text: "15m", resolution: "15" },
        { text: "1h", resolution: "60" },
        { text: "4h", resolution: "240" },
        { text: "1D", resolution: "1D" },
      ],
      disabled_features: [
        "use_localstorage_for_settings",
        "header_symbol_search",
        "symbol_search_hot_key",
        "header_compare",
      ],
      enabled_features: [
        "show_hide_button_on_legend",
        "move_logo_to_main_pane",
      ],
      overrides: {
        "paneProperties.background": "#131722",
        "paneProperties.vertGridProperties.color": "#1e222d",
        "paneProperties.horzGridProperties.color": "#1e222d",
        "scalesProperties.textColor": "#8b949e",
      },
      loading_screen: { backgroundColor: "#131722" },
    });
    
    // Hide loading when widget fires chart_ready
    state.chartWidget.onChartReady && state.chartWidget.onChartReady(hideLoading);
    
  } catch(e) {
    console.error('TV widget create error:', e);
    showError('Could not create chart: ' + e.message);
  }
}

function updateChart(symbol) {
  if (!state.chartWidget) {
    createWidget(symbol);
    return;
  }
  try {
    state.chartWidget.setSymbol(`BINANCE:${symbol}`);
  } catch(e) {
    createWidget(symbol);
  }
}

function hideLoading() {
  document.getElementById('loadingOverlay').classList.add('hidden');
}

function showError(msg) {
  hideLoading();
  document.getElementById('errorMsg').textContent = msg || 'TradingView widget could not load. Try refreshing.';
  document.getElementById('chartError').classList.add('visible');
}

// ======== PRICE UPDATE ========
async function updatePrice() {
  try {
    const res = await fetch(`https://api.binance.com/api/v3/ticker/24hr?symbol=${state.currentSymbol}`);
    if (res.ok) {
      const d = await res.json();
      const price = parseFloat(d.lastPrice);
      const change = parseFloat(d.priceChangePercent);
      const el = document.getElementById('symbolPrice');
      el.textContent = '$' + fmtPriceShort(price);
      el.className = 'symbol-price ' + (change >= 0 ? 'up' : 'down');
    }
  } catch(e) {}
}

function updateStatus() {
  document.getElementById('updateStatus').textContent = `Live • ${state.allTickers.length} pairs`;
  document.getElementById('statusTime').textContent = `Updated: ${new Date().toLocaleTimeString()}`;
}

window.addEventListener('resize', () => {
  if (state.chartWidget) {
    try { state.chartWidget.resize(); } catch(e) {}
  }
});

// ======== INIT ========
async function start() {
  await fetchTickers();
  setInterval(fetchTickers, 10000);
  setInterval(updatePrice, 3000);
  initTV();
}

start();
</script>
</body>
</html>
