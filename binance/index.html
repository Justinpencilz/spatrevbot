<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VELTRIX AI SCANNER 2.0</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#0b0e11;color:#eaecef;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;font-size:14px}
:root{--go:#f0b90b;--s2:#2b3139;--b:#2b3139;--t2:#848e9c;--gr:#0ecb81;--rd:#f6465d}

.layout{display:flex;height:100vh}
.sidebar{width:260px;min-width:260px;background:#0b0e11;border-right:1px solid #2b3139;display:flex;flex-direction:column;height:100vh}
.sidebar .sb{padding:8px;border-bottom:1px solid #2b3139}
.sidebar .sb input{width:100%;padding:6px 10px;background:#1e2329;border:1px solid #2b3139;border-radius:4px;color:#eaecef;font-size:12px;outline:none}
.sidebar .sb input:focus{border-color:var(--go)}
.sidebar .th{display:flex;padding:6px 10px;font-size:10px;color:#848e9c;text-transform:uppercase;border-bottom:1px solid #1e2329}
.sidebar .th .c1{flex:1}
.sidebar .th .c2{width:80px;text-align:right}
.sidebar .th .c3{width:60px;text-align:right}
.tl{flex:1;overflow-y:auto}
.ti{display:flex;align-items:center;padding:5px 10px;cursor:pointer;border-bottom:1px solid #1e2329}
.ti:hover{background:#1e2329}
.ti.act{background:#1a2332;border-left:3px solid var(--go)}
.ti .p{flex:1;font-size:12px;font-weight:500}
.ti .pr{width:80px;text-align:right;font-size:12px;font-family:'SF Mono','Consolas',monospace}
.ti .ch{width:60px;text-align:right;font-size:11px;font-weight:500}
.ti .ch.g{color:var(--gr)}
.ti .ch.r{color:var(--rd)}
.ti .ch.f{color:#848e9c}

.main{flex:1;display:flex;flex-direction:column;min-width:0;height:100vh}

.nav{display:flex;align-items:center;gap:4px;padding:5px 8px;background:#161b22;border-bottom:1px solid #30363d;flex-wrap:wrap;min-height:40px;flex-shrink:0}
.nav .sp{font-size:14px;font-weight:600;margin-right:6px}
.nav .sp.g{color:var(--gr)}
.nav .sp.r{color:var(--rd)}
.sp1{width:1px;height:18px;background:#2b3139;margin:0 2px;flex-shrink:0}
.tb{padding:2px 7px;font-size:10px;background:#1e2329;border:1px solid #2b3139;border-radius:3px;color:#848e9c;cursor:pointer;font-weight:500;white-space:nowrap}
.tb:hover{border-color:var(--go);color:#eaecef}
.tb.act{background:var(--go);color:#0b0e11;border-color:var(--go)}
.ib{padding:2px 7px;font-size:10px;background:#1e2329;border:1px solid #2b3139;border-radius:3px;color:#848e9c;cursor:pointer;font-weight:500}
.ib:hover{border-color:var(--go);color:#eaecef}
.ib.on{background:#1a3a2a;border-color:var(--gr);color:var(--gr)}
.ib.off{background:#3a1a2a;border-color:var(--rd);color:var(--rd)}
.sb2{padding:2px 7px;font-size:10px;background:#1e2329;border:1px solid #2b3139;border-radius:3px;color:#848e9c;cursor:pointer}

.dd-wrap{position:relative}
.dd-btn{padding:2px 7px;font-size:10px;background:#1e2329;border:1px solid #2b3139;border-radius:3px;color:#848e9c;cursor:pointer}
.dd-btn:hover{border-color:var(--go);color:#eaecef}
.dd-menu{display:none;position:absolute;top:100%;left:0;z-index:100;width:150px;background:#1e2329;border:1px solid #2b3139;border-radius:6px;margin-top:3px;box-shadow:0 8px 24px rgba(0,0,0,.5);max-height:280px;overflow-y:auto}
.dd-menu.o{display:block}
.dd-menu .dmi{display:flex;align-items:center;gap:6px;padding:5px 10px;cursor:pointer;font-size:11px;color:#eaecef}
.dd-menu .dmi:hover{background:#2b3139}

.cw{flex:1;position:relative;min-height:0}
#tv{width:100%;height:100%}

/* Signal Status Bar */
.sig-status{display:flex;gap:12px;padding:3px 12px;background:#131722;border-top:1px solid #2b3139;font-size:10px;align-items:center;flex-shrink:0;min-height:24px;overflow-x:auto}
.sig-status .sig-tag{padding:1px 6px;border-radius:3px;font-weight:600}
.sig-status .sig-tag.buy{background:#0a2a1a;color:var(--gr)}
.sig-status .sig-tag.sell{background:#2a0a1a;color:var(--rd)}
.sig-status .sig-tag.none{background:#1e2329;color:#848e9c}

.st{display:flex;justify-content:space-between;padding:3px 12px;background:#0b0e11;border-top:1px solid #2b3139;font-size:10px;color:#848e9c;flex-shrink:0}
.st .dt{display:inline-block;width:6px;height:6px;border-radius:50%;margin-right:4px}
.st .dt.g{background:var(--gr)}
.st .dt.r{background:var(--rd)}

.settings-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:999;align-items:center;justify-content:center}
.settings-modal.show{display:flex}
.settings-box{background:#1e2329;border:1px solid #2b3139;border-radius:10px;padding:20px;width:340px;max-width:90vw}
.settings-box h3{font-size:14px;margin-bottom:14px;color:var(--go)}
.settings-box .rw{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.settings-box .rw label{font-size:12px;color:#848e9c}
.settings-box .rw input{width:70px;padding:4px 8px;background:#2b3139;border:1px solid #30363d;border-radius:4px;color:#eaecef;font-size:12px;text-align:center}
.settings-box .rw input:focus{border-color:var(--go);outline:none}
.settings-box .ac{display:flex;gap:10px;margin-top:16px}
.settings-box .ac button{flex:1;padding:8px;border:none;border-radius:5px;font-size:12px;font-weight:600;cursor:pointer}
.settings-box .ac .sv{background:var(--go);color:#0b0e11}
.settings-box .ac .cl{background:#2b3139;color:#848e9c}

.lo{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#0b0e11;z-index:10}
.lo.h{display:none}
.sp2{width:30px;height:30px;border:3px solid #2b3139;border-top-color:var(--go);border-radius:50%;animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

.pd{position:relative}
.pd .pb{display:flex;align-items:center;gap:4px;padding:3px 8px;background:#1e2329;border:1px solid #2b3139;border-radius:4px;color:#eaecef;cursor:pointer;font-size:12px;font-weight:600}
.pd .pb:hover{border-color:var(--go)}
.pd .dd{display:none;position:absolute;top:100%;left:0;z-index:100;width:200px;max-height:300px;background:#1e2329;border:1px solid #2b3139;border-radius:6px;margin-top:3px;overflow:hidden;box-shadow:0 8px 24px rgba(0,0,0,.5)}
.pd .dd.o{display:block}
.pd .dd input{width:100%;padding:5px 8px;background:#2b3139;border:none;border-bottom:1px solid #2b3139;color:#eaecef;font-size:11px;outline:none}
.pd .dd .dl{overflow-y:auto;max-height:260px}
.pd .dd .di{display:flex;justify-content:space-between;padding:5px 10px;cursor:pointer;font-size:11px}
.pd .dd .di:hover{background:#2b3139}
.pd .dd .di .dp{color:#eaecef;font-weight:500}
.pd .dd .di .dv{color:#848e9c;font-family:'SF Mono','Consolas',monospace}

.tl::-webkit-scrollbar,.pd .dd .dl::-webkit-scrollbar,.dd-menu::-webkit-scrollbar{width:4px}
.tl::-webkit-scrollbar-track,.pd .dd .dl::-webkit-scrollbar-track,.dd-menu::-webkit-scrollbar-track{background:transparent}
.tl::-webkit-scrollbar-thumb,.pd .dd .dl::-webkit-scrollbar-thumb,.dd-menu::-webkit-scrollbar-thumb{background:#2b3139;border-radius:2px}
@media(max-width:768px){.sidebar{display:none}.nav{gap:3px;padding:4px 5px}.tb,.ib,.dd-btn,.sb2{padding:2px 4px;font-size:9px}}
</style>
</head>
<body>

<div class="layout">
  <div class="sidebar">
    <div class="sb"><input type="text" id="si" placeholder="Search..." oninput="sf()"></div>
    <div class="th"><span class="c1">Pair</span><span class="c2">Price</span><span class="c3">24h</span></div>
    <div class="tl" id="tl"></div>
  </div>

  <div class="main">
    <div class="nav">
      <div class="pd" id="pdd">
        <div class="pb" onclick="td()">
          <span id="pn">BTC/USDT</span><span style="font-size:7px">▼</span>
        </div>
        <div class="dd" id="pdl">
          <input type="text" id="ds" placeholder="Search..." oninput="fd()">
          <div class="dl" id="dll"></div>
        </div>
      </div>
      <span class="sp g" id="sp">—</span><span class="sp1"></span>
      <button class="tb" data-tf="1" onclick="stf('1')">1m</button>
      <button class="tb" data-tf="2" onclick="stf('2')">2m</button>
      <button class="tb" data-tf="3" onclick="stf('3')">3m</button>
      <button class="tb" data-tf="5" onclick="stf('5')">5m</button>
      <button class="tb act" data-tf="15" onclick="stf('15')">15m</button>
      <button class="tb" data-tf="30" onclick="stf('30')">30m</button>
      <button class="tb" data-tf="60" onclick="stf('60')">1h</button>
      <button class="tb" data-tf="240" onclick="stf('240')">4h</button>
      <button class="tb" data-tf="1D" onclick="stf('1D')">1D</button>
      <button class="tb" data-tf="1W" onclick="stf('1W')">1W</button>
      <button class="tb" data-tf="1M" onclick="stf('1M')">1M</button>
      <span class="sp1"></span>
      <button class="ib on" id="vb" onclick="ti('v')">Veltrix</button>
      <button class="ib off" id="sab" onclick="ti('s')">Spatrev</button>
      <div class="dd-wrap">
        <button class="dd-btn" onclick="tdDraw()">✏️ <span style="font-size:7px">▼</span></button>
        <div class="dd-menu" id="ddm">
          <div class="dmi" onclick="actDraw('trend_line')"><span class="ic">╱</span> Trend</div>
          <div class="dmi" onclick="actDraw('horizontal_line')"><span class="ic">―</span> Horizontal</div>
          <div class="dmi" onclick="actDraw('vertical_line')"><span class="ic">│</span> Vertical</div>
          <div class="dmi" onclick="actDraw('arrow_up')"><span class="ic">▲</span> Arrow Up</div>
          <div class="dmi" onclick="actDraw('arrow_down')"><span class="ic">▼</span> Arrow Down</div>
          <div class="dmi" onclick="actDraw('text')"><span class="ic">T</span> Text</div>
          <div class="dmi" onclick="actDraw('rectangle')"><span class="ic">▭</span> Rect</div>
          <div class="dmi" onclick="actDraw('fibonacci')"><span class="ic">F</span> Fib</div>
          <div class="dmi" onclick="actDraw('clear')" style="border-top:1px solid #2b3139;color:#f6465d"><span class="ic">✕</span> Clear</div>
        </div>
      </div>
      <button class="sb2" onclick="os()">⚙️</button>
    </div>

    <div class="cw">
      <div class="lo" id="lo"><div class="sp2"></div><p>Loading Chart...</p></div>
      <div id="tv"></div>
    </div>

    <div class="sig-status" id="sigStatus">
      <span style="color:#848e9c">⚡</span>
      <span class="sig-tag none" id="sigTag">No Signal</span>
      <span style="color:#848e9c" id="sigPrice">—</span>
      <span style="margin-left:auto;color:#848e9c;font-size:9px" id="sigUpdate"></span>
    </div>

    <div class="st">
      <span><span class="dt g" id="sd"></span><span id="stxt">Connecting...</span></span>
      <span id="pc">0 pairs</span>
      <span id="stm"></span>
    </div>
  </div>
</div>

<div class="settings-modal" id="sm">
  <div class="settings-box">
    <h3>Veltrix AI</h3>
    <div class="rw"><label>Fast MA</label><input type="number" id="vf" value="9" min="1" max="200"></div>
    <div class="rw"><label>Slow MA</label><input type="number" id="vs" value="21" min="1" max="200"></div>
    <h3 style="margin-top:14px">Spatrev AI</h3>
    <div class="rw"><label>Fast EMA</label><input type="number" id="ef" value="20" min="1" max="200"></div>
    <div class="rw"><label>Slow EMA</label><input type="number" id="es" value="50" min="1" max="200"></div>
    <h3 style="margin-top:14px">Signal</h3>
    <div class="rw"><label>Swing Length</label><input type="number" id="sLen" value="10" min="2" max="50"></div>
    <div class="rw"><label>RR1</label><input type="number" id="rr1" value="1.0" min="0.1" max="10" step="0.1"></div>
    <div class="rw"><label>RR2</label><input type="number" id="rr2" value="2.0" min="0.1" max="10" step="0.1"></div>
    <div class="rw"><label>Bar Offset</label><input type="number" id="barOff" value="10" min="2" max="50"></div>
    <div class="ac">
      <button class="sv" onclick="ss()">Save</button>
      <button class="cl" onclick="cs()">Cancel</button>
    </div>
  </div>
</div>

<script src="https://s3.tradingview.com/tv.js"></script>
<script>
const S = {
  tk:[],tkM:{},w:null,ch:null,
  sym:'BTCUSDT',tf:'15',
  vOn:true,vF:9,vS:21,
  sOn:false,sF:20,sS:50,
  ddO:false,drawO:false,
  swingLen:10,rr1:1.0,rr2:2.0,barOff:10,
  signal:null,signalPlaced:false
};

// ==================== TICKERS ====================
async function ft(){
  try{
    const r=await fetch('https://api.binance.com/api/v3/ticker/24hr');
    if(!r.ok)throw Error();
    const d=await r.json();
    S.tk=d.filter(x=>x.symbol.endsWith('USDT')).map(x=>({s:x.symbol,b:x.symbol.replace('USDT',''),p:+x.lastPrice,c:+x.priceChangePercent,v:+x.quoteVolume})).sort((a,b)=>b.v-a.v).slice(0,100);
    S.tkM={};S.tk.forEach(t=>{S.tkM[t.s]=t});
    rt();rd();up();
    document.getElementById('stxt').textContent='Binance Live';
    document.getElementById('sd').className='dt g';
  }catch(e){
    document.getElementById('stxt').textContent='API Offline';
    document.getElementById('sd').className='dt r';
    setTimeout(ft,30000);
  }
}
function rt(f){
  let items=S.tk;if(f){const l=f.toLowerCase();items=items.filter(t=>t.b.toLowerCase().includes(l))}
  document.getElementById('tl').innerHTML=items.map(t=>{
    const cl=t.c>0?'g':t.c<0?'r':'f',sg=t.c>0?'+':'',ac=t.s===S.sym?' act':'';
    return `<div class="ti${ac}" data-s="${t.s}" onclick="sp('${t.s}')"><div class="p">${t.b}</div><div class="pr">$${fp(t.p)}</div><div class="ch ${cl}">${sg}${t.c.toFixed(2)}%</div></div>`;
  }).join('');
  document.getElementById('pc').textContent=items.length+' pairs';
}
function sf(){rt(document.getElementById('si').value)}
function fd(){rd(document.getElementById('ds').value)}
function td(){S.ddO=!S.ddO;document.getElementById('pdl').classList.toggle('o',S.ddO);if(S.ddO)setTimeout(()=>document.getElementById('ds').focus(),50)}
function rd(f){
  let items=S.tk;if(f){const l=f.toLowerCase();items=items.filter(t=>t.b.toLowerCase().includes(l))}
  document.getElementById('dll').innerHTML=items.map(t=>{
    const ac=t.s===S.sym?' style="background:#2b3139"':'';
    return `<div class="di"${ac} onclick="sp('${t.s}')"><span class="dp">${t.b}/USDT</span><span class="dv">$${fp(t.p)}</span></div>`;
  }).join('');
}
document.addEventListener('click',e=>{
  if(S.ddO&&!e.target.closest('.pd')){S.ddO=false;document.getElementById('pdl').classList.remove('o')}
  if(S.drawO&&!e.target.closest('.dd-wrap')){S.drawO=false;document.getElementById('ddm').classList.remove('o')}
});
function fp(p){
  if(p>=1000)return p.toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2});
  if(p>=1)return p.toFixed(4);if(p>=0.01)return p.toFixed(6);return p.toFixed(8);
}

// ==================== TRADINGVIEW ====================
function gs(){
  const l=[];
  if(S.vOn){l.push({id:'MASimple@tv-basicstudies',inputs:{length:S.vF}});l.push({id:'MASimple@tv-basicstudies',inputs:{length:S.vS}})}
  if(S.sOn){l.push({id:'EMAExponential@tv-basicstudies',inputs:{length:S.sF}});l.push({id:'EMAExponential@tv-basicstudies',inputs:{length:S.sS}})}
  return l;
}
function cw(){
  S.ch=null;S.signalPlaced=false;
  document.getElementById('tv').innerHTML='';
  const lo=document.getElementById('lo');lo.classList.remove('h');lo.style.display='flex';
  S.w=new TradingView.widget({
    container_id:'tv',symbol:'BINANCE:'+S.sym,interval:S.tf,
    timezone:'Etc/UTC',theme:'dark',style:'1',locale:'en',toolbar_bg:'#131722',
    enable_publishing:false,allow_symbol_change:true,hide_top_toolbar:false,
    hide_legend:false,save_image:false,autosize:true,studies:gs(),
    disabled_features:[],enabled_features:['study_templates','show_hide_button_on_legend'],
    overrides:{'paneProperties.background':'#131722','paneProperties.vertGridProperties.color':'#1e222d','paneProperties.horzGridProperties.color':'#1e222d','scalesProperties.textColor':'#848e9c'},
    loading_screen:{backgroundColor:'#131722',foregroundColor:'#f0b90b'}
  });
  setTimeout(()=>{lo.classList.add('h');lo.style.display='none'},4000);
  
  // Wait for chart API and place signal
  waitForChart(()=>{if(S.signal)placeSignalOnChart()});
}

function waitForChart(cb,attempts){
  if(attempts===undefined)attempts=0;
  try{
    if(S.w&&typeof S.w.chart==='function'){
      const c=S.w.chart();
      if(c&&typeof c.createShape==='function'){
        S.ch=c;
        if(cb)cb();
        return;
      }
    }
  }catch(e){}
  try{
    if(S.w&&typeof S.w.onChartReady==='function'){
      S.w.onChartReady(()=>{
        try{
          const c=S.w.chart();
          if(c&&typeof c.createShape==='function'){
            S.ch=c;
            if(cb)cb();
          }
        }catch(e){}
      });
    }
  }catch(e){}
  if(attempts<40){
    setTimeout(()=>waitForChart(cb,attempts+1),500);
  }
}

// ==================== SIGNAL ENGINE ====================
async function computeSignal(){
  const kl=await fetchKlines();
  if(!kl||kl.length<50)return;
  const closes=kl.map(k=>k.c),lows=kl.map(k=>k.l),highs=kl.map(k=>k.h);
  const vFast=sma(closes,S.vF),vSlow=sma(closes,S.vS);
  const sFast=ema(closes,S.sF),sSlow=ema(closes,S.sS);

  // Check Veltrix (SMA)
  if(S.vOn){
    for(let i=closes.length-2;i>=Math.max(S.vF,S.vS,5);i--){
      if(!vFast[i]||!vSlow[i]||!vFast[i-1]||!vSlow[i-1])continue;
      if(vFast[i-1]<=vSlow[i-1]&&vFast[i]>vSlow[i]){
        const sl=Math.min(...lows.slice(i-S.swingLen,i));
        if(sl>0&&sl<closes[i]*0.99){
          const e=closes[i],risk=e-sl;
          S.signal={type:'buy',entry:e,sl,tp1:e+risk*S.rr1,tp2:e+risk*S.rr2,src:'Veltrix',time:kl[i].t,idx:i};
          break;
        }
      }
      if(vFast[i-1]>=vSlow[i-1]&&vFast[i]<vSlow[i]){
        const sl=Math.max(...highs.slice(i-S.swingLen,i));
        if(sl>0&&sl>closes[i]*1.01){
          const e=closes[i],risk=sl-e;
          S.signal={type:'sell',entry:e,sl,tp1:e-risk*S.rr1,tp2:e-risk*S.rr2,src:'Veltrix',time:kl[i].t,idx:i};
          break;
        }
      }
    }
  }

  // Check Spatrev (EMA)
  if(S.sOn&&!S.signal){
    for(let i=closes.length-2;i>=Math.max(S.sF,S.sS,5);i--){
      if(!sFast[i]||!sSlow[i]||!sFast[i-1]||!sSlow[i-1])continue;
      if(sFast[i-1]<=sSlow[i-1]&&sFast[i]>sSlow[i]){
        const sl=Math.min(...lows.slice(i-S.swingLen,i));
        if(sl>0&&sl<closes[i]*0.99){
          const e=closes[i],risk=e-sl;
          S.signal={type:'buy',entry:e,sl,tp1:e+risk*S.rr1,tp2:e+risk*S.rr2,src:'Spatrev',time:kl[i].t,idx:i};
          break;
        }
      }
      if(sFast[i-1]>=sSlow[i-1]&&sFast[i]<sSlow[i]){
        const sl=Math.max(...highs.slice(i-S.swingLen,i));
        if(sl>0&&sl>closes[i]*1.01){
          const e=closes[i],risk=sl-e;
          S.signal={type:'sell',entry:e,sl,tp1:e-risk*S.rr1,tp2:e-risk*S.rr2,src:'Spatrev',time:kl[i].t,idx:i};
          break;
        }
      }
    }
  }

  updateSignalStatus();
  // Place on chart if chart is ready
  if(S.ch&&S.signal&&!S.signalPlaced)placeSignalOnChart();
  else if(S.signal&&!S.signalPlaced){
    waitForChart(()=>{
      if(S.signal&&!S.signalPlaced)placeSignalOnChart();
    });
  }
}

async function fetchKlines(){
  try{
    const m={'1':'1m','2':'2m','3':'3m','5':'5m','15':'15m','30':'30m','60':'1h','240':'4h','1D':'1d','1W':'1w','1M':'1M'};
    const r=await fetch(`https://api.binance.com/api/v3/klines?symbol=${S.sym}&interval=${m[S.tf]||'15m'}&limit=200`);
    if(!r.ok)return[];
    const d=await r.json();
    return d.map(k=>({t:Math.floor(k[0]/1000),o:+k[1],h:+k[2],l:+k[3],c:+k[4],v:+k[5]}));
  }catch(e){return[]}
}

function sma(d,l){
  const r=[];
  for(let i=0;i<d.length;i++){
    if(i<l-1){r.push(null);continue}
    let s=0;for(let j=i-l+1;j<=i;j++)s+=d[j];
    r.push(s/l);
  }
  return r;
}
function ema(d,l){
  const r=[];const k=2/(l+1);let p=0,st=false;
  for(let i=0;i<d.length;i++){
    if(i<l-1){r.push(null);continue}
    if(!st){let s=0;for(let j=0;j<l;j++)s+=d[j];p=s/l;r.push(p);st=true}
    else{p=d[i]*k+p*(1-k);r.push(p)}
  }
  return r;
}

// ==================== DRAW SIGNALS ON TV CHART ====================
function placeSignalOnChart(){
  const sig=S.signal;
  if(!sig||!S.ch||S.signalPlaced)return;
  
  try{
    // Clear old signal shapes
    S.ch.clearAllShapes();
  }catch(e){}

  const nowSec=Math.floor(Date.now()/1000);
  // Signal candle time
  const sigTime=sig.time;
  // End time for short lines (N bars ahead)
  const tfSeconds=getTFSeconds();
  const endTime=sigTime+tfSeconds*S.barOff;

  try{
    // 1. BUY/SELL Arrow at signal candle
    S.ch.createShape(
      {time:sigTime,price:sig.entry},
      sig.type==='buy'?'arrow_up':'arrow_down',
      {
        color:sig.type==='buy'?'#0ecb81':'#f6465d',
        text:sig.type.toUpperCase()+' '+sig.src,
        textColor:'#ffffff',
        fontSize:13,
        font:'bold 13px sans-serif'
      }
    );
  }catch(e){}

  // Draw ENTRY line (short horizontal from signal candle)
  try{
    S.ch.createShape(
      {time:sigTime,price:sig.entry,time2:endTime,price2:sig.entry},
      'trend_line',
      {
        color:'#f0b90b',
        linewidth:2,
        linestyle:2,
        text:'ENTRY $'+fp(sig.entry),
        textColor:'#ffffff',
        fontSize:10
      }
    );
  }catch(e){}

  // TP1 line
  try{
    S.ch.createShape(
      {time:sigTime,price:sig.tp1,time2:endTime,price2:sig.tp1},
      'trend_line',
      {
        color:'#0ecb81',
        linewidth:2,
        linestyle:2,
        text:'TP1 $'+fp(sig.tp1),
        textColor:'#ffffff',
        fontSize:10
      }
    );
  }catch(e){}

  // TP2 line
  try{
    S.ch.createShape(
      {time:sigTime,price:sig.tp2,time2:endTime,price2:sig.tp2},
      'trend_line',
      {
        color:'#0ecb81',
        linewidth:2,
        linestyle:2,
        text:'TP2 $'+fp(sig.tp2),
        textColor:'#ffffff',
        fontSize:10
      }
    );
  }catch(e){}

  // SL line
  try{
    S.ch.createShape(
      {time:sigTime,price:sig.sl,time2:endTime,price2:sig.sl},
      'trend_line',
      {
        color:'#f6465d',
        linewidth:2,
        linestyle:2,
        text:'SL $'+fp(sig.sl),
        textColor:'#ffffff',
        fontSize:10
      }
    );
  }catch(e){}

  S.signalPlaced=true;
}

function getTFSeconds(){
  const m={'1':60,'2':120,'3':180,'5':300,'15':900,'30':1800,'60':3600,'240':14400,'1D':86400,'1W':604800,'1M':2592000};
  return m[S.tf]||900;
}

function updateSignalStatus(){
  const tag=document.getElementById('sigTag');
  const price=document.getElementById('sigPrice');
  const update=document.getElementById('sigUpdate');
  update.textContent=new Date().toLocaleTimeString();
  
  if(S.signal){
    const cls=S.signal.type==='buy'?'buy':'sell';
    tag.className='sig-tag '+cls;
    tag.textContent=`${S.signal.src} ${S.signal.type.toUpperCase()}`;
    price.textContent=`$${fp(S.signal.entry)}`;
  }else{
    tag.className='sig-tag none';
    tag.textContent='No Signal';
    price.textContent='—';
  }
}

// ==================== ACTIONS ====================
function stf(t){
  S.tf=t;S.signal=null;S.signalPlaced=false;
  document.querySelectorAll('.tb').forEach(b=>b.classList.toggle('act',b.dataset.tf===t));
  cw();setTimeout(computeSignal,2500);
}
function ti(n){
  if(n==='v')S.vOn=!S.vOn;else S.sOn=!S.sOn;
  const el=document.getElementById(n==='v'?'vb':'sab');
  const on=n==='v'?S.vOn:S.sOn;
  el.className='ib '+(on?'on':'off');
  el.textContent=n==='v'?'Veltrix':'Spatrev';
  S.signal=null;S.signalPlaced=false;
  cw();setTimeout(computeSignal,2500);
}
async function sp(sym){
  S.sym=sym;S.ddO=false;S.signal=null;S.signalPlaced=false;
  document.getElementById('pdl').classList.remove('o');
  document.getElementById('pn').textContent=sym.replace('USDT','/USDT');
  document.querySelectorAll('.ti').forEach(el=>el.classList.toggle('act',el.dataset.s===sym));
  cw();up();setTimeout(computeSignal,2500);
}

function tdDraw(){S.drawO=!S.drawO;document.getElementById('ddm').classList.toggle('o',S.drawO)}
function actDraw(tool){
  S.drawO=false;document.getElementById('ddm').classList.remove('o');
  if(tool==='clear'){
    try{if(S.w&&S.w.chart){S.w.onChartReady(()=>{try{S.w.chart().clearAllShapes()}catch(e){}})}}catch(e){}
    S.signalPlaced=false;return;
  }
  try{if(S.w&&S.w.chart){S.w.onChartReady(()=>{try{const ch=S.w.chart();if(ch&&ch.setDrawingTool)ch.setDrawingTool(tool)}catch(e){}})}}catch(e){}
}
function up(){
  try{const t=S.tkM[S.sym];if(t){const el=document.getElementById('sp');el.textContent='$'+fp(t.p);el.className='sp '+(t.c>=0?'g':'r')}}catch(e){}
}
function os(){
  document.getElementById('vf').value=S.vF;document.getElementById('vs').value=S.vS;
  document.getElementById('ef').value=S.sF;document.getElementById('es').value=S.sS;
  document.getElementById('sLen').value=S.swingLen;document.getElementById('rr1').value=S.rr1;
  document.getElementById('rr2').value=S.rr2;document.getElementById('barOff').value=S.barOff;
  document.getElementById('sm').classList.add('show');
}
function cs(){document.getElementById('sm').classList.remove('show')}
function ss(){
  S.vF=+document.getElementById('vf').value||9;S.vS=+document.getElementById('vs').value||21;
  S.sF=+document.getElementById('ef').value||20;S.sS=+document.getElementById('es').value||50;
  S.swingLen=+document.getElementById('sLen').value||10;S.rr1=+document.getElementById('rr1').value||1;
  S.rr2=+document.getElementById('rr2').value||2;S.barOff=+document.getElementById('barOff').value||10;
  cs();S.signal=null;S.signalPlaced=false;cw();setTimeout(computeSignal,2500);
}
document.getElementById('sm').addEventListener('click',e=>{if(e.target===document.getElementById('sm'))cs()});
function ust(){document.getElementById('stm').textContent=new Date().toLocaleDateString()+' '+new Date().toLocaleTimeString()}

let rtimer;
window.addEventListener('resize',()=>{
  clearTimeout(rtimer);
  rtimer=setTimeout(()=>{if(S.w){try{S.w.resize()}catch(e){cw()}}},300);
});

// ==================== INIT ====================
ft();setInterval(ft,15000);setInterval(up,5000);setInterval(ust,30000);
cw();setTimeout(computeSignal,2500);setInterval(computeSignal,60000);
</script>
