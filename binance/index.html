<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spatrev Binance — Live Charts</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#0b0e11;color:#eaecef;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;font-size:14px}
:root{--go:#f0b90b;--s2:#2b3139;--b:#2b3139;--t2:#848e9c;--green:#0ecb81;--red:#f6465d}

.layout{display:flex;height:100vh}

/* Sidebar */
.sidebar{width:260px;min-width:260px;background:#0b0e11;border-right:1px solid #2b3139;display:flex;flex-direction:column;height:100vh}
.sidebar .sb{padding:8px;border-bottom:1px solid #2b3139}
.sidebar .sb input{width:100%;padding:6px 10px;background:#1e2329;border:1px solid #2b3139;border-radius:4px;color:#eaecef;font-size:12px;outline:none}
.sidebar .sb input:focus{border-color:var(--go)}
.sidebar .th{display:flex;padding:6px 10px;font-size:10px;color:#848e9c;text-transform:uppercase;border-bottom:1px solid #1e2329}
.sidebar .th .c1{flex:1}
.sidebar .th .c2{width:80px;text-align:right}
.sidebar .th .c3{width:60px;text-align:right}
.tl{flex:1;overflow-y:auto}
.ti{display:flex;align-items:center;padding:5px 10px;cursor:pointer;border-bottom:1px solid #1e2329;transition:background 0.1s}
.ti:hover{background:#1e2329}
.ti.act{background:#1a2332;border-left:3px solid var(--go)}
.ti .p{flex:1;font-size:12px;font-weight:500}
.ti .pr{width:80px;text-align:right;font-size:12px;font-family:'SF Mono','Consolas',monospace}
.ti .ch{width:60px;text-align:right;font-size:11px;font-weight:500}
.ti .ch.g{color:var(--green)}
.ti .ch.r{color:var(--red)}
.ti .ch.f{color:#848e9c}

/* Main Column */
.main{flex:1;display:flex;flex-direction:column;min-width:0;height:100vh}

/* Nav */
.nav{display:flex;align-items:center;gap:5px;padding:5px 10px;background:#161b22;border-bottom:1px solid #30363d;flex-wrap:wrap;min-height:40px;flex-shrink:0}
.nav .sp{font-size:14px;font-weight:600;margin-right:8px}
.nav .sp.g{color:var(--green)}
.nav .sp.r{color:var(--red)}
.sp1{width:1px;height:20px;background:#2b3139;margin:0 3px;flex-shrink:0}

.tb{padding:2px 8px;font-size:11px;background:#1e2329;border:1px solid #2b3139;border-radius:4px;color:#848e9c;cursor:pointer;font-weight:500;white-space:nowrap}
.tb:hover{border-color:var(--go);color:#eaecef}
.tb.act{background:var(--go);color:#0b0e11;border-color:var(--go)}

.ib{padding:2px 8px;font-size:11px;background:#1e2329;border:1px solid #2b3139;border-radius:4px;color:#848e9c;cursor:pointer;font-weight:500}
.ib:hover{border-color:var(--go);color:#eaecef}
.ib.on{background:#1a3a2a;border-color:var(--green);color:var(--green)}
.ib.off{background:#3a1a2a;border-color:var(--red);color:var(--red)}
.sb2{padding:2px 8px;font-size:11px;background:#1e2329;border:1px solid #2b3139;border-radius:4px;color:#848e9c;cursor:pointer}

/* Chart Area */
.cw{flex:1;position:relative;min-height:0}
#tv{width:100%;height:100%}

/* Loading */
.lo{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#0b0e11;z-index:10;transition:opacity 0.5s}
.lo.h{opacity:0;pointer-events:none}
.sp2{width:30px;height:30px;border:3px solid #2b3139;border-top-color:var(--go);border-radius:50%;animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* Signal Dashboard */
.sig-panel{background:#0d1117;border-top:2px solid #1e2329;flex-shrink:0;max-height:140px;overflow-y:auto;padding:6px 10px}
.sig-panel .sph{display:flex;align-items:center;gap:8px;margin-bottom:6px;font-size:11px;color:#848e9c}
.sig-panel .sph span{font-weight:600}
.sig-panel .sig-row{display:flex;align-items:center;gap:6px;padding:4px 8px;margin-bottom:3px;border-radius:4px;font-size:11px;font-family:'SF Mono','Consolas',monospace}
.sig-panel .sig-row.buy{background:#0a2a1a;border-left:3px solid var(--green)}
.sig-panel .sig-row.sell{background:#2a0a1a;border-left:3px solid var(--red)}
.sig-panel .sig-row .s-icon{font-size:14px;width:20px;text-align:center}
.sig-panel .sig-row .s-icon.b{color:var(--green)}
.sig-panel .sig-row .s-icon.s{color:var(--red)}
.sig-panel .sig-row .s-src{color:#848e9c;font-size:10px;padding:1px 5px;background:#1e2329;border-radius:3px}
.sig-panel .sig-row .s-tf{color:#848e9c;font-size:10px}
.sig-panel .sig-row .s-price{color:#eaecef;font-weight:500;margin-left:auto}
.sig-panel .sig-row .s-time{color:#848e9c;font-size:10px;margin-left:8px}

/* Live Signal Badges */
.sig-badges{display:flex;gap:10px;align-items:center;padding:4px 0}
.sig-badge{padding:3px 10px;border-radius:4px;font-size:12px;font-weight:600;display:flex;align-items:center;gap:5px}
.sig-badge.buy{background:linear-gradient(135deg,#0a2a1a,#1a4a2a);color:var(--green);border:1px solid #1a4a2a}
.sig-badge.sell{background:linear-gradient(135deg,#2a0a1a,#4a1a2a);color:var(--red);border:1px solid #4a1a2a}
.sig-badge.neutral{background:#1e2329;color:#848e9c;border:1px solid #2b3139}

/* Status */
.st{display:flex;justify-content:space-between;padding:3px 12px;background:#0b0e11;border-top:1px solid #2b3139;font-size:10px;color:#848e9c;flex-shrink:0}
.st .dt{display:inline-block;width:6px;height:6px;border-radius:50%;margin-right:4px}
.st .dt.g{background:var(--green)}
.st .dt.r{background:var(--red)}

/* Settings Modal */
.mo{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:999;align-items:center;justify-content:center}
.mo.s{display:flex}
.mw{background:#1e2329;border:1px solid #2b3139;border-radius:10px;padding:20px;width:340px;max-width:90vw}
.mw h3{font-size:14px;margin-bottom:14px;color:var(--go)}
.mw .rw{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.mw .rw label{font-size:12px;color:#848e9c}
.mw .rw input{width:70px;padding:4px 8px;background:#2b3139;border:1px solid #30363d;border-radius:4px;color:#eaecef;font-size:12px;text-align:center}
.mw .rw input:focus{border-color:var(--go);outline:none}
.mw .ac{display:flex;gap:10px;margin-top:16px}
.mw .ac button{flex:1;padding:8px;border:none;border-radius:5px;font-size:12px;font-weight:600;cursor:pointer}
.mw .ac .sv{background:var(--go);color:#0b0e11}
.mw .ac .sv:hover{background:#dba40a}
.mw .ac .cl{background:#2b3139;color:#848e9c}
.mw .ac .cl:hover{background:#30363d}

/* Pair dropdown */
.pd{position:relative}
.pd .pb{display:flex;align-items:center;gap:6px;padding:4px 10px;background:#1e2329;border:1px solid #2b3139;border-radius:5px;color:#eaecef;cursor:pointer;font-size:12px;font-weight:600}
.pd .pb:hover{border-color:var(--go)}
.pd .dd{display:none;position:absolute;top:100%;left:0;z-index:100;width:220px;max-height:300px;background:#1e2329;border:1px solid #2b3139;border-radius:6px;margin-top:3px;overflow:hidden;box-shadow:0 8px 24px rgba(0,0,0,.5)}
.pd .dd.o{display:block}
.pd .dd input{width:100%;padding:6px 8px;background:#2b3139;border:none;border-bottom:1px solid #2b3139;color:#eaecef;font-size:11px;outline:none}
.pd .dd .dl{overflow-y:auto;max-height:260px}
.pd .dd .di{display:flex;justify-content:space-between;padding:6px 10px;cursor:pointer;font-size:12px}
.pd .dd .di:hover{background:#2b3139}
.pd .dd .di .dp{color:#eaecef;font-weight:500}
.pd .dd .di .dv{color:#848e9c;font-family:'SF Mono','Consolas',monospace}

.tl::-webkit-scrollbar,.pd .dd .dl::-webkit-scrollbar{width:4px}
.tl::-webkit-scrollbar-track,
.pd .dd .dl::-webkit-scrollbar-track{background:transparent}
.tl::-webkit-scrollbar-thumb,
.pd .dd .dl::-webkit-scrollbar-thumb{background:#2b3139;border-radius:2px}

@media(max-width:768px){
  .sidebar{display:none}
  .nav{gap:3px;padding:4px 6px}
  .tb,.ib{padding:2px 6px;font-size:10px}
}
</style>
</head>
<body>

<div class="layout">
  <div class="sidebar">
    <div class="sb"><input type="text" id="si" placeholder="Search pairs..." oninput="sf()"></div>
    <div class="th">
      <span class="c1">Pair</span>
      <span class="c2">Price</span>
      <span class="c3">24h</span>
    </div>
    <div class="tl" id="tl"></div>
  </div>

  <div class="main">
    <!-- Nav / Toolbar -->
    <div class="nav">
      <div class="pd" id="pdd">
        <div class="pb" onclick="td()">
          <span id="pn">BTC/USDT</span>
          <span style="font-size:8px">▼</span>
        </div>
        <div class="dd" id="pdl">
          <input type="text" id="ds" placeholder="Search..." oninput="fd()">
          <div class="dl" id="dll"></div>
        </div>
      </div>
      <span class="sp g" id="sp">—</span>
      <span class="sp1"></span>

      <button class="tb" data-tf="1" onclick="stf('1')">1m</button>
      <button class="tb" data-tf="3" onclick="stf('3')">3m</button>
      <button class="tb" data-tf="5" onclick="stf('5')">5m</button>
      <button class="tb act" data-tf="15" onclick="stf('15')">15m</button>
      <button class="tb" data-tf="30" onclick="stf('30')">30m</button>
      <button class="tb" data-tf="60" onclick="stf('60')">1h</button>
      <button class="tb" data-tf="240" onclick="stf('240')">4h</button>
      <button class="tb" data-tf="1D" onclick="stf('1D')">1D</button>
      <span class="sp1"></span>

      <button class="ib on" id="vb" onclick="ti('v')">Veltrix AI</button>
      <button class="ib off" id="sab" onclick="ti('s')">Spatrev AI</button>
      <button class="sb2" onclick="os()">⚙</button>
    </div>

    <!-- Chart -->
    <div class="cw">
      <div class="lo" id="lo">
        <div class="sp2"></div>
        <p>Loading Chart...</p>
      </div>
      <div id="tv"></div>
    </div>

    <!-- Signal Dashboard -->
    <div class="sig-panel" id="sigPanel">
      <div class="sph">
        <span>📊 SIGNALS</span>
        <div class="sig-badges" id="sigBadges"></div>
        <span style="margin-left:auto;font-size:10px;color:#848e9c" id="sigCount"></span>
        <span style="font-size:10px;color:#848e9c" id="sigUpdateTime"></span>
      </div>
      <div id="sigList"></div>
    </div>

    <!-- Status -->
    <div class="st">
      <span><span class="dt g" id="sd"></span><span id="stxt">Connecting...</span></span>
      <span id="pc">0 pairs</span>
      <span id="stm"></span>
    </div>
  </div>
</div>

<!-- Settings Modal -->
<div class="mo" id="sm">
  <div class="mw">
    <h3>Veltrix AI — SMA Settings</h3>
    <div class="rw"><label>Fast MA</label><input type="number" id="vf" value="9" min="2" max="200"></div>
    <div class="rw"><label>Slow MA</label><input type="number" id="vs" value="21" min="2" max="200"></div>
    <h3 style="margin-top:16px">Spatrev AI — EMA Settings</h3>
    <div class="rw"><label>Fast EMA</label><input type="number" id="ef" value="20" min="2" max="200"></div>
    <div class="rw"><label>Slow EMA</label><input type="number" id="es" value="50" min="2" max="200"></div>
    <div class="ac">
      <button class="sv" onclick="ss()">Save</button>
      <button class="cl" onclick="cs()">Cancel</button>
    </div>
  </div>
</div>

<script src="https://s3.tradingview.com/tv.js"></script>
<script>
const S = {
  tk: [], tkM: {}, w: null,
  sym: 'BTCUSDT', tf: '15',
  vOn: true,  vF: 9,  vS: 21,
  sOn: false, sF: 20, sS: 50,
  ddO: false, signals: []
};

// ==================== TICKERS ====================
async function ft() {
  try {
    const r = await fetch('https://api.binance.com/api/v3/ticker/24hr');
    if (!r.ok) throw Error(''+r.status);
    const d = await r.json();
    S.tk = d.filter(x => x.symbol.endsWith('USDT'))
      .map(x => ({s:x.symbol, b:x.symbol.replace('USDT',''), p:+x.lastPrice, c:+x.priceChangePercent, v:+x.quoteVolume}))
      .sort((a,b) => b.v - a.v).slice(0,100);
    S.tkM = {}; S.tk.forEach(t => { S.tkM[t.s] = t; });
    rt(); rd(); up();
    document.getElementById('stxt').textContent = 'Binance Live';
    document.getElementById('sd').className = 'dt g';
  } catch(e) {
    document.getElementById('stxt').textContent = 'API Offline';
    document.getElementById('sd').className = 'dt r';
    setTimeout(ft, 30000);
  }
}

function rt(f) {
  let items = S.tk;
  if (f) { const l = f.toLowerCase(); items = items.filter(t => t.b.toLowerCase().includes(l)); }
  const h = items.map(t => {
    const cl = t.c > 0 ? 'g' : t.c < 0 ? 'r' : 'f';
    const sg = t.c > 0 ? '+' : '';
    const ac = t.s === S.sym ? ' act' : '';
    return `<div class="ti${ac}" data-s="${t.s}" onclick="sp('${t.s}')">
      <div class="p">${t.b}</div>
      <div class="pr">$${fp(t.p)}</div>
      <div class="ch ${cl}">${sg}${t.c.toFixed(2)}%</div>
    </div>`;
  }).join('');
  document.getElementById('tl').innerHTML = h;
  document.getElementById('pc').textContent = items.length + ' pairs';
}

function sf() { rt(document.getElementById('si').value); }
function fd() { rd(document.getElementById('ds').value); }
function td() { S.ddO = !S.ddO; document.getElementById('pdl').classList.toggle('o', S.ddO); if(S.ddO) setTimeout(()=>document.getElementById('ds').focus(),50); }

function rd(f) {
  let items = S.tk;
  if (f) { const l = f.toLowerCase(); items = items.filter(t => t.b.toLowerCase().includes(l)); }
  document.getElementById('dll').innerHTML = items.map(t => {
    const ac = t.s === S.sym ? ' style="background:#2b3139"' : '';
    return `<div class="di"${ac} onclick="sp('${t.s}')"><span class="dp">${t.b}/USDT</span><span class="dv">$${fp(t.p)}</span></div>`;
  }).join('');
}

document.addEventListener('click', e => {
  if (S.ddO && !e.target.closest('.pd')) { S.ddO = false; document.getElementById('pdl').classList.remove('o'); }
});

function fp(p) {
  if (p >= 1000) return p.toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2});
  if (p >= 1) return p.toFixed(4);
  if (p >= 0.01) return p.toFixed(6);
  return p.toFixed(8);
}

// ==================== TRADINGVIEW ====================
function gs() {
  const list = [];
  if (S.vOn) { list.push({ id:'MASimple@tv-basicstudies', inputs:{length:S.vF} }); list.push({ id:'MASimple@tv-basicstudies', inputs:{length:S.vS} }); }
  if (S.sOn) { list.push({ id:'EMAExponential@tv-basicstudies', inputs:{length:S.sF} }); list.push({ id:'EMAExponential@tv-basicstudies', inputs:{length:S.sS} }); }
  return list;
}

function cw() {
  document.getElementById('tv').innerHTML = '';
  document.getElementById('lo').classList.remove('h');

  S.w = new TradingView.widget({
    container_id: 'tv',
    symbol: 'BINANCE:' + S.sym,
    interval: S.tf,
    timezone: 'Etc/UTC',
    theme: 'dark',
    style: '1',
    locale: 'en',
    toolbar_bg: '#131722',
    enable_publishing: false,
    allow_symbol_change: true,
    hide_top_toolbar: false,
    hide_legend: false,
    save_image: false,
    autosize: true,
    studies: gs(),
    disabled_features: [],
    enabled_features: ['study_templates','show_hide_button_on_legend'],
    overrides: {
      'paneProperties.background': '#131722',
      'paneProperties.vertGridProperties.color': '#1e222d',
      'paneProperties.horzGridProperties.color': '#1e222d',
      'scalesProperties.textColor': '#848e9c'
    },
    loading_screen: { backgroundColor: '#131722', foregroundColor: '#f0b90b' }
  });

  setTimeout(() => document.getElementById('lo').classList.add('h'), 4000);
}

// ==================== SIGNALS ====================
async function updateSignals() {
  const kl = await fetchKlines();
  const sigs = computeSignals(kl);
  S.signals = sigs || [];
  renderSignals();
}

async function fetchKlines() {
  try {
    const tfMap = { '1':'1m','3':'3m','5':'5m','15':'15m','30':'30m','60':'1h','240':'4h','1D':'1d' };
    const binTF = tfMap[S.tf] || '15m';
    const r = await fetch(`https://api.binance.com/api/v3/klines?symbol=${S.sym}&interval=${binTF}&limit=150`);
    if (!r.ok) { 
      // Try alternate API
      const r2 = await fetch(`https://api.binance.us/api/v3/klines?symbol=${S.sym}&interval=${binTF}&limit=150`);
      if (!r2.ok) return [];
      const d = await r2.json();
      return d.map(k => ({t:Math.floor(k[0]/1000), o:+k[1], h:+k[2], l:+k[3], c:+k[4], v:+k[5]}));
    }
    const d = await r.json();
    return d.map(k => ({t:Math.floor(k[0]/1000), o:+k[1], h:+k[2], l:+k[3], c:+k[4], v:+k[5]}));
  } catch(e) { return []; }
}

function computeSignals(kl) {
  if (!kl || kl.length < 50) return [];
  const closes = kl.map(k => k.c);
  const sigs = [];

  if (S.vOn) {
    const vf = sma(closes, S.vF);
    const vs = sma(closes, S.vS);
    for (let i = Math.max(S.vF, S.vS); i < closes.length; i++) {
      if (!vf[i] || !vs[i] || !vf[i-1] || !vs[i-1]) continue;
      if (vf[i-1] <= vs[i-1] && vf[i] > vs[i]) {
        sigs.push({ t:kl[i].t, p:kl[i].c, type:'buy', src:'Veltrix AI' });
      } else if (vf[i-1] >= vs[i-1] && vf[i] < vs[i]) {
        sigs.push({ t:kl[i].t, p:kl[i].c, type:'sell', src:'Veltrix AI' });
      }
    }
  }

  if (S.sOn) {
    const sf = ema(closes, S.sF);
    const ss = ema(closes, S.sS);
    for (let i = Math.max(S.sF, S.sS); i < closes.length; i++) {
      if (!sf[i] || !ss[i] || !sf[i-1] || !ss[i-1]) continue;
      if (sf[i-1] <= ss[i-1] && sf[i] > ss[i]) {
        sigs.push({ t:kl[i].t, p:kl[i].c, type:'buy', src:'Spatrev AI' });
      } else if (sf[i-1] >= ss[i-1] && sf[i] < ss[i]) {
        sigs.push({ t:kl[i].t, p:kl[i].c, type:'sell', src:'Spatrev AI' });
      }
    }
  }

  // Deduplicate
  const seen = {};
  return sigs.filter(s => {
    const k = s.t + '_' + s.type + '_' + s.src;
    if (seen[k]) return false;
    seen[k] = true;
    return true;
  }).reverse();
}

function sma(data, len) {
  const r = [];
  for (let i = 0; i < data.length; i++) {
    if (i < len - 1) { r.push(null); continue; }
    let sum = 0;
    for (let j = i - len + 1; j <= i; j++) sum += data[j];
    r.push(sum / len);
  }
  return r;
}

function ema(data, len) {
  const r = [];
  const k = 2 / (len + 1);
  let prev = 0, started = false;
  for (let i = 0; i < data.length; i++) {
    if (i < len - 1) { r.push(null); continue; }
    if (!started) {
      let sum = 0;
      for (let j = 0; j < len; j++) sum += data[j];
      prev = sum / len;
      r.push(prev);
      started = true;
    } else {
      prev = data[i] * k + prev * (1 - k);
      r.push(prev);
    }
  }
  return r;
}

function renderSignals() {
  const list = document.getElementById('sigList');
  const badges = document.getElementById('sigBadges');
  const count = document.getElementById('sigCount');
  const updateTime = document.getElementById('sigUpdateTime');

  count.textContent = S.signals.length + ' signals';
  updateTime.textContent = new Date().toLocaleTimeString();

  // Badges
  const vSig = S.signals.find(s => s.src === 'Veltrix AI');
  const sSig = S.signals.find(s => s.src === 'Spatrev AI');

  let bh = '';
  if (S.vOn) {
    const c = vSig ? vSig.type : 'neutral';
    const t = vSig ? `${vSig.type.toUpperCase()} $${fp(vSig.p)}` : 'No signal';
    bh += `<span class="sig-badge ${c}">Veltrix: ${t}</span>`;
  }
  if (S.sOn) {
    const c = sSig ? sSig.type : 'neutral';
    const t = sSig ? `${sSig.type.toUpperCase()} $${fp(sSig.p)}` : 'No signal';
    bh += `<span class="sig-badge ${c}">Spatrev: ${t}</span>`;
  }
  if (!S.vOn && !S.sOn) bh = '<span class="sig-badge neutral">Indicators OFF</span>';
  badges.innerHTML = bh;

  // Signal history list
  if (S.signals.length === 0) {
    list.innerHTML = '<div style="color:#848e9c;font-size:11px;padding:4px">Waiting for signals from crossover events...</div>';
    return;
  }

  list.innerHTML = S.signals.slice(0, 20).map(s => {
    const icon = s.type === 'buy' ? '🟢' : '🔴';
    const cls = s.type === 'buy' ? 'buy' : 'sell';
    const ico = s.type === 'buy' ? 'b' : 's';
    const time = new Date(s.t * 1000).toLocaleTimeString();
    return `<div class="sig-row ${cls}">
      <span class="s-icon ${ico}">${s.type === 'buy' ? '▲' : '▼'}</span>
      <span class="s-src">${s.src}</span>
      <span class="s-price">$${fp(s.p)}</span>
      <span class="s-time">${time}</span>
    </div>`;
  }).join('');
}

// ==================== ACTIONS ====================
function stf(t) {
  S.tf = t;
  document.querySelectorAll('.tb').forEach(b => b.classList.toggle('act', b.dataset.tf === t));
  cw();
  setTimeout(updateSignals, 2000);
}

function ti(n) {
  if (n === 'v') S.vOn = !S.vOn;
  else S.sOn = !S.sOn;
  const el = document.getElementById(n === 'v' ? 'vb' : 'sab');
  const on = n === 'v' ? S.vOn : S.sOn;
  el.className = 'ib ' + (on ? 'on' : 'off');
  el.textContent = n === 'v' ? 'Veltrix AI' : 'Spatrev AI';
  cw();
  setTimeout(updateSignals, 2000);
}

async function sp(sym) {
  S.sym = sym;
  S.ddO = false;
  document.getElementById('pdl').classList.remove('o');
  document.getElementById('pn').textContent = sym.replace('USDT', '/USDT');
  document.querySelectorAll('.ti').forEach(el => el.classList.toggle('act', el.dataset.s === sym));
  cw();
  up();
  setTimeout(updateSignals, 2000);
}

// ==================== PRICE ====================
function up() {
  try {
    const t = S.tkM[S.sym];
    if (t) {
      const el = document.getElementById('sp');
      el.textContent = '$' + fp(t.p);
      el.className = 'sp ' + (t.c >= 0 ? 'g' : 'r');
    }
  } catch(e) {}
}

// ==================== SETTINGS ====================
function os() {
  document.getElementById('vf').value = S.vF;
  document.getElementById('vs').value = S.vS;
  document.getElementById('ef').value = S.sF;
  document.getElementById('es').value = S.sS;
  document.getElementById('sm').classList.add('s');
}
function cs() { document.getElementById('sm').classList.remove('s'); }
function ss() {
  S.vF = +document.getElementById('vf').value || 9;
  S.vS = +document.getElementById('vs').value || 21;
  S.sF = +document.getElementById('ef').value || 20;
  S.sS = +document.getElementById('es').value || 50;
  cs(); cw();
  setTimeout(updateSignals, 2000);
}
document.getElementById('sm').addEventListener('click', e => { if (e.target === document.getElementById('sm')) cs(); });

function ust() { document.getElementById('stm').textContent = new Date().toLocaleDateString() + ' ' + new Date().toLocaleTimeString(); }

let rtimer;
window.addEventListener('resize', () => {
  clearTimeout(rtimer);
  rtimer = setTimeout(() => { if (S.w) { try { S.w.resize(); } catch(e) { cw(); } } }, 300);
});

// ==================== INIT ====================
ft();
setInterval(ft, 15000);
setInterval(up, 5000);
setInterval(ust, 30000);
cw();
setTimeout(updateSignals, 2000);
setInterval(updateSignals, 60000);
</script>
