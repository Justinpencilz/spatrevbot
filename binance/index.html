<script>
// ======== PAIRS ========
const PAIRS=['BTCUSDT','ETHUSDT','BNBUSDT','SOLUSDT','XRPUSDT','DOGEUSDT','TRXUSDT','ADAUSDT','AVAXUSDT','DOTUSDT','LINKUSDT','MATICUSDT','UNIUSDT','SHIBUSDT','LTCUSDT','BCHUSDT','ATOMUSDT','ETCUSDT','XLMUSDT','XMRUSDT','NEARUSDT','FILUSDT','APTUSDT','ARBUSDT','OPUSDT','SUIUSDT','PEPEUSDT','INJUSDT','TIAUSDT','SEIUSDT','FETUSDT','RUNEUSDT','AAVEUSDT','ALGOUSDT','MANAUSDT','SANDUSDT','AXSUSDT','EGLDUSDT','FLOWUSDT','GALAUSDT','HBARUSDT','ICPUSDT','KAVAUSDT','KSMUSDT','MKRUSDT','QNTUSDT','SNXUSDT','STXUSDT','THETAUSDT','VETUSDT','WAVESUSDT','ZECUSDT','ZILUSDT','ZRXUSDT','WLDUSDT','ONDOUSDT','TONUSDT','MEMEUSDT','PORTALUSDT','ALLOUSDT','GENIUSUSDT','HEIUSDT','NFPUSDT','ASTERUSDT'];
const sel=document.getElementById('pairSel');
PAIRS.forEach(p=>{let o=document.createElement('option');o.value=p;o.textContent=p.replace('USDT','')+'/USDT';sel.appendChild(o)});
sel.value='BTCUSDT';

// ======== STATE ========
let chart=null, chartData=[], pollTimer=null, activeSig=null;
let series={candle:null,ma1:null,ma2:null,en:null,sl:null,t1:null,t2:null};
let ind={v:true,s:false};
let set={fast:9,slow:21,htf:4,swing:10,pivot:5,rr1:1,rr2:2};
let curPair='BTCUSDT', curTF='1h';

// ======== HELPERS ========
function fp(n){let p=+n;if(p>=1e3)return p.toLocaleString('en',{minimumFractionDigits:2,maximumFractionDigits:2});if(p>=1)return p.toFixed(4);if(p>=.01)return p.toFixed(6);return p.toFixed(8)}

// ======== INDICATORS ========
function sma(d,p){let r=[];for(let i=0;i<d.length;i++){if(i<p-1){r.push(null);continue}let s=0;for(let j=i-p+1;j<=i;j++)s+=d[j];r.push(s/p)}return r}
function ema(d,p){let k=2/(p+1),e=[d[0]];for(let i=1;i<d.length;i++)e.push(d[i]*k+e[i-1]*(1-k));return e}
function rsi(d,p){let g=[],l=[];for(let i=1;i<d.length;i++){let x=d[i]-d[i-1];g.push(x>0?x:0);l.push(x<0?-x:0)}let r=[50],ag=g.slice(0,p).reduce((a,b)=>a+b,0)/p,al=l.slice(0,p).reduce((a,b)=>a+b,0)/p;r.push(al===0?100:100-100/(1+ag/al));for(let i=p;i<g.length;i++){ag=(ag*(p-1)+g[i])/p;al=(al*(p-1)+l[i])/p;r.push(al===0?100:100-100/(1+ag/al))}return r}
function adx(h,l,c,p){let t=[],pD=[],mD=[];for(let i=1;i<c.length;i++){t.push(Math.max(h[i]-l[i],Math.abs(h[i]-c[i-1]),Math.abs(l[i]-c[i-1])));let u=h[i]-h[i-1],d=l[i-1]-l[i];pD.push(u>d&&u>0?u:0);mD.push(d>u&&d>0?d:0)}let at=t.slice(0,p).reduce((a,b)=>a+b,0)/p,pd=pD.slice(0,p).reduce((a,b)=>a+b,0)/p,md=mD.slice(0,p).reduce((a,b)=>a+b,0)/p,pdi=pd/at*100,mdi=md/at*100,dx=Math.abs(pdi-mdi)/(pdi+mdi)*100,adx=dx,av=[adx];for(let i=p;i<t.length;i++){at=(at*(p-1)+t[i])/p;pd=(pd*(p-1)+pD[i])/p;md=(md*(p-1)+mD[i])/p;pdi=pd/at*100;mdi=md/at*100;dx=Math.abs(pdi-mdi)/(pdi+mdi)*100;adx=(adx*(p-1)+dx)/p;av.push(adx)}return av}
function atr(c,p){let t=[];for(let i=1;i<c.length;i++)t.push(Math.max(c[i].high-c[i].low,Math.abs(c[i].high-c[i-1].close),Math.abs(c[i].low-c[i-1].close)));if(t.length<p)return.001;let a=t.slice(0,p).reduce((x,y)=>x+y,0)/p;for(let i=p;i<t.length;i++)a=(a*(p-1)+t[i])/p;return a}

// Veltrix AI signal
function vSig(candles,s){
  let cl=candles.map(x=>x.close),hi=candles.map(x=>x.high),lo=candles.map(x=>x.low);
  let li=candles.length-1;if(li<25)return{};
  let fa=sma(cl,s.fast),sa=sma(cl,s.slow);
  // HTF
  let hb=Math.max(1,Math.round(s.htf||4));
  let hf=fa[li]||0,hs=sa[li]||0;
  if(li>s.slow*hb){let ac=[];for(let i=li;i>li-s.slow*hb;i-=hb){let st=Math.max(0,i-hb+1),sl=candles.slice(st,i+1);ac.push(sl.reduce((x,y)=>x+y.close,0)/sl.length)}ac.reverse();let hfm=sma(ac,s.fast),hsm=sma(ac,s.slow);hf=hfm.length?hfm[hfm.length-1]:fa[li];hs=hsm.length?hsm[hsm.length-1]:sa[li]}
  // Swing
  let sh=0,sl=0,cs=Math.max(s.pivot,li-s.swing);
  for(let i=cs;i<li-s.pivot;i++){if(hi[i]>hi[i-1]&&hi[i]>hi[i+1]&&hi[i]>hi[i-2]&&hi[i]>hi[i+2]&&hi[i]>sh)sh=hi[i];if(lo[i]<lo[i-1]&&lo[i]<lo[i+1]&&lo[i]<lo[i-2]&&lo[i]<lo[i+2]&&(sl===0||lo[i]<sl))sl=lo[i]}
  if(!sh)sh=Math.max(...hi.slice(li-s.swing,li));if(!sl)sl=Math.min(...lo.slice(li-s.swing,li));
  // Cross
  let co=fa[li]!==null&&fa[li-1]!==null&&fa[li-1]<=sa[li-1]&&fa[li]>sa[li];
  let cu=fa[li]!==null&&fa[li-1]!==null&&fa[li-1]>=sa[li-1]&&fa[li]<sa[li];
  let e=candles[li].close,sig=null;
  if(co&&hf>hs&&sl>0){let r=e-sl;if(r>0&&r<e*.1){sig={type:'BUY',entry:e,sl,tp1:e+r*s.rr1,tp2:e+r*s.rr2}}}
  if(cu&&hf<hs&&sh>0){let r=sh-e;if(r>0&&r<e*.1){sig={type:'SELL',entry:e,sl:sh,tp1:e-r*s.rr1,tp2:e-r*s.rr2}}}
  return{fast:fa[li],slow:sa[li],swing:sl,sig,fa,sa};
}

// Spatrev AI signal
function sSig(candles){
  let cl=candles.map(x=>x.close),hi=candles.map(x=>x.high),lo=candles.map(x=>x.low);
  let li=candles.length-1;if(li<55)return{};
  let e20=ema(cl,20),e50=ema(cl,50),rs=rsi(cl,14),ad=adx(hi,lo,cl,14),at=atr(candles,14);
  let ri=li-13,rn=(ri>=0&&ri<rs.length)?rs[ri]:rs[rs.length-1],an=ad.length>0?ad[ad.length-1]:0,sig=null;
  let nb=Math.abs(cl[li]-e20[li])<=at*.1,cb=cl[li-1]<e20[li-1]&&cl[li]>e20[li];
  if(e20[li]>e50[li]&&rn>=38&&rn<=50&&an>25&&cb&&nb){let s=Math.min(...lo.slice(-5))-at*1.5;sig={type:'BUY',entry:cl[li],sl:s,tp1:cl[li]+(cl[li]-s)*1,tp2:cl[li]+(cl[li]-s)*2.5}}
  let ca=cl[li-1]>e20[li-1]&&cl[li]<e20[li];
  if(e20[li]<e50[li]&&rn>=50&&rn<=62&&an>25&&ca&&nb){let s=Math.max(...hi.slice(-5))+at*1.5;sig={type:'SELL',entry:cl[li],sl:s,tp1:cl[li]-(s-cl[li])*1,tp2:cl[li]-(s-cl[li])*2.5}}
  return{rsi:rn,adx:an,sig};
}

// ======== CHART ========
async function loadChart(pair,tf){
  let loadEl=document.getElementById('chartLoad'),cont=document.getElementById('chartContainer');
  // Cleanup
  if(pollTimer){clearInterval(pollTimer);pollTimer=null}
  if(chart){try{chart.remove()}catch(e){}chart=null}
  chartData=[];activeSig=null;
  series={candle:null,ma1:null,ma2:null,en:null,sl:null,t1:null,t2:null};
  
  loadEl.style.display='flex';loadEl.innerHTML='<span class="sp"></span><span>Loading '+pair.replace('USDT','')+' '+tf+'...</span>';
  
  try{
    if(typeof LightweightCharts==='undefined')throw Error('Library not found');
    let limit=tf==='1m'?500:200;
    let res=await fetch('https://api.binance.com/api/v3/klines?symbol='+pair+'&interval='+tf+'&limit='+limit);
    if(!res.ok)throw Error('API error');
    let raw=await res.json();
    chartData=raw.map(k=>({time:Math.floor(k[0]/1000),open:+k[1],high:+k[2],low:+k[3],close:+k[4],volume:+k[5]}));
    if(chartData.length<30)throw Error('Not enough data');
    
    loadEl.style.display='none';
    
    chart=LightweightCharts.createChart(cont,{
      layout:{backgroundColor:'#0b0e11',textColor:'#848e9c'},
      grid:{vertLines:{color:'#1e2329'},horzLines:{color:'#1e2329'}},
      timeScale:{timeVisible:true,secondsVisible:tf==='1m',borderColor:'#2b3139'},
      rightPriceScale:{borderColor:'#2b3139'},
      crosshair:{mode:0},
    });
    
    series.candle=chart.addCandlestickSeries({upColor:'#0ecb81',downColor:'#f6465d',borderUpColor:'#0ecb81',borderDownColor:'#f6465d',wickUpColor:'#0ecb81',wickDownColor:'#f6465d'});
    series.candle.setData(chartData);
    
    // Add initial MAs + signals
    updateMAs();
    updateSignals();
    chart.timeScale().fitContent();
    
    // Start polling
    pollTimer=setInterval(function(){pollChart(pair,tf)},6000);
  }catch(e){
    loadEl.innerHTML='<span style="color:var(--red)">⚠️ '+e.message+'</span>';
  }
}

function updateMAs(){
  if(!chart||!chartData.length)return;
  let cl=chartData.map(x=>x.close);
  // Remove old MA series except candle
  if(series.ma1){try{chart.removeSeries(series.ma1)}catch(e){}series.ma1=null}
  if(series.ma2){try{chart.removeSeries(series.ma2)}catch(e){}series.ma2=null}
  
  if(ind.v){
    let r=vSig(chartData,set);
    if(r.fa&&r.sa){
      let d1=r.fa.map((v,i)=>v!==null?{time:chartData[i].time,value:v}:null).filter(x=>x);
      let d2=r.sa.map((v,i)=>v!==null?{time:chartData[i].time,value:v}:null).filter(x=>x);
      series.ma1=chart.addLineSeries({color:'#0066ff',lineWidth:2,lastValueVisible:false,priceLineVisible:false});
      series.ma1.setData(d1);
      series.ma2=chart.addLineSeries({color:'#FF6D00',lineWidth:2,lastValueVisible:false,priceLineVisible:false});
      series.ma2.setData(d2);
    }
  }else if(ind.s){
    let e20=ema(cl,20),e50=ema(cl,50);
    let d1=e20.map((v,i)=>({time:chartData[i].time,value:v}));
    let d2=e50.map((v,i)=>({time:chartData[i].time,value:v}));
    series.ma1=chart.addLineSeries({color:'#2962FF',lineWidth:2,lastValueVisible:false,priceLineVisible:false});
    series.ma1.setData(d1);
    series.ma2=chart.addLineSeries({color:'#FF6D00',lineWidth:2,lastValueVisible:false,priceLineVisible:false});
    series.ma2.setData(d2);
  }
}

function updateSignals(){
  if(!chart||!chartData.length)return;
  let li=chartData.length-1;
  let r=ind.v?vSig(chartData,set):{};
  let r2=ind.s?sSig(chartData):{};
  let sig=r.sig||r2.sig;
  
  // Status bar
  if(ind.v){
    document.getElementById('v1').textContent=r.fast?r.fast.toFixed(2):'—';
    document.getElementById('v2').textContent=r.slow?r.slow.toFixed(2):'—';
    document.getElementById('v3').textContent=r.swing?r.swing.toFixed(2):'—';
  }else if(ind.s){
    document.getElementById('v1').textContent=r2.rsi?r2.rsi.toFixed(1):'—';
    document.getElementById('v2').textContent=r2.adx?r2.adx.toFixed(1):'—';
    document.getElementById('v3').textContent='—';
  }
  
  let tg=document.getElementById('sigTag'),sv=document.getElementById('v4');
  if(sig){
    tg.className='tag '+(sig.type==='BUY'?'b':'s');tg.textContent=sig.type;
    sv.textContent=sig.type+' @ $'+fp(sig.entry);
    if(!activeSig||activeSig.time!==chartData[li].time){
      clearSigLines();activeSig={...sig,time:chartData[li].time};drawSigLines();
    }
    series.candle.setMarkers([{time:chartData[li].time,position:sig.type==='BUY'?1:2,color:sig.type==='BUY'?'#0ecb81':'#f6465d',shape:sig.type==='BUY'?'arrowUp':'arrowDown',text:sig.type}]);
  }else{
    tg.className='tag';tg.textContent='Ready';sv.textContent='—';
    if(activeSig&&li-chartData.findIndex(d=>d.time===activeSig.time)>3){clearSigLines();activeSig=null}
  }
  // Historical markers
  addMarkers();
  renderDash(sig);
}

function addMarkers(){
  if(!chart||!series.candle||!chartData.length)return;
  let m=[];
  for(let i=55;i<chartData.length-1;i++){
    let sub=chartData.slice(0,i+1);
    let r=ind.v?vSig(sub,set):{},r2=ind.s?sSig(sub):{},sig=r.sig||r2.sig;
    if(sig)m.push({time:chartData[i].time,position:sig.type==='BUY'?1:2,color:sig.type==='BUY'?'#0ecb81':'#f6465d',shape:sig.type==='BUY'?'arrowUp':'arrowDown',text:sig.type})
  }
  series.candle.setMarkers(m.slice(-40));
}

async function pollChart(pair,tf){
  if(!chart||!series.candle||!chartData.length)return;
  try{
    let res=await fetch('https://api.binance.com/api/v3/klines?symbol='+pair+'&interval='+tf+'&limit=3');
    if(!res.ok)return;let raw=await res.json();
    let nd=raw.map(k=>({time:Math.floor(k[0]/1000),open:+k[1],high:+k[2],low:+k[3],close:+k[4],volume:+k[5]}));
    if(!nd.length)return;
    let lt=chartData[chartData.length-1].time,nt=nd[nd.length-1].time;
    if(nt===lt){let u=nd[nd.length-1];chartData[chartData.length-1]=u;series.candle.update(u)}
    else{for(let d of nd){if(d.time>lt){chartData.push(d);series.candle.update(d)}}}
    updateMAs();updateSignals();
  }catch(e){}
}

function drawSigLines(){
  if(!activeSig||!chart)return;
  let s=activeSig,si=chartData.findIndex(d=>d.time===s.time);if(si<0)return;
  let ei=Math.min(si+3,chartData.length-1),et=chartData[ei].time,sc=s.type==='BUY'?'#0ecb81':'#f6465d';
  series.en=chart.addLineSeries({color:'#eaecef',lineWidth:1,lineStyle:3,lastValueVisible:true,priceLineVisible:false});
  series.en.setData([{time:s.time,value:s.entry},{time:et,value:s.entry}]);
  series.sl=chart.addLineSeries({color:'#f6465d',lineWidth:2,lineStyle:2,lastValueVisible:true,priceLineVisible:false});
  series.sl.setData([{time:s.time,value:s.sl},{time:et,value:s.sl}]);
  series.t1=chart.addLineSeries({color:sc,lineWidth:1,lineStyle:3,lastValueVisible:true,priceLineVisible:false});
  series.t1.setData([{time:s.time,value:s.tp1},{time:et,value:s.tp1}]);
  series.t2=chart.addLineSeries({color:sc,lineWidth:2,lineStyle:0,lastValueVisible:true,priceLineVisible:false});
  series.t2.setData([{time:s.time,value:s.tp2},{time:et,value:s.tp2}]);
}

function clearSigLines(){
  if(!chart)return;
  ['en','sl','t1','t2'].forEach(k=>{if(series[k]){try{chart.removeSeries(series[k])}catch(e){}series[k]=null}})
}

function renderDash(sig){
  let box=document.getElementById('dashWrap'),grid=document.getElementById('dashGrid');
  let t=dash(d=>d);
  if(!t){box.style.display='none';return}
  box.style.display='block';
  grid.innerHTML='<div class="c h" style="background:#0066ff">⚡ VELTRIX</div><div class="c h" style="background:#0044cc">2.0</div><div class="c h" style="background:#0044cc"></div><div class="c h" style="background:#0044cc"></div><div class="c sh">📊 TOTAL</div><div class="c sh"></div><div class="c sh"></div><div class="c sh"></div><div class="c l">Wins</div><div class="c v w">0</div><div class="c l">Losses</div><div class="c v l">0</div><div class="c l">Win %</div><div class="c v">N/A</div><div class="c l"></div><div class="c v"></div><div class="c sh">STATUS</div><div class="c v">'+(sig?sig.type==='BUY'?'🟢 LONG':'🔴 SHORT':'⚪ NO TRADE')+'</div><div class="c sh">SIGNAL</div><div class="c v" style="color:#00ddff">'+(sig?sig.type:'None')+'</div>';
}

// ======== EVENTS ========
sel.addEventListener('change',function(){curPair=sel.value;loadChart(curPair,curTF)});
document.querySelectorAll('#tfGroup button').forEach(function(b){b.addEventListener('click',function(){document.querySelectorAll('#tfGroup button').forEach(function(x){x.classList.remove('on')});b.classList.add('on');curTF=b.dataset.tf;loadChart(curPair,curTF)})});

document.querySelectorAll('.ind-btn').forEach(function(b){b.addEventListener('click',function(){
  let k=b.dataset.ind;
  if(ind[k]){ind[k]=false;b.classList.remove('on')}else{ind[k]=true;b.classList.add('on')}
  if(!ind.v&&!ind.s){ind[k]=true;b.classList.add('on')}
  if(chartData.length){updateMAs();updateSignals()}
})});

document.getElementById('settingsBtn').addEventListener('click',function(){
  let p=document.getElementById('settingsPanel');p.style.display=p.style.display==='none'?'flex':'none'
});
document.getElementById('applySet').addEventListener('click',function(){
  set.fast=parseInt(document.getElementById('sFast').value)||9;
  set.slow=parseInt(document.getElementById('sSlow').value)||21;
  set.htf=parseInt(document.getElementById('sHtf').value)||4;
  set.swing=parseInt(document.getElementById('sSwing').value)||10;
  set.pivot=parseInt(document.getElementById('sPivot').value)||5;
  set.rr1=parseFloat(document.getElementById('sRr1').value)||1;
  set.rr2=parseFloat(document.getElementById('sRr2').value)||2;
  if(chartData.length){updateMAs();updateSignals()}
});

// ======== SCANNER ========
const SP=['BTCUSDT','BNBUSDT','ETHUSDT','SOLUSDT','XRPUSDT','DOGEUSDT','TRXUSDT','XLMUSDT','ZECUSDT','WLDUSDT','ASTERUSDT','NEARUSDT','FETUSDT','MEMEUSDT','PORTALUSDT','ALLOUSDT','GENIUSUSDT','HBARUSDT','ONDOUSDT','TONUSDT','SUIUSDT','INJUSDT','HEIUSDT','NFPUSDT'];
const STF=['1m','3m','5m','15m','1h'];
let scanning=false;
document.getElementById('scanBtn').addEventListener('click',async function(){
  if(scanning)return;scanning=true;
  let btn=this;btn.textContent='⏳ Scanning...';btn.disabled=true;
  document.getElementById('scanSt').textContent='Scanning...';
  document.getElementById('noSig').style.display='none';
  let all=[];let sc=0;
  for(let sym of SP){
    let rs=await Promise.all(STF.map(async tf=>{try{let r=await fetch('https://api.binance.com/api/v3/klines?symbol='+sym+'&interval='+tf+'&limit=100');if(!r.ok)throw Error();let d=await r.json();return{tf,data:d.map(k=>({time:k[0],open:+k[1],high:+k[2],low:+k[3],close:+k[4],volume:+k[5]}))}}catch(e){return{tf,data:null}}}));
    let kd={};for(let r of rs)kd[r.tf]=r.data;
    for(let tf of STF){let c=kd[tf];if(!c||c.length<55)continue;
      let r=ind.v?vSig(c,set):{},r2=ind.s?sSig(c):{},sig=r.sig||r2.sig;
      if(sig){let base=sym.replace('USDT','');all.push({type:sig.type,sym,base,tf,entry:sig.entry,sl:sig.sl,tp1:sig.tp1,tp2:sig.tp2})}}
    sc++;btn.textContent='⏳ '+sc+'/'+SP.length;
  }
  let grid=document.getElementById('sigGrid'),ns=document.getElementById('noSig');
  if(!all.length){ns.style.display='block';ns.innerHTML='<p style="font-size:22px;margin-bottom:4px">📡</p><p style="font-size:12px">No signals</p>'}
  else{ns.style.display='none';let frag=document.createDocumentFragment();
    for(let s of all){let card=document.createElement('div');card.className='sig-card '+(s.type==='BUY'?'buy':'sell');
      card.addEventListener('click',function(){sel.value=s.sym;curPair=s.sym;loadChart(s.sym,curTF)});
      card.innerHTML='<div style="display:flex;justify-content:space-between;margin-bottom:4px"><span style="font-weight:700;font-size:12px">'+s.type+'</span><span style="font-size:10px;color:var(--text2)">'+s.tf+'</span></div><div style="font-size:14px;font-weight:700">'+s.base+'<span style="font-weight:400;font-size:11px">/USDT</span></div><div style="font-size:10px;color:var(--text2);margin:3px 0">Entry: <b>$'+fp(s.entry)+'</b></div><div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:3px"><div style="background:var(--bg);border-radius:3px;padding:3px;text-align:center"><div style="font-size:7px;color:var(--text2)">SL</div><div style="font-weight:700;font-size:10px;color:var(--red)">$'+fp(s.sl)+'</div></div><div style="background:var(--bg);border-radius:3px;padding:3px;text-align:center"><div style="font-size:7px;color:var(--text2)">TP1</div><div style="font-weight:700;font-size:10px;color:var(--green)">$'+fp(s.tp1)+'</div></div><div style="background:var(--bg);border-radius:3px;padding:3px;text-align:center"><div style="font-size:7px;color:var(--text2)">TP2</div><div style="font-weight:700;font-size:10px;color:var(--green)">$'+fp(s.tp2)+'</div></div></div>';
      frag.appendChild(card)}
    grid.innerHTML='';grid.appendChild(frag);}
  btn.textContent='🔄 Scan Again';btn.disabled=false;
  document.getElementById('scanSt').textContent=all.length+' signals';
  scanning=false;
});

// ======== INIT ========
loadChart('BTCUSDT','1h');
</script>
