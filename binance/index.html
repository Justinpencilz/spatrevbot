<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Veltrix AI — Live Charts</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{width:100%;height:100%;overflow:hidden;background:#0b0e11;color:#eaecef;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;font-size:14px}
  
  /* HEADER */
  .hdr{display:flex;align-items:center;padding:0 12px;height:40px;background:#161b22;border-bottom:1px solid #30363d}
  .hdr .l{font-weight:700;font-size:13px;display:flex;align-items:center;gap:4px;color:#eaecef}
  .hdr .l span{color:#f0b90b}
  .hdr .l small{font-size:10px;color:#848e9c;font-weight:400;margin-left:4px}
  .hdr .nav{margin-left:auto;display:flex;gap:12px}
  .hdr .nav a{color:#848e9c;text-decoration:none;font-size:11px}
  .hdr .nav a:hover{color:#eaecef}
  .hdr .nav a.act{color:#f0b90b}
  
  /* CONTROLS BAR */
  .bar{display:flex;align-items:center;gap:4px;padding:4px 8px;background:#1e2329;border-bottom:1px solid #2b3139;flex-wrap:wrap;min-height:32px}
  .ib{padding:2px 6px;font-size:10px;background:#2b3139;border:1px solid #2b3139;border-radius:3px;color:#848e9c;cursor:pointer}
  .ib:hover{border-color:#848e9c}
  .ib.on{background:#1a2332;border-color:#f0b90b;color:#f0b90b}
  .ib .d{display:inline-block;width:4px;height:4px;border-radius:50%;background:#848e9c;margin-right:2px;vertical-align:middle}
  .ib.on .d{background:#f0b90b}
  .sep{width:1px;height:12px;background:#2b3139;margin:0 2px}
  .tb{padding:2px 6px;font-size:10px;background:transparent;border:1px solid transparent;border-radius:3px;color:#848e9c;cursor:pointer}
  .tb:hover{color:#eaecef;background:#2b3139}
  .tb.act{background:#f0b90b;color:#0b0e11}
  .pl{font-size:11px;color:#f0b90b;font-weight:500;margin-left:4px}
  .pp{font-size:11px;font-family:'SF Mono',monospace;margin-left:auto;color:#848e9c}

  /* CHART WRAPPER - full remaining height */
  .cw{flex:1;width:100%;position:relative}
  .cw iframe{width:100%;height:100%;border:none;display:block}
  
  /* LOADING */
  .ld{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:#131722;z-index:10;flex-direction:column;gap:8px;transition:opacity 0.4s}
  .ld.h{opacity:0;pointer-events:none}
  .sp{width:22px;height:22px;border:2px solid #30363d;border-top-color:#f0b90b;border-radius:50%;animation:s 0.7s linear infinite}
  @keyframes s{to{transform:rotate(360deg)}}
  .lt{font-size:11px;color:#848e9c}
  
  /* Make layout fill screen */
  .app{display:flex;flex-direction:column;height:100vh;width:100vw}
</style>
</head>
<body>
<div class="app">

  <!-- HEADER -->
  <div class="hdr">
    <div class="l"><span>◆</span> Veltrix AI <small>/ Charts</small></div>
    <div class="nav">
      <a href="/">Home</a>
      <a href="/vip/">VIP</a>
      <a href="/binance/" class="act">Charts</a>
    </div>
  </div>

  <!-- CONTROLS -->
  <div class="bar">
    <button class="ib on" onclick="this.classList.toggle('on')"><span class="d"></span>Veltrix AI</button>
    <button class="ib" onclick="this.classList.toggle('on')"><span class="d"></span>Spatrev AI</button>
    <span class="sep"></span>
    <button class="tb" onclick="setTF('1')">1m</button>
    <button class="tb" onclick="setTF('5')">5m</button>
    <button class="tb act" onclick="setTF('15')">15m</button>
    <button class="tb" onclick="setTF('60')">1h</button>
    <button class="tb" onclick="setTF('240')">4h</button>
    <button class="tb" onclick="setTF('1D')">1D</button>
    <span class="sep"></span>
    <span class="pl" id="pl">BTC/USDT</span>
    <span class="pp" id="pp">—</span>
  </div>

  <!-- TRADINGVIEW DIRECT IFRAME -->
  <div class="cw">
    <div class="ld" id="ld">
      <div class="sp"></div>
      <div class="lt" id="lt">Loading TradingView chart...</div>
    </div>
    <iframe id="tvframe" src="about:blank" allowfullscreen></iframe>
  </div>

</div>

<script>
// =============================================
// DIRECT TRADINGVIEW IFRAME - NO TV.JS DEPENDENCY
// =============================================
// We load the full TradingView chart page directly.
// This gives ALL TradingView features: symbol search,
// all studies, drawing tools, timeframes, everything.

let currentSymbol = 'BINANCE:BTCUSDT';
let currentTF = '15';

function buildChartURL(sym, tf) {
  // Use the full TradingView chart page in an iframe
  // This is the same as going to tradingview.com/chart
  return 'https://www.tradingview.com/chart/?symbol=' + encodeURIComponent(sym) + 
         '&interval=' + tf + 
         '&theme=dark' +
         '&toolbarbg=0b0e11' +
         '&studies=[]';
}

function loadChart() {
  const iframe = document.getElementById('tvframe');
  iframe.src = buildChartURL(currentSymbol, currentTF);
  
  // Hide loading after chart loads (or 5s timeout)
  setTimeout(() => {
    document.getElementById('ld').classList.add('h');
    document.getElementById('lt').textContent = 'Chart loaded ✓';
  }, 5000);
  
  // Also hide loading when iframe loads
  iframe.onload = function() {
    document.getElementById('ld').classList.add('h');
  };
}

function setTF(tf) {
  currentTF = tf;
  document.querySelectorAll('.tb').forEach(b => b.classList.remove('act'));
  event.target.classList.add('act');
  
  // Reload iframe with new timeframe
  const iframe = document.getElementById('tvframe');
  iframe.src = buildChartURL(currentSymbol, tf);
}

// =============================================
// BINANCE TICKERS (for price display only)
// =============================================
async function fetchPrice() {
  try {
    const res = await fetch('https://api.binance.com/api/v3/ticker/price?symbol=BTCUSDT');
    if (!res.ok) throw Error();
    const d = await res.json();
    const p = parseFloat(d.price);
    const fmt = p >= 1000 ? '$' + p.toLocaleString(undefined, {maximumFractionDigits:2}) : '$' + p.toFixed(4);
    document.getElementById('pp').textContent = fmt;
  } catch(e) {}
}

// =============================================
// INIT
// =============================================
document.getElementById('lt').textContent = 'Launching full TradingView chart...';
loadChart();
fetchPrice();
setInterval(fetchPrice, 10000);
</script>
</body>
</html>
