<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VELTRIX AI SCANNER 2.0</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#0b0e11;color:#eaecef;font-size:14px}
:root{--go:#f0b90b;--gr:#0ecb81;--rd:#f6465d}

.main{display:flex;flex-direction:column;height:100vh}

.nav{display:flex;align-items:center;gap:4px;padding:4px 8px;background:#161b22;border-bottom:1px solid #30363d;flex-shrink:0;min-height:38px;flex-wrap:wrap}
.pd{position:relative}
.pd .pb{display:flex;align-items:center;gap:4px;padding:3px 8px;background:#1e2329;border:1px solid #2b3139;border-radius:4px;color:#eaecef;cursor:pointer;font-size:11px;font-weight:600}
.pd .pb:hover{border-color:var(--go)}
.pd .dd{display:none;position:absolute;top:100%;left:0;z-index:100;width:200px;max-height:400px;background:#1e2329;border:1px solid #2b3139;border-radius:6px;margin-top:3px;overflow:hidden;box-shadow:0 8px 24px rgba(0,0,0,.5)}
.pd .dd.o{display:block}
.pd .dd input{width:100%;padding:5px 8px;background:#2b3139;border:none;border-bottom:1px solid #2b3139;color:#eaecef;font-size:10px;outline:none}
.pd .dd .dl{overflow-y:auto;max-height:360px}
.pd .dd .di{display:flex;justify-content:space-between;padding:4px 10px;cursor:pointer;font-size:10px;color:#eaecef}
.pd .dd .di:hover{background:#2b3139}
.nav .s1{width:1px;height:16px;background:#2b3139;flex-shrink:0}
.tb{padding:2px 6px;font-size:10px;background:#1e2329;border:1px solid #2b3139;border-radius:3px;color:#848e9c;cursor:pointer;font-weight:500;white-space:nowrap}
.tb:hover{border-color:var(--go);color:#eaecef}
.tb.act{background:var(--go);color:#0b0e11;border-color:var(--go)}
.ib{padding:2px 8px;font-size:10px;background:#1e2329;border:1px solid #2b3139;border-radius:3px;color:#848e9c;cursor:pointer;font-weight:500}
.ib:hover{border-color:var(--go);color:#eaecef}
.ib.on{background:#1a3a2a;border-color:var(--gr);color:var(--gr)}
.ib.off{background:#3a1a2a;border-color:var(--rd);color:var(--rd)}
.sb2{padding:2px 8px;font-size:10px;background:#1e2329;border:1px solid #2b3139;border-radius:3px;color:#848e9c;cursor:pointer}

.dd-wrap{position:relative}
.dd-wrap .dd-btn{display:flex;align-items:center;gap:4px;padding:2px 8px;font-size:10px;background:#1e2329;border:1px solid #2b3139;border-radius:3px;color:#848e9c;cursor:pointer}
.dd-wrap .dd-btn:hover{border-color:var(--go);color:#eaecef}
.dd-wrap .dd-btn.act{border-color:var(--go);color:var(--go);background:#1a2332}
.dd-wrap .dd-menu{display:none;position:absolute;top:100%;left:0;z-index:100;width:155px;max-height:360px;background:#1e2329;border:1px solid #2b3139;border-radius:6px;margin-top:3px;overflow:hidden;box-shadow:0 8px 24px rgba(0,0,0,.5)}
.dd-wrap .dd-menu.o{display:block}
.dd-menu .dmi{display:flex;align-items:center;gap:5px;padding:4px 8px;cursor:pointer;font-size:10px;color:#eaecef}
.dd-menu .dmi:hover{background:#2b3139}
.dd-menu .dmi .ic{width:16px;text-align:center;font-size:11px}
.dd-menu .dmi.act{background:#1a2332;border-left:3px solid var(--go)}

/* Chart + Canvas overlay */
.cw{flex:1;position:relative;min-height:0}
#tv{width:100%;height:100%}
#drawCanvas{position:absolute;inset:0;z-index:15;cursor:crosshair;pointer-events:auto;touch-action:none}

/* Signal overlay */
.so{position:absolute;inset:0;pointer-events:none;z-index:5;overflow:hidden}
.so .sg{position:absolute;height:2px}
.so .sg.e{border-top:2px solid #f0b90b}
.so .sg.t{border-top:2px solid #0ecb81}
.so .sg.s{border-top:2px solid #f6465d}
.so .sg .lb{position:absolute;right:-2px;top:50%;transform:translate(100%,-50%);padding:2px 6px;border-radius:3px;font-size:9px;font-weight:700;white-space:nowrap;font-family:'SF Mono','Consolas',monospace}
.so .sg .lb.g{color:#fff;background:#0ecb81}
.so .sg .lb.r{color:#fff;background:#f6465d}
.so .sg .lb.y{color:#000;background:#f0b90b}
.so .st{position:absolute;top:8px;right:8px;padding:3px 10px;border-radius:4px;font-size:10px;font-weight:700;z-index:6}
.so .st.b{background:rgba(14,203,129,.9);color:#000}
.so .st.s{background:rgba(246,69,93,.9);color:#fff}

.sig-bar{display:flex;gap:8px;padding:3px 12px;background:#131722;border-top:1px solid #2b3139;font-size:10px;align-items:center;flex-shrink:0;min-height:24px}
.sig-bar .tag{padding:1px 7px;border-radius:3px;font-weight:600}
.sig-bar .tag.b{background:#0a2a1a;color:var(--gr)}
.sig-bar .tag.s{background:#2a0a1a;color:var(--rd)}
.sig-bar .tag.n{background:#1e2329;color:#848e9c}

.st{display:flex;justify-content:space-between;padding:3px 12px;background:#0b0e11;border-top:1px solid #2b3139;font-size:10px;color:#848e9c;flex-shrink:0}
.st .dt{display:inline-block;width:6px;height:6px;border-radius:50%;margin-right:4px}
.st .dt.g{background:var(--gr)}

.lo{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#0b0e11;z-index:10}
.lo.h{display:none}
.sp2{width:30px;height:30px;border:3px solid #2b3139;border-top-color:var(--go);border-radius:50%;animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

.settings-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:999;align-items:center;justify-content:center}
.settings-modal.show{display:flex}
.settings-box{background:#1e2329;border:1px solid #2b3139;border-radius:10px;padding:20px;width:340px}
.settings-box h3{font-size:14px;margin-bottom:14px;color:var(--go)}
.settings-box .rw{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.settings-box .rw label{font-size:12px;color:#848e9c}
.settings-box .rw input{width:70px;padding:4px 8px;background:#2b3139;border:1px solid #30363d;border-radius:4px;color:#eaecef;font-size:12px;text-align:center}
.settings-box .rw input:focus{border-color:var(--go);outline:none}
.settings-box .ac{display:flex;gap:10px;margin-top:16px}
.settings-box .ac button{flex:1;padding:8px;border:none;border-radius:5px;font-size:12px;font-weight:600;cursor:pointer}
.settings-box .ac .sv{background:var(--go);color:#0b0e11}
.settings-box .ac .cl{background:#2b3139;color:#848e9c}

.dl::-webkit-scrollbar{width:4px}.dl::-webkit-scrollbar-thumb{background:#2b3139;border-radius:2px}
@media(max-width:768px){.nav{gap:3px;padding:4px 5px}.tb{padding:2px 4px;font-size:9px}.dd-menu{width:140px}.dd-menu .dmi{font-size:9px;padding:3px 6px}}
</style>
</head>
<body>

    <div class="pd" id="pdd">

      <div class="dd-menu" id="ddm">
        <div class="dmi act" onclick="setTool('cursor')"><span class="ic">👆</span> Cursor</div>
        <div class="dmi" onclick="setTool('line')"><span class="ic">╱</span> Line</div>
        <div class="dmi" onclick="setTool('horizontal')"><span class="ic">―</span> Horizontal</div>
        <div class="dmi" onclick="setTool('vertical')"><span class="ic">│</span> Vertical</div>
        <div class="dmi" onclick="setTool('arrow')"><span class="ic">➤</span> Arrow</div>
        <div class="dmi" onclick="setTool('rect')"><span class="ic">▭</span> Rectangle</div>
        <div class="dmi" onclick="setTool('circle')"><span class="ic">○</span> Circle</div>
        <div class="dmi" onclick="setTool('ellipse')"><span class="ic">◯</span> Ellipse</div>
        <div class="dmi" onclick="setTool('text')"><span class="ic">T</span> Text</div>
        <div class="dmi" onclick="setTool('fib')"><span class="ic">F</span> Fibonacci</div>
        <div style="border-top:1px solid #2b3139"></div>
        <div class="dmi" onclick="clearDrawings()" style="color:#f6465d"><span class="ic">✕</span> Clear All</div>
      </div>
    </div>

    <button class="sb2" onclick="os()">⚙️</button>
  </div>

  <div class="cw">
    <div class="lo" id="lo"><div class="sp2"></div><p>Loading...</p></div>
    <div id="tv"></div>
    <canvas id="drawCanvas"></canvas>
    <div class="so" id="so"></div>
  </div>

  <div class="sig-bar">
    <span style="color:#848e9c">⚡</span>
    <span class="tag n" id="sigTag">Ready</span>
    <span style="color:#848e9c;font-size:9px" id="sigInfo">All crypto • forex • deriv • indices • commodities</span>
    <span style="margin-left:auto;color:#848e9c;font-size:9px" id="sigUpd"></span>
    <span style="color:#848e9c;font-size:9px" id="toolStatus"></span>
  </div>

  <div class="st">
    <span><span class="dt g"></span><span>TradingView Live</span></span>
    <span id="stm"></span>
  </div>
</div>

<div class="settings-modal" id="sm">
  <div class="settings-box">
    <h3>Veltrix AI — SMA</h3>
    <div class="rw"><label>Fast MA</label><input type="number" id="vf" value="9" min="1" max="200"></div>
    <div class="rw"><label>Slow MA</label><input type="number" id="vs" value="21" min="1" max="200"></div>
    <h3 style="margin-top:14px">Spatrev AI — EMA</h3>
    <div class="rw"><label>Fast EMA</label><input type="number" id="ef" value="20" min="1" max="200"></div>
    <div class="rw"><label>Slow EMA</label><input type="number" id="es" value="50" min="1" max="200"></div>
    <h3 style="margin-top:14px">Signal</h3>
    <div class="rw"><label>Swing</label><input type="number" id="sLen" value="10" min="2" max="50"></div>
    <div class="rw"><label>RR1</label><input type="number" id="rr1" value="1.0" min="0.1" max="10" step="0.1"></div>
    <div class="rw"><label>RR2</label><input type="number" id="rr2" value="2.0" min="0.1" max="10" step="0.1"></div>
    <div class="ac">
      <button class="sv" onclick="ss()">Save</button>
      <button class="cl" onclick="cs()">Cancel</button>
    </div>
  </div>
</div>

const S = {w:null, tf:'60', vOn:true, vF:9, vS:21, sOn:false, sF:20, sS:50,

// ==================== TV WIDGET ====================
function cw(){
  document.getElementById('tv').innerHTML='';document.getElementById('so').innerHTML='';
  document.getElementById('drawCanvas').style.display='none';
  const lo=document.getElementById('lo');lo.classList.remove('h');lo.style.display='flex';
  S.w=new TradingView.widget({
    container_id:'tv',symbol:S.curSym,interval:S.tf,
    timezone:'Etc/UTC',theme:'dark',style:'1',locale:'en',toolbar_bg:'#131722',
    enable_publishing:false,allow_symbol_change:false,hide_top_toolbar:false,hide_legend:false,
    save_image:false,autosize:true,studies:getSt(),
    disabled_features:[],enabled_features:['study_templates','show_hide_button_on_legend'],
    overrides:{'paneProperties.background':'#131722','paneProperties.vertGridProperties.color':'#1e222d','paneProperties.horzGridProperties.color':'#1e222d','scalesProperties.textColor':'#848e9c'},
    loading_screen:{backgroundColor:'#131722',foregroundColor:'#f0b90b'}
  });
  setTimeout(()=>{lo.classList.add('h');lo.style.display='none';initCanvas()},4000);
}
function getSt(){const l=[];if(S.vOn){l.push({id:'MASimple@tv-basicstudies',inputs:{length:S.vF}});l.push({id:'MASimple@tv-basicstudies',inputs:{length:S.vS}})}if(S.sOn){l.push({id:'EMAExponential@tv-basicstudies',inputs:{length:S.sF}});l.push({id:'EMAExponential@tv-basicstudies',inputs:{length:S.sS}})}return l}

// ==================== DRAWING CANVAS ====================
function initCanvas(){
  const c=document.getElementById('drawCanvas'),cwEl=document.querySelector('.cw');
  if(!c||!cwEl)return;
  c.width=cwEl.clientWidth;c.height=cwEl.clientHeight;
  c.style.display=S.tool!=='cursor'?'block':'none';
  c.style.cursor=S.tool==='cursor'?'default':'crosshair';
  redraw();
}

function setTool(t){
  S.drawO=false;document.getElementById('ddm').classList.remove('o');
  S.tool=t;S.textMode=false;
  document.getElementById('drawLabel').textContent=t.charAt(0).toUpperCase()+t.slice(1);
  const c=document.getElementById('drawCanvas');
  if(!c)return;
  if(t==='cursor'){c.style.display='none';c.style.cursor='default'}
  else{
    c.style.display='block';c.style.cursor='crosshair';
    // Ensure canvas is properly sized
    const cwEl=document.querySelector('.cw');
    if(cwEl){c.width=cwEl.clientWidth;c.height=cwEl.clientHeight}
  }
  // Update active menu item
  document.querySelectorAll('#ddm .dmi').forEach(el=>el.classList.remove('act'));
  document.querySelectorAll('#ddm .dmi').forEach(el=>{
    if(el.textContent.trim().toLowerCase().includes(t))el.classList.add('act')
  });
  document.getElementById('toolStatus').textContent=t==='cursor'?'':t;
}

function getCanvasPos(e){
  const c=document.getElementById('drawCanvas');
  const r=c.getBoundingClientRect();
  const t=e.touches?e.touches[0]:e;
  return {x:t.clientX-r.left,y:t.clientY-r.top};
}

// Mouse/Touch events — only on canvas, not buttons/dropdowns
function startDraw(e){
  // Only capture if target is the canvas or inside .cw chart area
  const c=document.getElementById('drawCanvas');
  if(!c||c.style.display==='none'||S.tool==='cursor')return;
  // Ignore clicks on buttons, dropdowns, nav items
  if(e.target.closest&&(e.target.closest('.nav')||e.target.closest('.dd-wrap')||e.target.closest('.pd')||e.target.closest('.sb2')||e.target.closest('.ib')||e.target.closest('.tb')))return;
  // Only start drawing if clicking on or near the canvas area
  const cwEl=document.querySelector('.cw');
  if(!cwEl||!cwEl.contains(e.target))return;

  e.preventDefault();
  const pos=getCanvasPos(e);
  if(S.tool==='text'){
    const txt=prompt('Enter text:','');
    if(txt){S.drawings.push({type:'text',x:pos.x,y:pos.y,text:txt,color:'#0ecb81'});redraw()}
    return;
  }
  S.drawing={type:S.tool,start:pos,end:pos,color:'#0ecb81'};
  if(S.tool==='fib')S.drawing.color='#f0b90b';
  
  function onMove(ev){
    ev.preventDefault();
    const p=getCanvasPos(ev);
    if(S.tool==='line'||S.tool==='arrow'||S.tool==='fib'){S.drawing.end=p}
    else if(S.tool==='horizontal'){S.drawing.end={x:p.x,y:S.drawing.start.y}}
    else if(S.tool==='vertical'){S.drawing.end={x:S.drawing.start.x,y:p.y}}
    else S.drawing.end=p;
    redraw();
  }
  function onUp(ev){
    ev.preventDefault();
    const p=getCanvasPos(ev);
    S.drawing.end=p;
    S.drawings.push({...S.drawing});
    S.drawing=null;
    redraw();
    document.removeEventListener('mousemove',onMove);
    document.removeEventListener('mouseup',onUp);
    document.removeEventListener('touchmove',onMove);
    document.removeEventListener('touchend',onUp);
  }
  document.addEventListener('mousemove',onMove);
  document.addEventListener('mouseup',onUp);
  document.addEventListener('touchmove',onMove,{passive:false});
  document.addEventListener('touchend',onUp);
}

document.addEventListener('mousedown',startDraw);
document.addEventListener('touchstart',startDraw,{passive:false});

function redraw(){
  const c=document.getElementById('drawCanvas');
  if(!c)return;
  const ctx=c.getContext('2d');
  ctx.clearRect(0,0,c.width,c.height);
  
  // Draw all saved drawings
  S.drawings.forEach(d=>drawShape(ctx,d));
  // Draw current drawing in progress
  if(S.drawing)drawShape(ctx,S.drawing);
}

function drawShape(ctx,d){
  ctx.strokeStyle=d.color||'#0ecb81';
  ctx.fillStyle=d.color||'#0ecb81';
  ctx.lineWidth=2;
  ctx.font='12px sans-serif';
  
  switch(d.type){
    case 'line':
      ctx.beginPath();ctx.moveTo(d.start.x,d.start.y);ctx.lineTo(d.end.x,d.end.y);ctx.stroke();
      break;
    case 'arrow':
      ctx.beginPath();ctx.moveTo(d.start.x,d.start.y);ctx.lineTo(d.end.x,d.end.y);ctx.stroke();
      const angle=Math.atan2(d.end.y-d.start.y,d.end.x-d.start.x);
      ctx.beginPath();ctx.moveTo(d.end.x,d.end.y);
      ctx.lineTo(d.end.x-12*Math.cos(angle-0.4),d.end.y-12*Math.sin(angle-0.4));
      ctx.lineTo(d.end.x-12*Math.cos(angle+0.4),d.end.y-12*Math.sin(angle+0.4));
      ctx.closePath();ctx.fill();
      break;
    case 'horizontal':
      ctx.beginPath();ctx.moveTo(0,d.start.y);ctx.lineTo(c.width,d.start.y);ctx.stroke();
      ctx.fillText('─',4,d.start.y-3);
      break;
    case 'vertical':
      ctx.beginPath();ctx.moveTo(d.start.x,0);ctx.lineTo(d.start.x,c.height);ctx.stroke();
      ctx.fillText('│',d.start.x+3,12);
      break;
    case 'rect':case 'rectangle':
      const rx=Math.min(d.start.x,d.end.x),ry=Math.min(d.start.y,d.end.y);
      const rw=Math.abs(d.end.x-d.start.x),rh=Math.abs(d.end.y-d.start.y);
      ctx.strokeRect(rx,ry,rw,rh);
      break;
    case 'circle':
      const cx=(d.start.x+d.end.x)/2,cy=(d.start.y+d.end.y)/2;
      const cr=Math.sqrt((d.end.x-d.start.x)**2+(d.end.y-d.start.y)**2)/2;
      ctx.beginPath();ctx.arc(cx,cy,cr,0,Math.PI*2);ctx.stroke();
      break;
    case 'ellipse':
      const ex=(d.start.x+d.end.x)/2,ey=(d.start.y+d.end.y)/2;
      const erx=Math.abs(d.end.x-d.start.x)/2,ery=Math.abs(d.end.y-d.start.y)/2;
      ctx.beginPath();ctx.ellipse(ex,ey,erx,ery,0,0,Math.PI*2);ctx.stroke();
      break;
    case 'text':
      ctx.fillStyle=d.color||'#0ecb81';
      ctx.fillText(d.text||'',d.x,d.y);
      break;
    case 'fib':
      ctx.beginPath();ctx.moveTo(d.start.x,d.start.y);ctx.lineTo(d.end.x,d.end.y);ctx.stroke();
      const dy=d.end.y-d.start.y;
      const levels=[0,0.236,0.382,0.5,0.618,0.786,1];
      const cols=['#f0b90b','#0ecb81','#0ecb81','#f6465d','#f6465d','#848e9c','#f0b90b'];
      levels.forEach((l,i)=>{
        const y=d.start.y+dy*l;
        ctx.strokeStyle=cols[i];ctx.setLineDash([4,4]);
        ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(c.width,y);ctx.stroke();
        ctx.setLineDash([]);
        ctx.fillStyle=cols[i];ctx.fillText((l*100).toFixed(1)+'%',4,y-3);
      });
      break;
  }
}

function resizeCanvas(){
  const c=document.getElementById('drawCanvas'),cwEl=document.querySelector('.cw');
  if(!c||!cwEl)return;
  c.width=cwEl.clientWidth;c.height=cwEl.clientHeight;
  if(S.tool!=='cursor')c.style.display='block';
  redraw();
}

window.addEventListener('resize',()=>{
  clearTimeout(window._resizeTimer);
  window._resizeTimer=setTimeout(()=>{
    if(S.w){try{S.w.resize()}catch(e){}}
    resizeCanvas();
    if(S.signal)drawOL();
  },300);
});

function clearDrawings(){
  S.drawO=false;document.getElementById('ddm').classList.remove('o');
  S.drawings=[];S.drawing=null;
  redraw();
  document.getElementById('so').innerHTML='';
}

// ==================== DROPDOWNS ====================
function tdDraw(){S.drawO=!S.drawO;document.getElementById('ddm').classList.toggle('o',S.drawO)}
document.addEventListener('click',e=>{
  if(S.ddO&&!e.target.closest('.pd')){S.ddO=false;document.getElementById('pdl').classList.remove('o')}
  if(S.drawO&&!e.target.closest('.dd-wrap')){S.drawO=false;document.getElementById('ddm').classList.remove('o')}
});

// ==================== PAIR SELECTION ====================
const seen={};const UNIQUE=[];PAIRS.forEach(p=>{const k=p.s;if(!seen[k]){seen[k]=true;UNIQUE.push(p)}});PAIRS.length=0;PAIRS.push(...UNIQUE);

function td(){S.ddO=!S.ddO;document.getElementById('pdl').classList.toggle('o',S.ddO);if(S.ddO)setTimeout(()=>document.getElementById('ds').focus(),50)}
function rd(f){
  let items=PAIRS;if(f){const l=f.toLowerCase();items=items.filter(p=>p.l.toLowerCase().includes(l))}
  document.getElementById('dll').innerHTML=items.map(p=>{
    const ac=p.s===S.curSym?' style="background:#2b3139"':'';return `<div class="di"${ac} onclick="sp('${p.s}','${p.l}')">${p.g} ${p.l}</div>`;
  }).join('');
}
function fd(){rd(document.getElementById('ds').value)}rd();

function sp(sym,label){
  S.curSym=sym;S.ddO=false;S.drawings=[];S.drawing=null;
  document.getElementById('pdl').classList.remove('o');
  document.getElementById('pn').textContent=label||sym;
  S.isBN=sym.startsWith('BINANCE:');
  document.getElementById('so').innerHTML='';cw();
  if(S.isBN)setTimeout(computeSignal,3000);
  else{const t=document.getElementById('sigTag');t.className='tag n';t.textContent='TV Mode';document.getElementById('sigInfo').textContent='Use TV toolbar'}
}
function stf(tf){S.tf=tf;document.querySelectorAll('.tb').forEach(b=>b.classList.toggle('act',b.dataset.tf===tf));if(!S.w)return;try{S.w.setSymbol(S.curSym,tf)}catch(e){cw()}}

// ==================== SIGNAL ====================
async function computeSignal(){
  if(!S.isBN)return;const kl=await klines();if(!kl||kl.length<50)return;
  const c=kl.map(k=>k.c),l=kl.map(k=>k.l),h=kl.map(k=>k.h);
  const vf=sma(c,S.vF),vs=sma(c,S.vS),sf=ema(c,S.sF),ss=ema(c,S.sS);
  S.signal=null;
  if(S.vOn){for(let i=c.length-2;i>=Math.max(S.vF,S.vS,5);i--){if(!vf[i]||!vs[i]||!vf[i-1]||!vs[i-1])continue;if(vf[i-1]<=vs[i-1]&&vf[i]>vs[i]){const sl=Math.min(...l.slice(i-S.swingLen,i));if(sl>0&&sl<c[i]*0.99){const e=c[i],r=e-sl;S.signal={ty:'buy',e,sl,tp1:e+r*S.rr1,tp2:e+r*S.rr2,src:'Veltrix'};break}}if(vf[i-1]>=vs[i-1]&&vf[i]<vs[i]){const sl=Math.max(...h.slice(i-S.swingLen,i));if(sl>0&&sl>c[i]*1.01){const e=c[i],r=sl-e;S.signal={ty:'sell',e,sl,tp1:e-r*S.rr1,tp2:e-r*S.rr2,src:'Veltrix'};break}}}}
  if(!S.signal&&S.sOn){for(let i=c.length-2;i>=Math.max(S.sF,S.sS,5);i--){if(!sf[i]||!ss[i]||!sf[i-1]||!ss[i-1])continue;if(sf[i-1]<=ss[i-1]&&sf[i]>ss[i]){const sl=Math.min(...l.slice(i-S.swingLen,i));if(sl>0&&sl<c[i]*0.99){const e=c[i],r=e-sl;S.signal={ty:'buy',e,sl,tp1:e+r*S.rr1,tp2:e+r*S.rr2,src:'Spatrev'};break}}if(sf[i-1]>=ss[i-1]&&sf[i]<ss[i]){const sl=Math.max(...h.slice(i-S.swingLen,i));if(sl>0&&sl>c[i]*1.01){const e=c[i],r=sl-e;S.signal={ty:'sell',e,sl,tp1:e-r*S.rr1,tp2:e-r*S.rr2,src:'Spatrev'};break}}}}
  updSig();drawOL();
}
async function klines(){try{const m=S.curSym.match(/BINANCE:([A-Z0-9]{2,20})/);if(!m)return[];const intMap={'1':'1m','3':'3m','5':'5m','15':'15m','30':'30m','60':'1h','240':'4h','1D':'1d','1W':'1w','1M':'1M'};const r=await fetch(`https://api.binance.com/api/v3/klines?symbol=${m[1]}&interval=${intMap[S.tf]||'1h'}&limit=200`);if(!r.ok)return[];const d=await r.json();return d.map(k=>({t:Math.floor(k[0]/1000),o:+k[1],h:+k[2],l:+k[3],c:+k[4],v:+k[5]}))}catch(e){return[]}}
function sma(d,l){const r=[];for(let i=0;i<d.length;i++){if(i<l-1){r.push(null);continue}let s=0;for(let j=i-l+1;j<=i;j++)s+=d[j];r.push(s/l)}return r}
function ema(d,l){const r=[];const k=2/(l+1);let p=0,st=false;for(let i=0;i<d.length;i++){if(i<l-1){r.push(null);continue}if(!st){let s=0;for(let j=0;j<l;j++)s+=d[j];p=s/l;r.push(p);st=true}else{p=d[i]*k+p*(1-k);r.push(p)}}return r}

function drawOL(){
  const so=document.getElementById('so');const sig=S.signal;const cw2=document.querySelector('.cw');const h=cw2.clientHeight,w=cw2.clientWidth;
  if(!sig||h<100||w<100){so.innerHTML='';return}
  const p=[sig.e,sig.tp1,sig.tp2,sig.sl];const pad=Math.max(...p)*0.01;const mx=Math.max(...p)+pad,mn=Math.min(...p)-pad,rg=mx-mn;
  const yPx=v=>((mx-v)/rg)*h;const lw=Math.max(w*0.18,120),lx=w-lw;const cls=sig.ty==='buy'?'b':'s';
  so.innerHTML=`<div class="st ${cls}" style="top:8px;right:8px">${sig.ty.toUpperCase()} ${sig.src} @ $${fp(sig.e)}</div><div class="sg e" style="left:${lx}px;width:${lw}px;top:${yPx(sig.e)}px"><div class="lb y">ENTRY $${fp(sig.e)}</div></div><div class="sg t" style="left:${lx}px;width:${lw}px;top:${yPx(sig.tp1)}px"><div class="lb g">TP1 $${fp(sig.tp1)}</div></div><div class="sg t" style="left:${lx}px;width:${lw}px;top:${yPx(sig.tp2)}px"><div class="lb g">TP2 $${fp(sig.tp2)}</div></div><div class="sg s" style="left:${lx}px;width:${lw}px;top:${yPx(sig.sl)}px"><div class="lb r">SL $${fp(sig.sl)}</div></div>`;
}
function updSig(){const t=document.getElementById('sigTag'),i=document.getElementById('sigInfo'),u=document.getElementById('sigUpd');u.textContent=new Date().toLocaleTimeString();if(S.isBN&&S.signal){t.className='tag '+(S.signal.ty==='buy'?'b':'s');t.textContent=`${S.signal.src} ${S.signal.ty.toUpperCase()}`;i.textContent=`$${fp(S.signal.e)}`}else if(S.isBN){t.className='tag n';t.textContent='Waiting';i.textContent='Computing...'}else{t.className='tag n';t.textContent='TV Mode';i.textContent='Use TV toolbar'}}
function fp(p){if(p>=1000)return p.toLocaleString(undefined,{minFractionDigits:2,maxFractionDigits:2});if(p>=1)return p.toFixed(4);if(p>=0.01)return p.toFixed(6);return p.toFixed(8)}

function ti(n){if(n==='v')S.vOn=!S.vOn;else S.sOn=!S.sOn;const el=document.getElementById(n==='v'?'vb':'sab');el.className='ib '+(n==='v'?(S.vOn?'on':'off'):(S.sOn?'on':'off'));el.textContent=n==='v'?'Veltrix':'Spatrev';document.getElementById('so').innerHTML='';cw();if(S.isBN)setTimeout(computeSignal,3000)}
function os(){['vf','vs','ef','es','sLen','rr1','rr2'].forEach(id=>document.getElementById(id).value=S[id]);document.getElementById('sm').classList.add('show')}
function cs(){document.getElementById('sm').classList.remove('show')}
function ss(){S.vF=+vf.value||9;S.vS=+vs.value||21;S.sF=+ef.value||20;S.sS=+es.value||50;S.swingLen=+sLen.value||10;S.rr1=+rr1.value||1;S.rr2=+rr2.value||2;cs();document.getElementById('so').innerHTML='';cw();if(S.isBN)setTimeout(computeSignal,3000)}
document.getElementById('sm').addEventListener('click',e=>{if(e.target===document.getElementById('sm'))cs()});
function ust(){document.getElementById('stm').textContent=new Date().toLocaleDateString()+' '+new Date().toLocaleTimeString()}

cw();setInterval(computeSignal,60000);setInterval(ust,30000);
</script>
