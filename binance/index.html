<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Veltrix AI — Live Charts</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{width:100%;height:100%;overflow:hidden;background:#0b0e11;color:#eaecef;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;font-size:14px}
  :root{--go:#f0b90b;--s1:#1e2329;--s2:#2b3139;--b:#2b3139;--t2:#848e9c}
  
  .hdr{display:flex;align-items:center;padding:0 12px;height:40px;background:#161b22;border-bottom:1px solid #30363d}
  .hdr .l{font-weight:700;font-size:13px;display:flex;align-items:center;gap:4px;color:#eaecef}
  .hdr .l span{color:var(--go)}
  .hdr .l small{font-size:10px;color:var(--t2);font-weight:400}
  .hdr .n{margin-left:auto;display:flex;gap:12px}
  .hdr .n a{color:var(--t2);text-decoration:none;font-size:11px}
  .hdr .n a:hover{color:#eaecef}
  .hdr .n a.act{color:var(--go)}
  
  .bar{display:flex;align-items:center;gap:4px;padding:4px 8px;background:var(--s1);border-bottom:1px solid var(--b);flex-wrap:wrap;min-height:34px}
  
  .ib{padding:3px 10px;font-size:11px;background:var(--s2);border:1px solid var(--b);border-radius:4px;color:var(--t2);cursor:pointer;font-weight:500;white-space:nowrap}
  .ib:hover{border-color:var(--t2)}
  .ib.on{background:#1a2332;border-color:var(--go);color:var(--go)}
  
  .sep{width:1px;height:16px;background:var(--b);margin:0 4px;flex-shrink:0}
  
  .tb{padding:3px 8px;font-size:10px;background:transparent;border:1px solid transparent;border-radius:4px;color:var(--t2);cursor:pointer;font-weight:500;white-space:nowrap}
  .tb:hover{color:#eaecef;background:var(--s2)}
  .tb.act{background:var(--go);color:#0b0e11}
  
  .hint{font-size:9px;color:var(--t2);margin-left:auto;white-space:nowrap;opacity:0.6}
  @media(max-width:600px){.hint{display:none}}
  
  .w{flex:1;position:relative;min-height:0}
  #tv{position:absolute;inset:0;width:100%;height:100%}
  
  .ld{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:#131722;z-index:10;flex-direction:column;gap:8px;transition:opacity .4s}
  .ld.h{opacity:0;pointer-events:none}
  .sp{width:22px;height:22px;border:2px solid #30363d;border-top-color:var(--go);border-radius:50%;animation:s .7s linear infinite}
  @keyframes s{to{transform:rotate(360deg)}}
  .lt{font-size:11px;color:var(--t2)}
  
  .app{display:flex;flex-direction:column;height:100vh;width:100vw}
</style>
</head>
<body>
<div class="app">

  <div class="hdr">
    <div class="l"><span>◆</span> Veltrix AI <small>/ Charts</small></div>
    <div class="n">
      <a href="/">Home</a>
      <a href="/vip/">VIP</a>
      <a href="/binance/" class="act">Charts</a>
    </div>
  </div>

  <div class="bar">
    <button class="ib on" id="iv" onclick="tog(0)">Veltrix AI</button>
    <button class="ib" id="is" onclick="tog(1)">Spatrev AI</button>
    <span class="sep"></span>
    <button class="tb act" id="tf_15" onclick="chTF('15',this)">15m</button>
    <button class="tb" id="tf_60" onclick="chTF('60',this)">1h</button>
    <button class="tb" id="tf_240" onclick="chTF('240',this)">4h</button>
    <button class="tb" id="tf_1D" onclick="chTF('1D',this)">1D</button>
    <span class="hint">Use TV toolbar for: indicators · drawings · more timeframes</span>
  </div>

  <div class="w">
    <div class="ld" id="ld">
      <div class="sp"></div>
      <div class="lt">Loading TradingView chart...</div>
    </div>
    <div id="tv"></div>
  </div>

</div>

<script src="https://s3.tradingview.com/tv.js"></script>
<script>
// =============================================
// TRADINGVIEW ADVANCED CHART
// =============================================
let widget = null;
let currentTF = '15';
let studyIds = [];
let chartReady = false;

function initTV() {
  if (typeof TradingView === 'undefined') {
    setTimeout(initTV, 400);
    return;
  }
  
  widget = new TradingView.widget({
    container_id: 'tv',
    symbol: 'BINANCE:BTCUSDT',
    interval: currentTF,
    theme: 'dark',
    style: '1',
    locale: 'en',
    toolbar_bg: '#0b0e11',
    enable_publishing: false,
    allow_symbol_change: true,
    hide_top_toolbar: false,
    hide_legend: false,
    save_image: false,
    autosize: true,
    studies: [],
    time_frames: [
      { text: '1m', resolution: '1' },
      { text: '3m', resolution: '3' },
      { text: '5m', resolution: '5' },
      { text: '15m', resolution: '15' },
      { text: '30m', resolution: '30' },
      { text: '1h', resolution: '60' },
      { text: '2h', resolution: '120' },
      { text: '4h', resolution: '240' },
      { text: '1D', resolution: '1D' },
      { text: '1W', resolution: '1W' },
    ],
    disabled_features: [],
    enabled_features: [
      'show_hide_button_on_legend',
      'move_logo_to_main_pane',
      'study_templates',
      'use_localstorage_for_settings',
    ],
    overrides: {
      'paneProperties.background': '#131722',
      'paneProperties.vertGridProperties.color': '#1e222d',
      'paneProperties.horzGridProperties.color': '#1e222d',
      'scalesProperties.textColor': '#848e9c',
    },
    loading_screen: { backgroundColor: '#131722' },
  });

  // Fallback: still hide loading
  setTimeout(hideLoad, 5000);
}

// Poll for chart readiness
function waitForChart() {
  if (!widget) { setTimeout(waitForChart, 500); return; }
  try {
    const c = widget.chart();
    if (c && typeof c.setResolution === 'function') {
      chartReady = true;
      onChartReady();
      return;
    }
  } catch(e) {}
  setTimeout(waitForChart, 500);
}

function hideLoad() {
  document.getElementById('ld').classList.add('h');
}

function onChartReady() {
  chartReady = true;
  // Add default studies
  addStudies();
}

// =============================================
// TIMEFRAMES (use TradingView's built-in system)
// =============================================
function chTF(tf, btn) {
  currentTF = tf;
  
  // Update button states
  document.querySelectorAll('.tb').forEach(b => b.classList.remove('act'));
  if (btn) btn.classList.add('act');
  
  // Change chart resolution
  if (widget && chartReady) {
    try { widget.chart().setResolution(tf); } catch(e) { console.log(e); }
  } else if (widget) {
    // Chart not ready yet, will apply when ready
    try { widget.setSymbol('BINANCE:BTCUSDT', tf); } catch(e) { console.log(e); }
  }
}

// =============================================
// CUSTOM INDICATORS
// =============================================
function addStudies() {
  studyIds.forEach(id => {
    try { widget.chart().removeEntity(id); } catch(e) {}
  });
  studyIds = [];
  
  if (!chartReady) return;
  
  const v = document.getElementById('iv').classList.contains('on');
  const s = document.getElementById('is').classList.contains('on');
  
  try {
    if (v) {
      const s1 = widget.chart().createStudy('Moving Average', false, false, [9, 'close', 0, '#2962FF']);
      const s2 = widget.chart().createStudy('Moving Average', false, false, [21, 'close', 0, '#FF6D00']);
      studyIds.push(s1.id, s2.id);
    }
    if (s) {
      const s3 = widget.chart().createStudy('Moving Average Exponential', false, false, [20, 'close', 0, '#0ECB81']);
      const s4 = widget.chart().createStudy('Moving Average Exponential', false, false, [50, 'close', 0, '#F6465D']);
      studyIds.push(s3.id, s4.id);
    }
  } catch(e) {
    console.log('Study error:', e);
  }
}

function tog(idx) {
  const btn = idx === 0 ? document.getElementById('iv') : document.getElementById('is');
  btn.classList.toggle('on');
  
  if (chartReady) {
    addStudies();
  }
}

// =============================================
// RESIZE
// =============================================
let rt;
window.addEventListener('resize', () => {
  clearTimeout(rt);
  rt = setTimeout(() => { if (widget) try { widget.resize(); } catch(e) {} }, 200);
});

// =============================================
// START
// =============================================
initTV();
setTimeout(waitForChart, 1000);
</script>
</body>
</html>
