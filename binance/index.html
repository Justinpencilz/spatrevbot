<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Veltrix AI — Live Charts</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{width:100%;height:100%;overflow:hidden;background:#0b0e11;color:#eaecef;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;font-size:14px}
  :root{--bg:#0b0e11;--s1:#1e2329;--s2:#2b3139;--b:#2b3139;--t:#eaecef;--t2:#848e9c;--g:#0ecb81;--r:#f6465d;--go:#f0b90b}
  
  /* HEADER */
  .h{display:flex;align-items:center;padding:0 12px;height:40px;background:#161b22;border-bottom:1px solid #30363d}
  .h .l{font-size:13px;font-weight:700;color:var(--t);display:flex;align-items:center;gap:4px}
  .h .l span{color:var(--go)}
  .h .l s{font-size:10px;color:var(--t2);font-weight:400}
  .h .n{margin-left:auto;display:flex;gap:12px}
  .h .n a{color:var(--t2);text-decoration:none;font-size:11px}
  .h .n a:hover{color:var(--t)}
  .h .n a.act{color:var(--go)}
  
  /* CONTROLS */
  .c{display:flex;align-items:center;gap:4px;padding:4px 8px;background:var(--s1);border-bottom:1px solid var(--b);flex-wrap:wrap;min-height:34px}
  
  /* Pair Dropdown */
  .pd{position:relative}
  .pd .pb{display:flex;align-items:center;gap:6px;padding:4px 10px;background:var(--s2);border:1px solid var(--b);border-radius:5px;color:var(--t);cursor:pointer;font-size:12px;font-weight:600;white-space:nowrap}
  .pd .pb:hover{border-color:var(--go)}
  .pd .pb .ar{font-size:8px;color:var(--t2)}
  .pd .dd{display:none;position:absolute;top:100%;left:0;z-index:100;width:240px;max-height:360px;background:var(--s1);border:1px solid var(--b);border-radius:6px;margin-top:3px;overflow:hidden;box-shadow:0 8px 24px rgba(0,0,0,.5)}
  .pd .dd.o{display:block}
  .pd .dd input{width:100%;padding:6px 10px;background:var(--s2);border:none;border-bottom:1px solid var(--b);color:var(--t);font-size:12px;outline:none}
  .pd .dd .dl{overflow-y:auto;max-height:300px}
  .pd .dd .dl .o{padding:5px 10px;cursor:pointer;font-size:11px;display:flex;justify-content:space-between;transition:background .12s}
  .pd .dd .dl .o:hover{background:var(--s2)}
  .pd .dd .dl .o.act{background:#1a2332;color:var(--go)}
  .pd .dd .dl .o .pr{font-family:monospace;font-size:10px;color:var(--t2)}

  .ib{padding:2px 6px;font-size:10px;background:var(--s2);border:1px solid var(--b);border-radius:3px;color:var(--t2);cursor:pointer}
  .ib:hover{border-color:var(--t2)}
  .ib.on{background:#1a2332;border-color:var(--go);color:var(--go)}
  
  .tb{padding:2px 6px;font-size:10px;background:transparent;border:1px solid transparent;border-radius:3px;color:var(--t2);cursor:pointer}
  .tb:hover{color:var(--t);background:var(--s2)}
  .tb.act{background:var(--go);color:#0b0e11}
  
  .pp{margin-left:auto;font-size:11px;font-family:monospace;color:var(--t2)}
  
  /* CHART */
  .w{flex:1;position:relative;min-height:0}
  #chart{position:absolute;inset:0;width:100%;height:100%}
  
  /* LOADING */
  .ld{position:absolute;inset:0;display:none;align-items:center;justify-content:center;background:#131722;z-index:10;flex-direction:column;gap:6px}
  .ld.s{display:flex}
  .sp{width:20px;height:20px;border:2px solid #30363d;border-top-color:var(--go);border-radius:50%;animation:ss .7s linear infinite}
  @keyframes ss{to{transform:rotate(360deg)}}
  .lt{font-size:11px;color:var(--t2)}
  
  .app{display:flex;flex-direction:column;height:100vh;width:100vw}
  
  ::-webkit-scrollbar{width:4px}
  ::-webkit-scrollbar-track{background:transparent}
  ::-webkit-scrollbar-thumb{background:var(--b);border-radius:2px}
</style>
</head>
<body>
<div class="app">

  <div class="h">
    <div class="l"><span>◆</span> Veltrix AI <s>/ Binance</s></div>
    <div class="n">
      <a href="/">Home</a>
      <a href="/vip/">VIP</a>
      <a href="/binance/" class="act">Charts</a>
    </div>
  </div>

  <div class="c">
    <!-- Pair Dropdown -->
    <div class="pd" id="pd">
      <button class="pb" onclick="dd()"><span id="ps">BTC/USDT</span><span class="ar">▼</span></button>
      <div class="dd" id="dd">
        <input type="text" id="ds" placeholder="Search pair..." oninput="fd()">
        <div class="dl" id="dl"></div>
      </div>
    </div>

    <button class="ib on" id="iv" onclick="tg(0)"><span style="display:inline-block;width:4px;height:4px;border-radius:50%;background:var(--go);margin-right:2px;vertical-align:middle"></span>Veltrix</button>
    <button class="ib" id="is" onclick="tg(1)"><span style="display:inline-block;width:4px;height:4px;border-radius:50%;background:var(--t2);margin-right:2px;vertical-align:middle"></span>Spatrev</button>
    
    <div style="width:1px;height:14px;background:var(--b);margin:0 2px"></div>
    
    <button class="tb" onclick="tf('1')">1m</button>
    <button class="tb" onclick="tf('3')">3m</button>
    <button class="tb act" onclick="tf('15')">15m</button>
    <button class="tb" onclick="tf('60')">1h</button>
    <button class="tb" onclick="tf('240')">4h</button>
    <button class="tb" onclick="tf('1D')">1D</button>

    <span class="pp" id="pp">—</span>
  </div>

  <div class="w">
    <div class="ld s" id="ld"><div class="sp"></div><div class="lt" id="lt">Starting...</div></div>
    <div id="chart"></div>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/lightweight-charts@4.1.7/dist/lightweight-charts.standalone.production.js"></script>
<script>
// =============================================
// CONFIG
// =============================================
const PAIRS = [
  'BTCUSDT','ETHUSDT','BNBUSDT','SOLUSDT','XRPUSDT','DOGEUSDT',
  'ADAUSDT','AVAXUSDT','DOTUSDT','LINKUSDT','MATICUSDT','UNIUSDT',
  'LTCUSDT','BCHUSDT','XLMUSDT','NEARUSDT','APTUSDT','SUIUSDT',
  'PEPEUSDT','INJUSDT','FETUSDT','HBARUSDT','TONUSDT','ONDOUSDT',
  'WLDUSDT','TRXUSDT','ZECUSDT','EGLDUSDT','STXUSDT','FILUSDT',
  'ATOMUSDT','ETCUSDT','SHIBUSDT','ALGOUSDT','AAVEUSDT','SANDUSDT'
];

const TFS = {
  '1m':'1m','3m':'3m','5m':'5m','15m':'15m','1h':'1h','4h':'4h','1D':'1d'
};

// =============================================
// STATE
// =============================================
const S = {
  sym: 'BTCUSDT',
  tf: '15m',
  ch: null,
  cs: null,
  data: [],
  sl: [],
  ws: null,
  prices: {},
  volSeries: null
};

// =============================================
// CHART
// =============================================
function initChart() {
  const box = document.getElementById('chart');
  box.style.width = box.parentElement.clientWidth + 'px';
  box.style.height = box.parentElement.clientHeight + 'px';
  
  const ch = LightweightCharts.createChart(box, {
    width: box.clientWidth,
    height: box.clientHeight,
    layout: {
      background: { type: 'solid', color: '#131722' },
      textColor: '#848e9c',
    },
    grid: {
      vertLines: { color: '#1e222d' },
      horzLines: { color: '#1e222d' },
    },
    crosshair: { mode: LightweightCharts.CrosshairMode.Normal },
    rightPriceScale: { borderColor: '#2b3139' },
    timeScale: { borderColor: '#2b3139', timeVisible: true, secondsVisible: false },
    handleScroll: { vertTouchDrag: true },
    handleScale: { axisPressedMouse: { time: true, price: true } },
  });
  
  S.cs = ch.addCandlestickSeries({
    upColor: '#0ecb81',
    downColor: '#f6465d',
    borderDownColor: '#f6465d',
    borderUpColor: '#0ecb81',
    wickDownColor: '#f6465d',
    wickUpColor: '#0ecb81',
    priceFormat: { type: 'price', minMove: 0.01 },
  });
  
  S.volSeries = ch.addHistogramSeries({
    color: '#26a69a',
    priceFormat: { type: 'volume' },
    priceScaleId: 'volume',
    scaleMargins: { top: 0.85, bottom: 0 },
  });
  
  S.ch = ch;
  
  window.addEventListener('resize', () => {
    const w = box.parentElement.clientWidth;
    const h = box.parentElement.clientHeight;
    box.style.width = w + 'px';
    box.style.height = h + 'px';
    ch.applyOptions({ width: w, height: h });
  });
}

// =============================================
// DATA
// =============================================
async function loadData() {
  const ld = document.getElementById('ld');
  const lt = document.getElementById('lt');
  ld.classList.add('s');
  
  const sym = S.sym;
  const tf = TFS[S.tf];
  if (!tf) return;
  
  try {
    lt.textContent = `Fetching ${sym.replace('USDT','')}/USDT ${S.tf}...`;
    
    const url = `https://api.binance.com/api/v3/klines?symbol=${sym}&interval=${tf}&limit=300`;
    const res = await fetch(url);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const raw = await res.json();
    
    const data = raw.map(k => ({
      time: Math.floor(k[0] / 1000),
      open: parseFloat(k[1]),
      high: parseFloat(k[2]),
      low: parseFloat(k[3]),
      close: parseFloat(k[4]),
      volume: parseFloat(k[5])
    }));
    
    S.data = data;
    
    if (!S.ch) initChart();
    
    S.cs.setData(data);
    
    // Volume bars
    S.volSeries.setData(data.map(d => ({
      time: d.time,
      value: d.volume,
      color: d.close >= d.open ? '#0ecb8140' : '#f6465d40'
    })));
    
    S.ch.timeScale().fitContent();
    
    // Force fit again after render
    requestAnimationFrame(() => {
      S.ch.timeScale().fitContent();
    });
    setTimeout(() => S.ch.timeScale().fitContent(), 300);
    
    lt.textContent = `✓ ${data.length} bars loaded`;
    
    recalc();
    connectWS();
    
    // Hide loading after a moment
    setTimeout(() => ld.classList.remove('s'), 500);
    
  } catch(e) {
    lt.textContent = '⚠ ' + e.message + ' - retry...';
    console.error(e);
    setTimeout(loadData, 3000);
  }
}

// =============================================
// WEBSOCKET
// =============================================
function connectWS() {
  if (S.ws) { try { S.ws.close(); } catch(e) {} S.ws = null; }
  
  const wsMap = { '1m':'1m','3m':'3m','5m':'5m','15m':'15m','1h':'60m','4h':'240m','1D':'1d' };
  const iv = wsMap[S.tf] || '15m';
  
  try {
    const ws = new WebSocket(`wss://stream.binance.com:9443/ws/${S.sym.toLowerCase()}@kline_${iv}`);
    
    ws.onmessage = e => {
      const k = JSON.parse(e.data).k;
      const c = {
        time: Math.floor(k.t / 1000),
        open: parseFloat(k.o),
        high: parseFloat(k.h),
        low: parseFloat(k.l),
        close: parseFloat(k.c),
        volume: parseFloat(k.v)
      };
      S.cs.update(c);
      S.volSeries.update({
        time: c.time,
        value: c.volume,
        color: c.close >= c.open ? '#0ecb8140' : '#f6465d40'
      });
      updatePrice(c.close);
    };
    
    ws.onclose = () => { setTimeout(connectWS, 5000); };
    S.ws = ws;
  } catch(e) {}
}

function updatePrice(p) {
  const fmt = p >= 1000 ? '$' + p.toLocaleString(undefined, {minimumFractionDigits:2,maximumFractionDigits:2})
    : p >= 1 ? '$' + p.toFixed(4) : '$' + p.toFixed(6);
  document.getElementById('pp').textContent = fmt;
}

// =============================================
// PAIR DROPDOWN
// =============================================
function renderDL(filter) {
  const dl = document.getElementById('dl');
  let items = PAIRS;
  if (filter) {
    const f = filter.toLowerCase();
    items = items.filter(p => p.toLowerCase().includes(f));
  }
  
  dl.innerHTML = items.map(p => {
    const act = p === S.sym ? 'act' : '';
    const pr = S.prices[p];
    const ps = pr ? (pr >= 1000 ? '$' + pr.toFixed(2) : pr >= 1 ? '$' + pr.toFixed(4) : '$' + pr.toFixed(6)) : '';
    return `<div class="o ${act}" data-s="${p}" onclick="sp('${p}')">
      <span>${p.replace('USDT','')}/USDT</span>
      <span class="pr">${ps}</span>
    </div>`;
  }).join('');
}

function dd() {
  const el = document.getElementById('dd');
  el.classList.toggle('o');
  if (el.classList.contains('o')) {
    document.getElementById('ds').value = '';
    renderDL();
    document.getElementById('ds').focus();
  }
}

function fd() { renderDL(document.getElementById('ds').value); }

document.addEventListener('click', e => {
  if (!document.getElementById('pd').contains(e.target)) {
    document.getElementById('dd').classList.remove('o');
  }
});

function sp(sym) {
  S.sym = sym;
  document.getElementById('ps').textContent = sym.replace('USDT','/USDT');
  document.getElementById('dd').classList.remove('o');
  document.getElementById('pp').textContent = '—';
  
  if (S.ws) { try { S.ws.close(); } catch(e) {} S.ws = null; }
  document.getElementById('ld').classList.add('s');
  document.getElementById('lt').textContent = 'Loading ' + sym.replace('USDT','') + '...';
  
  loadData();
}

// =============================================
// TIMEFRAMES
// =============================================
function tf(t) {
  S.tf = t;
  document.querySelectorAll('.tb').forEach(b => b.classList.remove('act'));
  event.target.classList.add('act');
  if (S.ws) { try { S.ws.close(); } catch(e) {} S.ws = null; }
  document.getElementById('ld').classList.add('s');
  document.getElementById('lt').textContent = 'Loading ' + t + '...';
  loadData();
}

// =============================================
// INDICATORS
// =============================================
function calcSMA(data, n) {
  const r = [];
  for (let i = 0; i < data.length; i++) {
    if (i < n - 1) { r.push({ time: data[i].time, value: null }); continue; }
    let s = 0; for (let j = i - n + 1; j <= i; j++) s += data[j].close;
    r.push({ time: data[i].time, value: s / n });
  }
  return r.filter(v => v.value !== null);
}

function calcEMA(data, n) {
  const k = 2 / (n + 1); let ema = data[0].close;
  return data.map((d, i) => {
    ema = i === 0 ? d.close : (d.close - ema) * k + ema;
    return { time: d.time, value: ema };
  });
}

const SD = [
  { lines: [{ n: 9, c: '#2962FF' }, { n: 21, c: '#FF6D00' }] },  // Veltrix (SMA)
  { lines: [{ n: 20, c: '#0ecb81' }, { n: 50, c: '#f6465d' }] }   // Spatrev (EMA)
];

function recalc() {
  S.sl.forEach(l => { try { S.ch.removeSeries(l); } catch(e) {} });
  S.sl = [];
  
  const d = S.data;
  if (d.length < 5) return;
  
  const b0 = document.getElementById('iv').classList.contains('on');
  const b1 = document.getElementById('is').classList.contains('on');
  const states = [b0, b1];
  
  SD.forEach((def, idx) => {
    if (!states[idx]) return;
    def.lines.forEach(ld => {
      const vals = idx === 1 ? calcEMA(d, ld.n) : calcSMA(d, ld.n);
      const line = S.ch.addLineSeries({
        color: ld.c,
        lineWidth: 1.5,
        lastValueVisible: true,
        priceLineVisible: false,
      });
      line.setData(vals);
      S.sl.push(line);
    });
  });
}

function tg(idx) {
  const btn = idx === 0 ? document.getElementById('iv') : document.getElementById('is');
  btn.classList.toggle('on');
  recalc();
}

// =============================================
// PRICE TICKER
// =============================================
async function fetchPrices() {
  try {
    const res = await fetch('https://api.binance.com/api/v3/ticker/price');
    if (!res.ok) return;
    const data = await res.json();
    data.forEach(d => { S.prices[d.symbol] = parseFloat(d.price) });
    
    // Update price display for current pair
    const cp = S.prices[S.sym];
    if (cp) updatePrice(cp);
    
    // Update dropdown prices if open
    if (document.getElementById('dd').classList.contains('o')) {
      renderDL(document.getElementById('ds').value);
    }
  } catch(e) {}
}

// =============================================
// INIT
// =============================================
fetchPrices();
setInterval(fetchPrices, 10000);
loadData();
</script>
</body>
</html>
