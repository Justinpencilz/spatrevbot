<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Veltrix AI — Live Charts</title>
<link rel="preconnect" href="https://api.binance.com">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{width:100%;height:100%;overflow:hidden;background:#0b0e11;color:#eaecef;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif}
  
  .hdr{display:flex;align-items:center;padding:0 12px;height:40px;background:#161b22;border-bottom:1px solid #30363d}
  .hdr .l{font-weight:700;font-size:13px;color:#eaecef;display:flex;align-items:center;gap:4px}
  .hdr .l span{color:#f0b90b}
  .hdr .l small{font-size:10px;color:#848e9c;font-weight:400}
  .hdr .nav{margin-left:auto;display:flex;gap:12px}
  .hdr .nav a{color:#848e9c;text-decoration:none;font-size:11px}
  .hdr .nav a:hover{color:#eaecef}
  .hdr .nav a.act{color:#f0b90b}
  
  .bar{display:flex;align-items:center;gap:4px;padding:4px 8px;background:#1e2329;border-bottom:1px solid #2b3139;flex-wrap:wrap;min-height:32px}
  .ib{padding:2px 6px;font-size:10px;background:#2b3139;border:1px solid #2b3139;border-radius:3px;color:#848e9c;cursor:pointer}
  .ib:hover{border-color:#848e9c}
  .ib.on{background:#1a2332;border-color:#f0b90b;color:#f0b90b}
  .sep{width:1px;height:12px;background:#2b3139;margin:0 3px}
  .tb{padding:2px 6px;font-size:10px;background:transparent;border:1px solid transparent;border-radius:3px;color:#848e9c;cursor:pointer}
  .tb:hover{color:#eaecef;background:#2b3139}
  .tb.act{background:#f0b90b;color:#0b0e11}
  .pl{font-size:11px;color:#f0b90b;font-weight:500}
  .pp{font-size:11px;font-family:monospace;color:#848e9c;margin-left:auto}
  
  .cw{flex:1;position:relative;min-height:0}
  #chart{width:100%;height:100%}
  
  .ld{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:#131722;z-index:10;flex-direction:column;gap:8px;transition:opacity 0.4s;pointer-events:none}
  .ld.v{pointer-events:auto}
  .sp{width:22px;height:22px;border:2px solid #30363d;border-top-color:#f0b90b;border-radius:50%;animation:ss 0.7s linear infinite}
  @keyframes ss{to{transform:rotate(360deg)}}
  .lt{font-size:11px;color:#848e9c}
  
  .app{display:flex;flex-direction:column;height:100vh;width:100vw}
  
  ::-webkit-scrollbar{width:4px}
  ::-webkit-scrollbar-track{background:transparent}
  ::-webkit-scrollbar-thumb{background:#2b3139;border-radius:2px}
</style>
</head>
<body>
<div class="app">

  <div class="hdr">
    <div class="l"><span>◆</span> Veltrix AI <small>/ Binance Charts</small></div>
    <div class="nav">
      <a href="/">Home</a>
      <a href="/vip/">VIP</a>
      <a href="/binance/" class="act">Charts</a>
    </div>
  </div>

  <div class="bar">
    <button class="ib on" onclick="this.classList.toggle('on'); toggleStudy(0)"><span style="display:inline-block;width:4px;height:4px;border-radius:50%;background:#f0b90b;margin-right:2px;vertical-align:middle"></span>Veltrix AI</button>
    <button class="ib" onclick="this.classList.toggle('on'); toggleStudy(1)"><span style="display:inline-block;width:4px;height:4px;border-radius:50%;background:#848e9c;margin-right:2px;vertical-align:middle"></span>Spatrev AI</button>
    <span class="sep"></span>
    <button class="tb" onclick="setSymbol('BINANCE')" style="color:#f0b90b;font-weight:600" id="symBtn">BTC/USDT</button>
    <span class="sep"></span>
    <button class="tb" onclick="setTF('1')">1m</button>
    <button class="tb" onclick="setTF('3')">3m</button>
    <button class="tb act" onclick="setTF('15')">15m</button>
    <button class="tb" onclick="setTF('60')">1h</button>
    <button class="tb" onclick="setTF('240')">4h</button>
    <button class="tb" onclick="setTF('1D')">1D</button>
    <span class="pp" id="priceLabel">—</span>
  </div>

  <div class="cw">
    <div class="ld v" id="loading"><div class="sp"></div><div class="lt" id="loadText">Connecting to Binance...</div></div>
    <div id="chart"></div>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/lightweight-charts@4.1.7/dist/lightweight-charts.standalone.production.js"></script>
<script>
// =============================================
// BINANCE LIVE CANDLESTICK CHART
// =============================================
const state = {
  symbol: 'BTCUSDT',
  interval: '15m',
  apiInterval: '15m',
  wsInterval: '15m',
  chart: null,
  candleSeries: null,
  studies: [],
  studyLines: [],
  currentData: [],
  ws: null
};

// Map between display names and API names
const TF_MAP = {
  '1m':  { api: '1m', ws: '1m' },
  '3m':  { api: '3m', ws: '3m' },
  '5m':  { api: '5m', ws: '5m' },
  '15m': { api: '15m', ws: '15m' },
  '1h':  { api: '1h', ws: '60m' },
  '4h':  { api: '4h', ws: '240m' },
  '1D':  { api: '1d', ws: '1d' },
};

// =============================================
// FETCH KLINES FROM BINANCE
// =============================================
async function fetchKlines(symbol, interval, limit = 200) {
  const url = `https://api.binance.com/api/v3/klines?symbol=${symbol}&interval=${interval}&limit=${limit}`;
  const res = await fetch(url);
  if (!res.ok) throw new Error('Binance API error: ' + res.status);
  const data = await res.json();
  return data.map(k => ({
    time: Math.floor(k[0] / 1000),
    open: parseFloat(k[1]),
    high: parseFloat(k[2]),
    low: parseFloat(k[3]),
    close: parseFloat(k[4]),
    volume: parseFloat(k[5])
  }));
}

// =============================================
// CHART SETUP
// =============================================
function initChart() {
  const container = document.getElementById('chart');
  container.innerHTML = '';
  
  const chart = LightweightCharts.createChart(container, {
    layout: {
      background: { type: 'solid', color: '#131722' },
      textColor: '#848e9c',
    },
    grid: {
      vertLines: { color: '#1e222d' },
      horzLines: { color: '#1e222d' },
    },
    crosshair: {
      mode: LightweightCharts.CrosshairMode.Normal,
    },
    rightPriceScale: {
      borderColor: '#2b3139',
    },
    timeScale: {
      borderColor: '#2b3139',
      timeVisible: true,
      secondsVisible: false,
    },
    watermark: {
      visible: false,
    },
  });
  
  const candleSeries = chart.addCandlestickSeries({
    upColor: '#0ecb81',
    downColor: '#f6465d',
    borderDownColor: '#f6465d',
    borderUpColor: '#0ecb81',
    wickDownColor: '#f6465d',
    wickUpColor: '#0ecb81',
  });
  
  state.chart = chart;
  state.candleSeries = candleSeries;
  
  // Handle resize
  const observer = new ResizeObserver(() => {
    chart.applyOptions({ width: container.clientWidth, height: container.clientHeight });
  });
  observer.observe(container);
  
  return chart;
}

// =============================================
// LOAD DATA
// =============================================
async function loadData() {
  const loadText = document.getElementById('loadText');
  const loading = document.getElementById('loading');
  
  if (!state.chart) initChart();
  
  const tf = TF_MAP[state.interval];
  if (!tf) return;
  
  try {
    loadText.textContent = 'Fetching ' + state.symbol.replace('USDT','') + '/USDT data...';
    loading.classList.add('v');
    
    const data = await fetchKlines(state.symbol, tf.api);
    state.currentData = data;
    
    state.candleSeries.setData(data);
    state.chart.timeScale().fitContent();
    
    // Auto-fit after a moment
    setTimeout(() => state.chart.timeScale().fitContent(), 100);
    
    loadText.textContent = 'Candles loaded: ' + data.length + ' bars ✓';
    setTimeout(() => loading.classList.remove('v'), 800);
    
    // Connect WebSocket for live updates
    connectWS();
    
    // Recalculate studies
    recalcStudies();
    
  } catch (e) {
    loadText.textContent = 'Error: ' + e.message + '. Retrying...';
    console.error(e);
    setTimeout(loadData, 3000);
  }
}

// =============================================
// WEBSOCKET - LIVE UPDATES
// =============================================
function connectWS() {
  if (state.ws) {
    try { state.ws.close(); } catch(e) {}
    state.ws = null;
  }
  
  const tf = TF_MAP[state.interval];
  if (!tf) return;
  
  const wsUrl = `wss://stream.binance.com:9443/ws/${state.symbol.toLowerCase()}@kline_${tf.ws}`;
  state.ws = new WebSocket(wsUrl);
  
  state.ws.onmessage = function(event) {
    const msg = JSON.parse(event.data);
    const k = msg.k;
    
    const candle = {
      time: Math.floor(k.t / 1000),
      open: parseFloat(k.o),
      high: parseFloat(k.h),
      low: parseFloat(k.l),
      close: parseFloat(k.c),
      volume: parseFloat(k.v)
    };
    
    state.candleSeries.update(candle);
    state.currentData.push(candle);
    
    // Update price display
    const p = parseFloat(k.c);
    const fmt = p >= 1000 ? '$' + p.toLocaleString(undefined, {maximumFractionDigits:2}) : p.toFixed(4);
    document.getElementById('priceLabel').textContent = '$' + (p >= 1000 ? p.toLocaleString(undefined, {maximumFractionDigits:2}) : p.toFixed(4));
  };
  
  state.ws.onerror = function(e) {
    console.log('WS error, will reconnect');
  };
  
  state.ws.onclose = function() {
    // Reconnect after 5s
    setTimeout(connectWS, 5000);
  };
}

// =============================================
// INDICATORS / STUDIES
// =============================================
function calcSMA(data, period) {
  const result = [];
  for (let i = 0; i < data.length; i++) {
    if (i < period - 1) {
      result.push({ time: data[i].time, value: null });
      continue;
    }
    let sum = 0;
    for (let j = i - period + 1; j <= i; j++) sum += data[j].close;
    result.push({ time: data[i].time, value: sum / period });
  }
  return result;
}

function calcEMA(data, period) {
  const result = [];
  const k = 2 / (period + 1);
  let ema = data[0].close;
  for (let i = 0; i < data.length; i++) {
    ema = i === 0 ? data[i].close : (data[i].close - ema) * k + ema;
    result.push({ time: data[i].time, value: ema });
  }
  return result;
}

const studyDefs = [
  { // Veltrix AI: SMA9 + SMA21
    lines: [
      { period: 9, color: '#2962FF', title: 'SMA 9' },
      { period: 21, color: '#FF6D00', title: 'SMA 21' },
    ]
  },
  { // Spatrev AI: EMA20 + EMA50
    lines: [
      { period: 20, color: '#0ecb81', title: 'EMA 20' },
      { period: 50, color: '#f6465d', title: 'EMA 50' },
    ]
  }
];

function recalcStudies() {
  // Remove existing study lines
  state.studyLines.forEach(line => {
    try { state.chart.removeSeries(line); } catch(e) {}
  });
  state.studyLines = [];
  
  const data = state.currentData;
  if (data.length < 10) return;
  
  // Check which studies are active
  const buttons = document.querySelectorAll('.ib');
  
  for (let si = 0; si < studyDefs.length; si++) {
    const btn = buttons[si];
    const isOn = btn && btn.classList.contains('on');
    if (!isOn) continue;
    
    const def = studyDefs[si];
    for (const lineDef of def.lines) {
      let values;
      if (si === 1) {
        // Spatrev AI uses EMA
        values = calcEMA(data, lineDef.period);
      } else {
        // Veltrix AI uses SMA
        values = calcSMA(data, lineDef.period);
      }
      
      const line = state.chart.addLineSeries({
        color: lineDef.color,
        lineWidth: 1.5,
        lastValueVisible: true,
        priceLineVisible: false,
        title: lineDef.title,
      });
      line.setData(values.filter(v => v.value !== null));
      state.studyLines.push(line);
    }
  }
}

function toggleStudy(idx) {
  setTimeout(recalcStudies, 100);
}

// =============================================
// CHANGE SYMBOL / TIMEFRAME
// =============================================
function setSymbol(sym) {
  // For now just BTCUSDT - will add pair selector later
  // This function is called from the BTC/USDT button to open a pair picker
  const pairs = [
    'BTCUSDT','ETHUSDT','BNBUSDT','SOLUSDT','XRPUSDT','DOGEUSDT',
    'ADAUSDT','AVAXUSDT','DOTUSDT','LINKUSDT','MATICUSDT','UNIUSDT',
    'LTCUSDT','BCHUSDT','XLMUSDT','NEARUSDT','APTUSDT','SUIUSDT',
    'PEPEUSDT','INJUSDT','FETUSDT','HBARUSDT','TONUSDT','ONDOUSDT'
  ];
  
  const current = state.symbol;
  const idx = pairs.indexOf(current);
  const next = pairs[(idx + 1) % pairs.length];
  
  state.symbol = next;
  document.getElementById('symBtn').textContent = next.replace('USDT','/USDT');
  document.getElementById('priceLabel').textContent = '—';
  
  // Close old WS and reload
  if (state.ws) { try { state.ws.close(); } catch(e) {} state.ws = null; }
  
  const loading = document.getElementById('loading');
  loading.classList.add('v');
  document.getElementById('loadText').textContent = 'Loading ' + next.replace('USDT','') + '/USDT...';
  
  loadData();
}

function setTF(tf) {
  state.interval = tf;
  document.querySelectorAll('.tb').forEach(b => b.classList.remove('act'));
  event.target.classList.add('act');
  
  // Reload with new timeframe
  if (state.ws) { try { state.ws.close(); } catch(e) {} state.ws = null; }
  
  const loading = document.getElementById('loading');
  loading.classList.add('v');
  document.getElementById('loadText').textContent = 'Loading ' + tf + ' data...';
  
  loadData();
}

// =============================================
// PRICE TICKER (for header toolbar)
// =============================================
async function fetchPrice() {
  try {
    const res = await fetch(`https://api.binance.com/api/v3/ticker/price?symbol=${state.symbol}`);
    if (!res.ok) throw Error();
    const d = await res.json();
    const p = parseFloat(d.price);
    const fmt = p >= 1000 ? '$' + p.toLocaleString(undefined, {maximumFractionDigits:2}) : '$' + p.toFixed(4);
    document.getElementById('priceLabel').textContent = fmt;
  } catch(e) {}
}

// =============================================
// INIT
// =============================================
document.getElementById('loadText').textContent = 'Starting chart engine...';
initChart();
loadData();
setInterval(fetchPrice, 5000);
</script>
</body>
</html>
