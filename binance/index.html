<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VELTRIX AI SCANNER 2.0</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#0b0e11;color:#eaecef;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;font-size:14px}
:root{--go:#f0b90b;--s2:#2b3139;--b:#2b3139;--t2:#848e9c;--gr:#0ecb81;--rd:#f6465d}

.main{display:flex;flex-direction:column;height:100vh}

.nav{display:flex;align-items:center;gap:4px;padding:5px 10px;background:#161b22;border-bottom:1px solid #30363d;flex-wrap:wrap;flex-shrink:0;min-height:40px}
.nav .sp{font-size:14px;font-weight:600;margin-right:6px}
.nav .sp.g{color:var(--gr)}
.nav .sp.r{color:var(--rd)}
.sp1{width:1px;height:18px;background:#2b3139;margin:0 3px;flex-shrink:0}
.tb{padding:2px 8px;font-size:10px;background:#1e2329;border:1px solid #2b3139;border-radius:3px;color:#848e9c;cursor:pointer;font-weight:500;white-space:nowrap}
.tb:hover{border-color:var(--go);color:#eaecef}
.tb.act{background:var(--go);color:#0b0e11;border-color:var(--go)}
.ib{padding:2px 8px;font-size:10px;background:#1e2329;border:1px solid #2b3139;border-radius:3px;color:#848e9c;cursor:pointer;font-weight:500}
.ib:hover{border-color:var(--go);color:#eaecef}
.ib.on{background:#1a3a2a;border-color:var(--gr);color:var(--gr)}
.ib.off{background:#3a1a2a;border-color:var(--rd);color:var(--rd)}
.sb2{padding:2px 8px;font-size:10px;background:#1e2329;border:1px solid #2b3139;border-radius:3px;color:#848e9c;cursor:pointer}

.cw{flex:1;position:relative;min-height:0}
#tv{width:100%;height:100%}

/* Signal Overlay */
.so{position:absolute;inset:0;pointer-events:none;z-index:5;overflow:hidden}
.so .sl{position:absolute;left:0;right:0}
.so .sl.e{border-top:2px solid #f0b90b;height:2px}
.so .sl.t{border-top:2px solid #0ecb81;height:2px}
.so .sl.s{border-top:2px solid #f6465d;height:2px}
.so .sl .lb{position:absolute;right:0;transform:translateY(-50%);padding:2px 7px;border-radius:3px;font-size:9px;font-weight:700;white-space:nowrap;font-family:'SF Mono','Consolas',monospace}
.so .sl .lb.g{color:#fff;background:#0ecb81}
.so .sl .lb.r{color:#fff;background:#f6465d}
.so .sl .lb.y{color:#000;background:#f0b90b}
.so .st{position:absolute;top:4px;left:4px;padding:3px 10px;border-radius:4px;font-size:10px;font-weight:700;z-index:6}
.so .st.b{background:rgba(14,203,129,.9);color:#000}
.so .st.s{background:rgba(246,69,93,.9);color:#fff}

.sig-bar{display:flex;gap:10px;padding:3px 12px;background:#131722;border-top:1px solid #2b3139;font-size:10px;align-items:center;flex-shrink:0;min-height:24px}
.sig-bar .tag{padding:1px 7px;border-radius:3px;font-weight:600}
.sig-bar .tag.b{background:#0a2a1a;color:var(--gr)}
.sig-bar .tag.s{background:#2a0a1a;color:var(--rd)}
.sig-bar .tag.n{background:#1e2329;color:#848e9c}

.st{display:flex;justify-content:space-between;padding:3px 12px;background:#0b0e11;border-top:1px solid #2b3139;font-size:10px;color:#848e9c;flex-shrink:0}
.st .dt{display:inline-block;width:6px;height:6px;border-radius:50%;margin-right:4px}
.st .dt.g{background:var(--gr)}
.st .dt.r{background:var(--rd)}

.lo{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#0b0e11;z-index:10}
.lo.h{display:none}
.sp2{width:30px;height:30px;border:3px solid #2b3139;border-top-color:var(--go);border-radius:50%;animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

.settings-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:999;align-items:center;justify-content:center}
.settings-modal.show{display:flex}
.settings-box{background:#1e2329;border:1px solid #2b3139;border-radius:10px;padding:20px;width:340px;max-width:90vw}
.settings-box h3{font-size:14px;margin-bottom:14px;color:var(--go)}
.settings-box .rw{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.settings-box .rw label{font-size:12px;color:#848e9c}
.settings-box .rw input{width:70px;padding:4px 8px;background:#2b3139;border:1px solid #30363d;border-radius:4px;color:#eaecef;font-size:12px;text-align:center}
.settings-box .rw input:focus{border-color:var(--go);outline:none}
.settings-box .ac{display:flex;gap:10px;margin-top:16px}
.settings-box .ac button{flex:1;padding:8px;border:none;border-radius:5px;font-size:12px;font-weight:600;cursor:pointer}
.settings-box .ac .sv{background:var(--go);color:#0b0e11}
.settings-box .ac .cl{background:#2b3139;color:#848e9c}

@media(max-width:768px){.nav{gap:3px;padding:4px 6px}.tb,.ib,.sb2{padding:2px 5px;font-size:9px}}
</style>
</head>
<body>

<div class="main">
  <div class="nav">
    <span style="font-size:12px;font-weight:600;color:#eaecef;margin-right:4px" id="navSymbol">BTC/USDT</span>
    <span class="sp g" id="navPrice">—</span>
    <span class="sp1"></span>
    <button class="tb" data-tf="1" onclick="stf('1')">1m</button>
    <button class="tb" data-tf="2" onclick="stf('2')">2m</button>
    <button class="tb" data-tf="3" onclick="stf('3')">3m</button>
    <button class="tb" data-tf="5" onclick="stf('5')">5m</button>
    <button class="tb act" data-tf="15" onclick="stf('15')">15m</button>
    <button class="tb" data-tf="30" onclick="stf('30')">30m</button>
    <button class="tb" data-tf="60" onclick="stf('60')">1h</button>
    <button class="tb" data-tf="240" onclick="stf('240')">4h</button>
    <button class="tb" data-tf="1D" onclick="stf('1D')">1D</button>
    <button class="tb" data-tf="1W" onclick="stf('1W')">1W</button>
    <button class="tb" data-tf="1M" onclick="stf('1M')">1M</button>
    <span class="sp1"></span>
    <button class="ib on" id="vb" onclick="ti('v')">Veltrix</button>
    <button class="ib off" id="sab" onclick="ti('s')">Spatrev</button>
    <button class="sb2" onclick="os()">⚙️</button>
  </div>

  <div class="cw">
    <div class="lo" id="lo"><div class="sp2"></div><p>Loading Chart...</p></div>
    <div id="tv"></div>
    <div class="so" id="so"></div>
  </div>

  <div class="sig-bar">
    <span style="color:#848e9c">⚡</span>
    <span class="tag n" id="sigTag">No Signal</span>
    <span style="color:#848e9c" id="sigPrice">—</span>
    <span style="margin-left:auto;color:#848e9c;font-size:9px" id="sigUpdate"></span>
  </div>

  <div class="st">
    <span><span class="dt g" id="sd"></span><span id="stxt">Connected</span></span>
    <span id="stm"></span>
  </div>
</div>

<div class="settings-modal" id="sm">
  <div class="settings-box">
    <h3>Veltrix AI</h3>
    <div class="rw"><label>Fast MA</label><input type="number" id="vf" value="9" min="1" max="200"></div>
    <div class="rw"><label>Slow MA</label><input type="number" id="vs" value="21" min="1" max="200"></div>
    <h3 style="margin-top:14px">Spatrev AI</h3>
    <div class="rw"><label>Fast EMA</label><input type="number" id="ef" value="20" min="1" max="200"></div>
    <div class="rw"><label>Slow EMA</label><input type="number" id="es" value="50" min="1" max="200"></div>
    <h3 style="margin-top:14px">Signal</h3>
    <div class="rw"><label>Swing Length</label><input type="number" id="sLen" value="10" min="2" max="50"></div>
    <div class="rw"><label>RR1</label><input type="number" id="rr1" value="1.0" min="0.1" max="10" step="0.1"></div>
    <div class="rw"><label>RR2</label><input type="number" id="rr2" value="2.0" min="0.1" max="10" step="0.1"></div>
    <div class="ac">
      <button class="sv" onclick="ss()">Save</button>
      <button class="cl" onclick="cs()">Cancel</button>
    </div>
  </div>
</div>

<script src="https://s3.tradingview.com/tv.js"></script>
<script>
const S = {
  w:null, ch:null,
  tf:'15', curSym:'BINANCE:BTCUSDT',
  vOn:true, vF:9, vS:21,
  sOn:false, sF:20, sS:50,
  swingLen:10, rr1:1.0, rr2:2.0,
  signal:null
};

// ==================== TRADINGVIEW WIDGET ====================
function cw(){
  S.ch=null;
  document.getElementById('tv').innerHTML='';
  document.getElementById('so').innerHTML='';
  const lo=document.getElementById('lo');lo.classList.remove('h');lo.style.display='flex';

  S.w=new TradingView.widget({
    container_id:'tv',
    symbol:S.curSym,
    interval:S.tf,
    timezone:'Etc/UTC',
    theme:'dark',style:'1',locale:'en',
    toolbar_bg:'#131722',
    enable_publishing:false,
    allow_symbol_change:true,
    hide_top_toolbar:false,
    hide_legend:false,
    save_image:false,
    autosize:true,
    studies:getStudies(),
    disabled_features:[],
    enabled_features:['study_templates','show_hide_button_on_legend'],
    overrides:{
      'paneProperties.background':'#131722',
      'paneProperties.vertGridProperties.color':'#1e222d',
      'paneProperties.horzGridProperties.color':'#1e222d',
      'scalesProperties.textColor':'#848e9c'
    },
    loading_screen:{backgroundColor:'#131722',foregroundColor:'#f0b90b'}
  });

  setTimeout(()=>{lo.classList.add('h');lo.style.display='none'},4000);
}

function getStudies(){
  const l=[];
  if(S.vOn){l.push({id:'MASimple@tv-basicstudies',inputs:{length:S.vF}});l.push({id:'MASimple@tv-basicstudies',inputs:{length:S.vS}})}
  if(S.sOn){l.push({id:'EMAExponential@tv-basicstudies',inputs:{length:S.sF}});l.push({id:'EMAExponential@tv-basicstudies',inputs:{length:S.sS}})}
  return l;
}

// ==================== TIMEFRAMES ====================
function stf(tf){
  S.tf=tf;
  document.querySelectorAll('.tb').forEach(b=>b.classList.toggle('act',b.dataset.tf===tf));

  // Try just changing interval without resetting symbol
  if(S.w){
    try{
      // Method 1: Use chart API setResolution
      if(S.ch && typeof S.ch.setResolution==='function'){
        S.ch.setResolution(tf);
        return;
      }
    }catch(e){}

    try{
      // Method 2: Use widget setSymbol with current symbol (preserves it)
      S.w.setSymbol(S.curSym, tf);
      return;
    }catch(e){}

    try{
      // Method 3: Recreate widget if all else fails
      cw();
    }catch(e){}
  }
}

// ==================== PAIR / SYMBOL ====================
// Track the current symbol from TradingView widget
// We poll the widget's displayed symbol periodically
function updateCurSym(){
  if(!S.w)return;
  try{
    // Try reading the symbol from a callback or event
  }catch(e){}
}

// ==================== SIGNAL ENGINE ====================
async function computeSignal(){
  // Only compute for Binance pairs
  if(!S.curSym.startsWith('BINANCE:'))return;
  
  // Extract symbol
  const pair=S.curSym.replace('BINANCE:','');
  const kl=await fetchKlines(pair);
  if(!kl||kl.length<50)return;
  
  const closes=kl.map(k=>k.c),lows=kl.map(k=>k.l),highs=kl.map(k=>k.h);
  const vFast=sma(closes,S.vF),vSlow=sma(closes,S.vS);
  const sFast=ema(closes,S.sF),sSlow=ema(closes,S.sS);
  
  S.signal=null;
  
  if(S.vOn){
    for(let i=closes.length-2;i>=Math.max(S.vF,S.vS,5);i--){
      if(!vFast[i]||!vSlow[i]||!vFast[i-1]||!vSlow[i-1])continue;
      if(vFast[i-1]<=vSlow[i-1]&&vFast[i]>vSlow[i]){
        const sl=Math.min(...lows.slice(i-S.swingLen,i));
        if(sl>0&&sl<closes[i]*0.99){const e=closes[i],risk=e-sl;S.signal={type:'buy',entry:e,sl,tp1:e+risk*S.rr1,tp2:e+risk*S.rr2,src:'Veltrix'};break}
      }
      if(vFast[i-1]>=vSlow[i-1]&&vFast[i]<vSlow[i]){
        const sl=Math.max(...highs.slice(i-S.swingLen,i));
        if(sl>0&&sl>closes[i]*1.01){const e=closes[i],risk=sl-e;S.signal={type:'sell',entry:e,sl,tp1:e-risk*S.rr1,tp2:e-risk*S.rr2,src:'Veltrix'};break}
      }
    }
  }

  if(!S.signal&&S.sOn){
    for(let i=closes.length-2;i>=Math.max(S.sF,S.sS,5);i--){
      if(!sFast[i]||!sSlow[i]||!sFast[i-1]||!sSlow[i-1])continue;
      if(sFast[i-1]<=sSlow[i-1]&&sFast[i]>sSlow[i]){
        const sl=Math.min(...lows.slice(i-S.swingLen,i));
        if(sl>0&&sl<closes[i]*0.99){const e=closes[i],risk=e-sl;S.signal={type:'buy',entry:e,sl,tp1:e+risk*S.rr1,tp2:e+risk*S.rr2,src:'Spatrev'};break}
      }
      if(sFast[i-1]>=sSlow[i-1]&&sFast[i]<sSlow[i]){
        const sl=Math.max(...highs.slice(i-S.swingLen,i));
        if(sl>0&&sl>closes[i]*1.01){const e=closes[i],risk=sl-e;S.signal={type:'sell',entry:e,sl,tp1:e-risk*S.rr1,tp2:e-risk*S.rr2,src:'Spatrev'};break}
      }
    }
  }
  
  updateSignalUI();
  drawOverlay();
}

async function fetchKlines(pair){
  try{
    const m={'1':'1m','2':'2m','3':'3m','5':'5m','15':'15m','30':'30m','60':'1h','240':'4h','1D':'1d','1W':'1w','1M':'1M'};
    const r=await fetch(`https://api.binance.com/api/v3/klines?symbol=${pair}&interval=${m[S.tf]||'15m'}&limit=200`);
    if(!r.ok)return[];const d=await r.json();
    return d.map(k=>({t:Math.floor(k[0]/1000),o:+k[1],h:+k[2],l:+k[3],c:+k[4],v:+k[5]}));
  }catch(e){return[]}
}
function sma(d,l){const r=[];for(let i=0;i<d.length;i++){if(i<l-1){r.push(null);continue}let s=0;for(let j=i-l+1;j<=i;j++)s+=d[j];r.push(s/l)}return r}
function ema(d,l){const r=[];const k=2/(l+1);let p=0,st=false;for(let i=0;i<d.length;i++){if(i<l-1){r.push(null);continue}if(!st){let s=0;for(let j=0;j<l;j++)s+=d[j];p=s/l;r.push(p);st=true}else{p=d[i]*k+p*(1-k);r.push(p)}}return r}

// ==================== SIGNAL OVERLAY ====================
function drawOverlay(){
  const sig=S.signal;
  const so=document.getElementById('so');
  const cw=document.querySelector('.cw');
  const h=cw.clientHeight,w=cw.clientWidth;
  if(!sig||h<100||w<100||!S.curSym.startsWith('BINANCE:')){so.innerHTML='';return}

  const prices=[sig.entry,sig.tp1,sig.tp2,sig.sl];
  const pad=Math.max(...prices)*0.01;
  const maxP=Math.max(...prices)+pad,minP=Math.min(...prices)-pad,range=maxP-minP;
  const yPx=p=>((maxP-p)/range)*h;

  const entryCls=sig.type==='buy'?'b':'s';
  so.innerHTML=`
    <div class="st ${entryCls}" style="top:8px;left:8px">${sig.type.toUpperCase()} ${sig.src} @ $${fp(sig.entry)}</div>
    <div class="sl e" style="top:${yPx(sig.entry)}px"><div class="lb y">ENTRY $${fp(sig.entry)}</div></div>
    <div class="sl t" style="top:${yPx(sig.tp1)}px"><div class="lb g">TP1 $${fp(sig.tp1)}</div></div>
    <div class="sl t" style="top:${yPx(sig.tp2)}px"><div class="lb g">TP2 $${fp(sig.tp2)}</div></div>
    <div class="sl s" style="top:${yPx(sig.sl)}px"><div class="lb r">SL $${fp(sig.sl)}</div></div>
  `;
  so.style.display='block';
}

function updateSignalUI(){
  const tag=document.getElementById('sigTag'),price=document.getElementById('sigPrice'),update=document.getElementById('sigUpdate');
  update.textContent=new Date().toLocaleTimeString();
  if(S.signal&&S.curSym.startsWith('BINANCE:')){
    tag.className='tag '+(S.signal.type==='buy'?'b':'s');
    tag.textContent=`${S.signal.src} ${S.signal.type.toUpperCase()}`;
    price.textContent=`$${fp(S.signal.entry)}`;
  }else if(!S.curSym.startsWith('BINANCE:')){
    tag.className='tag n';tag.textContent='TV Mode';price.textContent='Use TV tools';
  }else{
    tag.className='tag n';tag.textContent='No Signal';price.textContent='—';
  }
}

function fp(p){
  if(p>=1000)return p.toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2});
  if(p>=1)return p.toFixed(4);if(p>=0.01)return p.toFixed(6);return p.toFixed(8);
}

// ==================== ACTIONS ====================
function ti(n){
  if(n==='v')S.vOn=!S.vOn;else S.sOn=!S.sOn;
  const el=document.getElementById(n==='v'?'vb':'sab');
  const on=n==='v'?S.vOn:S.sOn;
  el.className='ib '+(on?'on':'off');
  el.textContent=n==='v'?'Veltrix':'Spatrev';
  document.getElementById('so').innerHTML='';
  cw();setTimeout(computeSignal,2500);
}

function os(){
  document.getElementById('vf').value=S.vF;document.getElementById('vs').value=S.vS;
  document.getElementById('ef').value=S.sF;document.getElementById('es').value=S.sS;
  document.getElementById('sLen').value=S.swingLen;document.getElementById('rr1').value=S.rr1;
  document.getElementById('rr2').value=S.rr2;
  document.getElementById('sm').classList.add('show');
}
function cs(){document.getElementById('sm').classList.remove('show')}
function ss(){
  S.vF=+document.getElementById('vf').value||9;S.vS=+document.getElementById('vs').value||21;
  S.sF=+document.getElementById('ef').value||20;S.sS=+document.getElementById('es').value||50;
  S.swingLen=+document.getElementById('sLen').value||10;S.rr1=+document.getElementById('rr1').value||1;
  S.rr2=+document.getElementById('rr2').value||2;
  cs();document.getElementById('so').innerHTML='';cw();setTimeout(computeSignal,2500);
}
document.getElementById('sm').addEventListener('click',e=>{if(e.target===document.getElementById('sm'))cs()});
function ust(){document.getElementById('stm').textContent=new Date().toLocaleDateString()+' '+new Date().toLocaleTimeString()}

let rtimer;
window.addEventListener('resize',()=>{
  clearTimeout(rtimer);
  rtimer=setTimeout(()=>{
    if(S.w){try{S.w.resize()}catch(e){cw()}}
    if(S.signal)drawOverlay();
  },300);
});

// ==================== INIT ====================
cw();setTimeout(computeSignal,2500);setInterval(computeSignal,60000);
setInterval(ust,30000);
</script>
</body>
</html>
